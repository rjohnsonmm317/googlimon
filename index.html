    });
    drawText('X Back', W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderDex() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    const seen   = Object.values(SAVE.dex).filter(e=>e.seen).length;
    const caught = Object.values(SAVE.dex).filter(e=>e.caught).length;
    drawText('GOOGLIDEX', W/2, 12, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    drawText(`Seen: ${seen}  Caught: ${caught}/150`, W/2, 26, {color:PAL.TEXT_DIM,size:6,align:'center'});

    const cols=3, cellW=Math.floor((W-16)/cols), cellH=28;
    const rowsVis = Math.floor((H-56)/cellH);
    const startRow = Math.floor(dexOffset/cols);

    for (let row=0; row<rowsVis; row++) {
      for (let col=0; col<cols; col++) {
        const slot = (startRow+row)*cols+col;
        if (slot>=DEX_LIST.length) break;
        const name = DEX_LIST[slot];
        const ent  = name ? SAVE.dex[name] : null;
        const caught2 = ent && ent.caught;
        const seen2   = ent && ent.seen;
        const cx2 = 8+col*cellW, cy2 = 40+row*cellH;
        fr(cx2, cy2, cellW-2, cellH-2, caught2?'#091a14':'#080e18');
        if (caught2) sr(cx2, cy2, cellW-2, cellH-2, PAL.HP_HI, 1);
        drawText(`#${String(slot+1).padStart(3,'0')}`, cx2+4, cy2+4, {color:PAL.TEXT_DIM,size:5});
        const label = seen2 ? name : '???';
        drawText(label, cx2+42, cy2+4, {color:caught2?PAL.HP_HI:seen2?PAL.TEXT:PAL.TEXT_DIM,size:6});
        if (caught2) drawText('✓', cx2+cellW-6, cy2+4, {color:PAL.GOLD,size:6,align:'right'});

    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    drawText('BAG', W/2, 12, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    drawText(`Credits: ${SAVE.credits}`, W-14, 12, {color:PAL.ACCENT,size:7,align:'right'});
    // Category tabs
    BAG_CATS.forEach((cat,i) => {
      const sel = i===bagCat;
      const tx=10+i*154;
      fr(tx,28,150,20,sel?'#0d2233':'#080e18');
      sr(tx,28,150,20,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(cat,tx+75,33,{color:sel?PAL.GOLD:PAL.TEXT_DIM,size:7,align:'center'});
    });
    // Item list
    const items = getCatItems();
    if (!items.length) {
      drawText('Nothing here.', W/2, H/2, {color:PAL.TEXT_DIM,size:8,align:'center'});
    }
    items.forEach((item,i) => {
      const sel = i===bagCursor;
      const iy=56+i*28;
      fr(12,iy,W-24,24,sel?'#0d2233':'#080e18');
      sr(12,iy,W-24,24,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(item.key, 20, iy+5, {color:sel?PAL.TEXT:PAL.TEXT_DIM,size:8});
      drawText(`x${item.qty}`, W-18, iy+5, {color:PAL.GOLD,size:7,align:'right'});
    });
    drawText('←→ Category   ↑↓ Select   Z Use   X Back', W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderBagUse() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    drawText(`USE: ${bagUseItem?bagUseItem.key:''}`, W/2, 12, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    const usable = bagUseItem && (bagUseItem.key==='Byte Potion'||bagUseItem.key==='Data Shard');
    if (!usable) {
      drawText("Can't use this outside of battle.", W/2, H/2-8, {color:PAL.TEXT_RED,size:7,align:'center'});
      drawText('X Back', W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
      return;
    }
    drawText('Use on which Googlimon?', W/2, 28, {color:PAL.TEXT_DIM,size:6,align:'center'});
    PLAYER.party.forEach((mon,i) => {
      const sel = i===bagUseCursor;
      const iy=44+i*36;
      fr(12,iy,W-24,32,sel?'#0d2233':'#080e18');
      sr(12,iy,W-24,32,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(mon.name, 20, iy+4, {color:sel?PAL.TEXT:PAL.TEXT_DIM,size:8});
      drawHPBar(130,iy+8,W-155,8,mon.hp,mon.maxHp);
      drawText(`${mon.hp}/${mon.maxHp}`,W-16,iy+8,{color:PAL.TEXT_DIM,size:6,align:'right'});
    });
    drawText('↑↓ Select   Z Use   X Back', W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderBadges() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.GOLD,inner:PAL.BORDER});
    drawText('BADGES', W/2, 12, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    // 4×2 grid of badges
    ALL_BADGES.forEach((bi,i) => {
      const col2=i%4, row2=Math.floor(i/4);
      const bx2=10+col2*116, by2=32+row2*116;
      const earned = SAVE.badges.includes(bi.name);
      fr(bx2,by2,110,108, earned?'#0a1a28':'#060c14');
      sr(bx2,by2,110,108, earned?bi.color:PAL.BORDER, earned?2:1);
      // Gem
      const gx=bx2+55, gy=by2+48;
      fr(gx-16,gy-16,32,32, earned?bi.color:PAL.TEXT_DIM);
      fr(gx-11,gy-11,22,22, earned?bi.color+'99':'#111');
      if (earned) {
        ctx.fillStyle='#ffffff55';
        ctx.beginPath(); ctx.arc(gx-5,gy-5,7,0,Math.PI*2); ctx.fill();
      }
      drawText(bi.name.replace(' Badge',''), bx2+55, by2+6, {color:earned?bi.color:PAL.TEXT_DIM,size:5,align:'center'});
      if (earned) drawText('✓', bx2+55, by2+92, {color:PAL.GOLD,size:7,align:'center'});
      else        drawText('—', bx2+55, by2+92, {color:PAL.TEXT_DIM,size:7,align:'center'});
    });
    drawText(`Badges: ${SAVE.badges.length}/8   X Back`, W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderConfirm(title, sub) {
    dim();
    const pw=300, ph=104, px=W/2-pw/2, py=H/2-ph/2;
    drawPanel(px,py,pw,ph,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    drawText(title, px+pw/2, py+14, {color:PAL.TEXT,size:8,align:'center',shadow:true});
    if (sub) drawText(sub, px+pw/2, py+30, {color:PAL.TEXT_DIM,size:6,align:'center'});
    ['YES','NO'].forEach((opt,i) => {
      const sel=i===confirmCursor;
      const ox=px+60+i*130, oy=py+58;
      fr(ox-28,oy-6,80,26,sel?'#0d2233':'#080e18');
      sr(ox-28,oy-6,80,26,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(opt, ox+12, oy+2, {color:sel?PAL.GOLD:PAL.TEXT,size:9,align:'center'});
    });
  }

  function render() {
    if (screen==='main')         renderMain();
    else if (screen==='party')        renderParty();
    else if (screen==='party_detail') renderPartyDetail();
    else if (screen==='dex')          renderDex();
    else if (screen==='bag')          renderBag();
    else if (screen==='bag_use')      renderBagUse();
    else if (screen==='badges')       renderBadges();
    else if (screen==='save_confirm') renderConfirm('Save your game?');
    else if (screen==='quit_confirm') renderConfirm('Return to title screen?','Unsaved progress will be lost.');
  }

  return { enter, update, render };
})();
STATES.menu = menuState;

// ============================================================
// GAME LOOP
// ============================================================
function loop() {
  G_TICK++;
  const s = STATES[currentState];
  if (s) {
    s.update();
    s.render();
  } else {
    fr(0, 0, W, H, PAL.BG);
    drawTextC(`Unknown state: "${currentState}"`, H / 2, { color: PAL.TEXT_RED });
  }
  // Global notification banner
  if (NOTIF.timer > 0) {
    NOTIF.timer--;
    const nAlpha = Math.min(1, NOTIF.timer / 20);
    ctx.globalAlpha = nAlpha;
    const nw = 192, nh = 24;
    fr(W/2-nw/2, 4, nw, nh, '#05080f');
    sr(W/2-nw/2, 4, nw, nh, PAL.GOLD, 2);
    drawText(NOTIF.text, W/2, 10, { color: PAL.GOLD, size: 10, align: 'center', shadow: true });
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(loop);
}

// ── Boot ────────────────────────────────────────────────────
// F1 / ? opens controls overlay from any state
document.addEventListener('keydown', e => {
  if (e.code === 'F1' || e.code === 'Slash') {
    e.preventDefault();
    if (currentState !== 'controls') {
      controlsPrevState = currentState;
      setState('controls');
    }
  }
});

setState('title');
requestAnimationFrame(loop);

</script>
</body>
</html>
