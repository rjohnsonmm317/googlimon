<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOOGLIMON: The Index Crisis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000814;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}

#c {
  width: 960px;
  height: 640px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 2px solid #003344;
  box-shadow: 0 0 80px #00d4ff18, 0 0 200px #00aaff0a;
  display: block;
}

#hint {
  color: #002233;
  font-size: 10px;
  letter-spacing: 3px;
  margin-top: 8px;
  text-transform: uppercase;
  user-select: none;
}

@media (max-width: 980px) {
  #c { width: 480px; height: 320px; }
}

#nameInput {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  margin-top: 4px;
  width: 220px;
  padding: 8px 12px;
  background: #050d1a;
  border: 2px solid #00d4ff;
  color: #c8e8ff;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  outline: none;
  display: none;
  box-shadow: 0 0 16px #00d4ff44;
}
#nameInput::placeholder { color: #1a3a55; }
#nameInput:focus { border-color: #f5c542; box-shadow: 0 0 20px #f5c54244; }
</style>
</head>
<body>
<canvas id="c" width="480" height="320"></canvas>
<input id="nameInput" type="text" maxlength="10" placeholder="TRAINER NAME"
  autocomplete="off" autocorrect="off" spellcheck="false" />
<div id="hint">WASD · Arrows = Move &nbsp;|&nbsp; Enter = Confirm/Talk &nbsp;|&nbsp; E = Menu/Back &nbsp;|&nbsp; F1 = Controls</div>

<script>
'use strict';

// ============================================================
// CANVAS + CORE CONFIG
// ============================================================
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W   = 480;   // logical canvas width  (CSS doubles to 960)
const H   = 320;   // logical canvas height (CSS doubles to 640)
const TS  = 16;    // tile size in canvas pixels (= 32px on screen)
const VW  = 30;    // viewport width  in tiles (30 × 16 = 480)
const VH  = 13;    // viewport height in tiles (13 × 16 = 208)
const UI_Y = VH * TS; // 208 — dividing line between map area and UI strip

// ============================================================
// COLOR PALETTE
// ============================================================
const PAL = {
  // Void / backgrounds
  BG:        '#050d1a',
  VOID:      '#020509',
  // Map tiles
  PATH:      '#1c2a1c',
  GRASS:     '#1a3a1a',
  TALL:      '#0b4a0b',
  WATER:     '#0a1a5a',
  TREE:      '#0a2a0a',
  WALL_BG:   '#1a1208',
  DOOR_BG:   '#3a2800',
  FLOOR:     '#1e1e2e',
  GYM:       '#0d1e1e',
  COUNTER:   '#2a1a08',
  SIGN:      '#2a2000',
  // UI panels
  PANEL:     '#070e1a',
  PANEL2:    '#0a1628',
  BORDER:    '#005577',
  BORDER2:   '#002233',
  BORDER_HI: '#00aacc',
  // Accent / highlight
  ACCENT:    '#00d4ff',
  ACCENT2:   '#0088bb',
  GOLD:      '#f5c542',
  // Text
  TEXT:      '#c8e8ff',
  TEXT_DIM:  '#3a5a77',
  TEXT_DARK: '#1a2a3a',
  TEXT_RED:  '#ff4455',
  TEXT_YLW:  '#ffdd44',
  // HP / EXP bars
  HP_HI:     '#00ee77',
  HP_MED:    '#ffdd00',
  HP_LOW:    '#ff2244',
  EXP:       '#0088ff',
  // Status conditions
  CORRUPTED: '#aa00ff',
  LAGGED:    '#ffaa00',
  CRASHED:   '#4488ff',
  BURNED:    '#ff5500',
  FROZEN:    '#88ddff',
  // Type colors (14 types)
  T_SEARCH:  '#f5c542',
  T_BROWSER: '#4286f4',
  T_CLOUD:   '#a0d8ef',
  T_DATA:    '#9c27b0',
  T_MEDIA:   '#e91e63',
  T_AI:      '#8855cc',
  T_SEC:     '#4caf50',
  T_GAMING:  '#ff5722',
  T_SOCIAL:  '#00bcd4',
  T_HW:      '#8d6e63',
  T_ELEC:    '#ffeb3b',
  T_VIRUS:   '#76bc3a',
  T_QUANT:   '#3f51b5',
  T_COSMIC:  '#b0a0ff',
};

// Shorthand type→color lookup used throughout the game
const TYPE_COL = {
  Search:   PAL.T_SEARCH,  Browser:  PAL.T_BROWSER,
  Cloud:    PAL.T_CLOUD,   Data:     PAL.T_DATA,
  Media:    PAL.T_MEDIA,   AI:       PAL.T_AI,
  Security: PAL.T_SEC,     Gaming:   PAL.T_GAMING,
  Social:   PAL.T_SOCIAL,  Hardware: PAL.T_HW,
  Electric: PAL.T_ELEC,    Virus:    PAL.T_VIRUS,
  Quantum:  PAL.T_QUANT,   Cosmic:   PAL.T_COSMIC,
};

// ============================================================
// SPRITE CACHE  (preload PNGs from GitHub, fall back to canvas primitives)
// ============================================================
const SPRITE_BASE = "https://raw.githubusercontent.com/rjohnsonmm317/googlimon/main/assets/sprites/";
const SPRITE_CACHE  = {};
const SPRITE_FAILED = new Set();
const NAME_INPUT = document.getElementById('nameInput');

let spritesTotal = 0;
let spritesDone  = 0;

function loadSprite(key, filename) {
  if (SPRITE_CACHE[key] || SPRITE_FAILED.has(key)) return;
  spritesTotal++;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload  = () => { SPRITE_CACHE[key] = img; spritesDone++; };
  img.onerror = () => { SPRITE_FAILED.add(key); spritesDone++; };
  img.src = SPRITE_BASE + filename;
}

function getSprite(key) { return SPRITE_CACHE[key] || null; }

// ============================================================
// TILE SYSTEM
// ============================================================
const T = {
  PATH:    0,   // walkable — dirt/stone path
  GRASS:   1,   // walkable — short grass, no encounter
  TALL:    2,   // walkable — tall grass, triggers wild encounter
  WATER:   3,   // impassable
  TREE:    4,   // impassable — tree canopy
  WALL:    5,   // impassable — building exterior / rock face
  DOOR:    6,   // walkable — triggers map transition
  FLOOR:   7,   // walkable — indoor floor
  COUNTER: 8,   // impassable — shop counter / desk
  GYM:     9,   // walkable — gym floor tile
  SIGN:    10,  // impassable — interactable sign post
  PC:      11,  // impassable — PC terminal (interactable)
  STAIR:   12,  // walkable — staircase
  FLOWER:  13,  // walkable — decorative flowers (no encounter)
  SAND:    14,  // walkable — sandy path
};

const WALKABLE = new Set([
  T.PATH, T.GRASS, T.TALL, T.DOOR, T.FLOOR,
  T.GYM, T.STAIR, T.FLOWER, T.SAND,
]);
const ENCOUNTER_TILES = new Set([T.TALL]);

// Per-tile visual definition: { bg, detail, deco }
const TILE_DEF = {
  [T.PATH]:    { bg: '#1c2a1c', det: '#162216' },
  [T.GRASS]:   { bg: '#1a3a1a', det: '#132813' },
  [T.TALL]:    { bg: '#0b4a0b', det: '#083808' },
  [T.WATER]:   { bg: '#0a1a5a', det: '#0a1270' },
  [T.TREE]:    { bg: '#0a2a0a', det: '#1a4a1a' },
  [T.WALL]:    { bg: '#1a1208', det: '#251a0a' },
  [T.DOOR]:    { bg: '#3a2800', det: '#4a3800' },
  [T.FLOOR]:   { bg: '#1e1e2e', det: '#181828' },
  [T.COUNTER]: { bg: '#2a1a08', det: '#3a2a10' },
  [T.GYM]:     { bg: '#0d1e1e', det: '#0a2828' },
  [T.SIGN]:    { bg: '#2a2000', det: '#3a3000' },
  [T.PC]:      { bg: '#001e3a', det: '#002a50' },
  [T.STAIR]:   { bg: '#282818', det: '#383828' },
  [T.FLOWER]:  { bg: '#1a3a1a', det: '#1a3a1a' },
  [T.SAND]:    { bg: '#2a2210', det: '#322a18' },
};

// Draw one tile at canvas-pixel position (px, py)
function drawTile(id, px, py, tick) {
  const def = TILE_DEF[id] ?? TILE_DEF[T.PATH];
  ctx.fillStyle = def.bg;
  ctx.fillRect(px, py, TS, TS);

  const d = def.det;

  switch (id) {
    case T.PATH: {
      // Subtle cobblestone — alternating stone blocks
      const pRow2 = (Math.floor(py / TS) + Math.floor(px / TS)) % 2;
      ctx.fillStyle = pRow2 ? '#181e18' : '#161c16';
      ctx.fillRect(px, py, TS, TS);
      // Mortar lines
      ctx.fillStyle = '#0e140e';
      ctx.fillRect(px, py, TS, 1);
      ctx.fillRect(px, py, 1, TS);
      // Stone highlight
      ctx.fillStyle = '#20281888';
      ctx.fillRect(px + 1, py + 1, TS - 3, 1);
      break;
    }

    case T.GRASS: {
      // Base with slight variation based on position
      const gVar = (Math.floor(px / TS) * 3 + Math.floor(py / TS) * 7) % 4;
      ctx.fillStyle = ['#1a3a1a','#193818','#1b3c1b','#183619'][gVar];
      ctx.fillRect(px, py, TS, TS);
      // Short blades
      ctx.fillStyle = d;
      ctx.fillRect(px + 3,  py + 4, 1, 5);
      ctx.fillRect(px + 7,  py + 3, 1, 6);
      ctx.fillRect(px + 11, py + 5, 1, 4);
      ctx.fillRect(px + 14, py + 2, 1, 7);
      // Bright tips
      ctx.fillStyle = '#226a22';
      ctx.fillRect(px + 3,  py + 4, 1, 2);
      ctx.fillRect(px + 7,  py + 3, 1, 2);
      ctx.fillRect(px + 11, py + 5, 1, 2);
      break;
    }

    case T.TALL:
      // Blades + animated sway shimmer
      ctx.fillStyle = d;
      ctx.fillRect(px + 2,  py + 2,  2, 10);
      ctx.fillRect(px + 6,  py + 1,  2, 12);
      ctx.fillRect(px + 10, py + 2,  2, 11);
      ctx.fillRect(px + 14, py + 3,  2,  9);
      // Bright tips
      ctx.fillStyle = '#1a6a1a';
      ctx.fillRect(px + 2,  py + 2,  2, 2);
      ctx.fillRect(px + 6,  py + 1,  2, 2);
      ctx.fillRect(px + 10, py + 2,  2, 2);
      ctx.fillRect(px + 14, py + 3,  2, 2);
      // Subtle shimmer pulse every ~60 ticks
      if (tick && Math.floor(tick / 40) % 3 === ((px / TS + py / TS) % 3)) {
        ctx.fillStyle = '#00ee0022';
        ctx.fillRect(px, py, TS, TS);
      }
      break;

    case T.WATER: {
      // Animated horizontal ripples
      const wo = Math.floor((tick ?? 0) / 18) % 8;
      ctx.fillStyle = '#0c1f7a';
      ctx.fillRect(px + ((0 + wo) % TS), py + 4, 6, 2);
      ctx.fillRect(px + ((8 + wo) % TS), py + 4, 6, 2);
      ctx.fillRect(px + ((4 + wo) % TS), py + 11, 5, 2);
      ctx.fillRect(px + ((12 + wo) % TS), py + 11, 5, 2);
      // Glint
      ctx.fillStyle = '#1a3aaa44';
      ctx.fillRect(px + 1, py + 1, TS - 2, 2);
      break;
    }

    case T.TREE:
      // Layered canopy
      ctx.fillStyle = '#1a4a1a';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      ctx.fillStyle = '#226a22';
      ctx.fillRect(px + 3, py + 3, 10, 8);
      ctx.fillStyle = '#2a7a2a';
      ctx.fillRect(px + 5, py + 5,  6, 5);
      ctx.fillStyle = '#0a2a0a';
      ctx.fillRect(px + 6, py + 0,  4, 3);  // treetop spike
      break;

    case T.WALL: {
      // Dark stone base
      ctx.fillStyle = '#14100a';
      ctx.fillRect(px, py, TS, TS);
      // Brick rows — offset by alternating row
      const brickRow = Math.floor(py / TS) % 2;
      const brickOff = brickRow ? 8 : 0;
      ctx.fillStyle = '#1e1608';
      // Two horizontal mortar lines at y=5 and y=11
      ctx.fillRect(px, py + 5,  TS, 1);
      ctx.fillRect(px, py + 11, TS, 1);
      // Vertical mortar splits (per brick)
      ctx.fillStyle = '#18120600';
      for (let bxb = 0; bxb < TS; bxb += 8) {
        const bx2 = (bxb + brickOff) % TS;
        ctx.fillStyle = '#1c1408';
        ctx.fillRect(px + bx2, py,     Math.min(7, TS - bx2), 5);
        ctx.fillRect(px + bx2, py + 6, Math.min(7, TS - bx2), 5);
        ctx.fillRect(px + bx2, py + 12,Math.min(7, TS - bx2), 4);
      }
      // Top-edge highlight
      ctx.fillStyle = '#3a2a1444';
      ctx.fillRect(px, py, TS, 2);
      // Right-edge subtle shadow
      ctx.fillStyle = '#0a080444';
      ctx.fillRect(px + TS - 1, py, 1, TS);
      break;
    }

    case T.DOOR: {
      // Dark stone door frame
      ctx.fillStyle = '#1a1208';
      ctx.fillRect(px, py, TS, TS);
      // Frame sides + top
      ctx.fillStyle = '#3a2200';
      ctx.fillRect(px + 1, py + 1, 2, TS - 1);   // left pillar
      ctx.fillRect(px + TS - 3, py + 1, 2, TS - 1); // right pillar
      ctx.fillRect(px + 1, py + 1, TS - 2, 3);   // top lintel
      // Door panel (warm amber)
      ctx.fillStyle = '#6b4500';
      ctx.fillRect(px + 3, py + 4, TS - 6, TS - 5);
      // Door wood grain
      ctx.fillStyle = '#7a5010';
      ctx.fillRect(px + 4, py + 5, 3, 8);
      ctx.fillRect(px + 9, py + 5, 3, 8);
      // Arched top cutout
      ctx.fillStyle = '#3a2200';
      ctx.fillRect(px + 4, py + 4, TS - 8, 3);
      ctx.fillStyle = '#5a3800';
      ctx.fillRect(px + 5, py + 4, TS - 10, 2);
      // Handle (gold knob)
      ctx.fillStyle = '#d4a017';
      ctx.fillRect(px + 7, py + 9, 2, 2);
      // Bottom threshold highlight
      ctx.fillStyle = '#c8a040';
      ctx.fillRect(px + 3, py + TS - 1, TS - 6, 1);
      break;
    }

    case T.FLOOR:
      // Subtle tile grid
      ctx.fillStyle = d;
      ctx.fillRect(px,          py,          TS, 1);
      ctx.fillRect(px,          py,          1,  TS);
      ctx.fillRect(px + TS - 1, py,          1,  TS);
      ctx.fillRect(px,          py + TS - 1, TS, 1);
      break;

    case T.COUNTER:
      ctx.fillStyle = '#4a3010';
      ctx.fillRect(px + 1, py + 1, TS - 2, TS - 2);
      ctx.fillStyle = '#6a4820';
      ctx.fillRect(px + 2, py + 2, TS - 4, 4);
      break;

    case T.GYM: {
      // Checkerboard teal pattern
      const checker = (Math.floor(px / TS) + Math.floor(py / TS)) % 2 === 0;
      ctx.fillStyle = checker ? '#0d2828' : '#0a1e1e';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#00aaaa18';
      ctx.fillRect(px, py, TS, 1);
      ctx.fillRect(px, py, 1, TS);
      break;
    }

    case T.SIGN:
      ctx.fillStyle = '#4a3a00';
      ctx.fillRect(px + 3,  py + 2,  10, 8);  // sign board
      ctx.fillStyle = '#2a1a00';
      ctx.fillRect(px + 7,  py + 10, 2,  6);  // post
      ctx.fillStyle = '#6a5a00';
      ctx.fillRect(px + 4,  py + 3,  8,  6);  // board face
      break;

    case T.PC:
      ctx.fillStyle = '#002a4a';
      ctx.fillRect(px + 2, py + 2, 12, 10);
      ctx.fillStyle = PAL.ACCENT + '88';
      ctx.fillRect(px + 3, py + 3, 10,  8);
      // Blinking cursor
      if (tick && Math.floor(tick / 30) % 2 === 0) {
        ctx.fillStyle = PAL.ACCENT;
        ctx.fillRect(px + 5, py + 5,  2,  4);
      }
      break;

    case T.STAIR:
      ctx.fillStyle = d;
      for (let s = 0; s < 4; s++) {
        ctx.fillRect(px + s * 3, py + s * 3, TS - s * 3, 3);
      }
      break;

    case T.FLOWER:
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(px, py, TS, TS);
      // Small flowers
      const flowerCols = ['#ff88aa', '#ffdd44', '#aa88ff'];
      const fc = flowerCols[(Math.floor(px / TS) + Math.floor(py / TS)) % 3];
      ctx.fillStyle = fc;
      ctx.fillRect(px + 2,  py + 3,  2, 2);
      ctx.fillRect(px + 8,  py + 7,  2, 2);
      ctx.fillRect(px + 12, py + 2,  2, 2);
      ctx.fillStyle = '#ffff88';
      ctx.fillRect(px + 3,  py + 4,  1, 1);
      ctx.fillRect(px + 9,  py + 8,  1, 1);
      ctx.fillRect(px + 13, py + 3,  1, 1);
      break;

    case T.SAND:
      ctx.fillStyle = d;
      ctx.fillRect(px + 1,  py + 5,  2, 1);
      ctx.fillRect(px + 6,  py + 10, 3, 1);
      ctx.fillRect(px + 11, py + 3,  2, 1);
      break;
  }
}

// ============================================================
// SOUND ENGINE (Web Audio API only — procedural, no external files)
// ============================================================
const Sound = (() => {
  let ctx = null;
  let masterGain = null, sfxGain = null;
  let musicGainA = null, musicGainB = null;
  let activeGainNode = null;
  let muted = false;
  let currentTrackName = null;
  let activePlayer = null;
  let trackGen = 0;

  function ensureCtx() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    masterGain = ctx.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(ctx.destination);
    musicGainA = ctx.createGain(); musicGainA.gain.value = 0; musicGainA.connect(masterGain);
    musicGainB = ctx.createGain(); musicGainB.gain.value = 0; musicGainB.connect(masterGain);
    sfxGain = ctx.createGain(); sfxGain.gain.value = 0.7; sfxGain.connect(masterGain);
    activeGainNode = musicGainA;
  }

  function unlock() {
    ensureCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  function toggleMute() {
    ensureCtx();
    muted = !muted;
    if (masterGain) masterGain.gain.setTargetAtTime(muted ? 0 : 1, ctx.currentTime, 0.04);
    return muted;
  }
  function isMuted() { return muted; }

  // ── Note name → frequency (equal temperament, A4 = 440Hz) ──
  function noteFreq(name) {
    if (!name) return null;
    const m = /^([A-G])(#?)(-?\d)$/.exec(name);
    if (!m) return null;
    const SEMI = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    const semitone = SEMI[m[1]] + (m[2] ? 1 : 0);
    const octave = parseInt(m[3], 10);
    const midi = (octave + 1) * 12 + semitone;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  // ── Low-level synthesis helpers ─────────────────────────────
  function playTone(when, freq, dur, { type = 'square', gain = 0.12, attack = 0.005, release = 0.05, destination = null } = {}) {
    if (!ctx || !freq) return;
    const osc = ctx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, when);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(gain, when + attack);
    g.gain.linearRampToValueAtTime(0, when + dur + release);
    osc.connect(g);
    g.connect(destination || sfxGain);
    osc.start(when);
    osc.stop(when + dur + release + 0.02);
  }

  function playNoiseBurst(when, dur, { gain = 0.18, destination = null } = {}) {
    if (!ctx) return;
    const size = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buffer = ctx.createBuffer(1, size, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const g = ctx.createGain();
    g.gain.setValueAtTime(gain, when);
    g.gain.exponentialRampToValueAtTime(0.001, when + dur);
    src.connect(g);
    g.connect(destination || sfxGain);
    src.start(when);
    src.stop(when + dur + 0.02);
  }

  // ── One-shot sound effects ──────────────────────────────────
  function sfxCursor()  { ensureCtx(); playTone(ctx.currentTime, 660, 0.045, { type: 'square', gain: 0.10 }); }
  function sfxConfirm() { ensureCtx(); const t = ctx.currentTime; playTone(t, 880, 0.05, { type: 'square', gain: 0.12 }); playTone(t + 0.05, 1320, 0.06, { type: 'square', gain: 0.10 }); }
  function sfxCancel()  { ensureCtx(); playTone(ctx.currentTime, 330, 0.09, { type: 'square', gain: 0.12 }); }
  function sfxText()    { ensureCtx(); playTone(ctx.currentTime, 1100, 0.018, { type: 'square', gain: 0.05, release: 0.01 }); }
  function sfxFaint()   { ensureCtx(); const t = ctx.currentTime; [580, 460, 360, 260, 160].forEach((f, i) => playTone(t + i * 0.08, f, 0.09, { type: 'sawtooth', gain: 0.12 })); }
  function sfxCatch()   { ensureCtx(); const t = ctx.currentTime; [440, 554, 659, 880].forEach((f, i) => playTone(t + i * 0.07, f, 0.09, { type: 'square', gain: 0.12 })); }
  function sfxLevelUp() { ensureCtx(); const t = ctx.currentTime; [523, 659, 784, 1046].forEach((f, i) => playTone(t + i * 0.06, f, 0.1, { type: 'triangle', gain: 0.13 })); }
  function sfxGlitch()  { ensureCtx(); playNoiseBurst(ctx.currentTime, 0.12, { gain: 0.16 }); playTone(ctx.currentTime, 90, 0.1, { type: 'sawtooth', gain: 0.08 }); }

  // ── Music: step-sequenced chiptune tracks ───────────────────
  function buildTrack({ stepDur, steps, lead = [], bass = [], drum = [], leadType = 'square', bassType = 'triangle', leadGain = 0.085, bassGain = 0.07, drumGain = 0.10 }) {
    const notes = [];
    function addRow(row, type, gain, isDrum) {
      for (let i = 0; i < steps; i++) {
        const cell = row[i];
        if (!cell) continue;
        const dur = stepDur * 0.85;
        if (isDrum) notes.push({ t: i * stepDur, kind: 'drum', dur, gain });
        else {
          const freq = noteFreq(cell);
          if (freq) notes.push({ t: i * stepDur, kind: 'tone', freq, dur, type, gain });
        }
      }
    }
    addRow(lead, leadType, leadGain, false);
    addRow(bass, bassType, bassGain, false);
    addRow(drum, null, drumGain, true);
    notes.sort((a, b) => a.t - b.t);
    return { notes, loopDur: steps * stepDur };
  }

  const TRACKS = {
    title: buildTrack({
      stepDur: 0.20, steps: 16,
      bass: ['A2', null, null, null, 'A2', null, null, null, 'E2', null, null, null, 'F2', null, null, null],
      lead: [null, null, 'C4', null, null, null, 'E4', null, null, 'D4', null, null, 'A4', null, null, null],
      leadType: 'square', bassType: 'sine', leadGain: 0.07, bassGain: 0.09,
    }),
    over_cache: buildTrack({
      stepDur: 0.16, steps: 16,
      bass: ['C3', null, 'G3', null, 'C3', null, 'G3', null, 'A2', null, 'E3', null, 'A2', null, 'E3', null],
      lead: ['E4', null, 'G4', null, 'C5', null, 'G4', null, 'F4', null, 'A4', null, 'C5', null, 'A4', null],
      leadType: 'sine', bassType: 'triangle', leadGain: 0.09, bassGain: 0.07,
    }),
    over_route1: buildTrack({
      stepDur: 0.13, steps: 16,
      bass: ['G3', null, 'G3', null, 'D3', null, 'D3', null, 'E3', null, 'E3', null, 'C3', null, 'C3', null],
      lead: ['G4', 'A4', 'B4', 'D5', 'B4', 'A4', 'G4', 'E4', 'D4', 'E4', 'G4', 'A4', 'G4', 'E4', 'D4', null],
      leadType: 'square', bassType: 'triangle', leadGain: 0.09, bassGain: 0.075,
    }),
    over_crawler: buildTrack({
      stepDur: 0.22, steps: 16,
      bass: ['D2', null, null, null, 'D2', null, null, 'C#2', null, null, null, 'D2', null, null, 'C2', null],
      lead: [null, null, null, 'F4', null, null, null, null, 'F#4', null, null, null, null, 'E4', null, null],
      drum: [null, null, null, null, null, null, null, null, null, null, null, null, 'x', null, null, null],
      leadType: 'sawtooth', bassType: 'sine', leadGain: 0.06, bassGain: 0.08, drumGain: 0.05,
    }),
    over_searchburg: buildTrack({
      stepDur: 0.12, steps: 16,
      bass: ['C3', 'C3', null, 'G3', 'C3', 'C3', null, 'G3', 'A2', 'A2', null, 'E3', 'A2', 'A2', null, 'E3'],
      lead: ['C5', null, 'E5', 'G5', null, 'E5', 'C5', null, 'A4', null, 'C5', 'E5', null, 'C5', 'A4', null],
      leadType: 'square', bassType: 'triangle', leadGain: 0.085, bassGain: 0.075,
    }),
    battle_wild: buildTrack({
      stepDur: 0.11, steps: 16,
      bass: ['E3', 'E3', 'E3', 'E3', 'C3', 'C3', 'C3', 'C3', 'G3', 'G3', 'G3', 'G3', 'D3', 'D3', 'D3', 'D3'],
      lead: ['E5', null, 'G5', null, 'E5', null, 'B4', null, 'C5', null, 'E5', null, 'G5', null, 'C5', null],
      leadType: 'square', bassType: 'triangle', leadGain: 0.095, bassGain: 0.08,
    }),
    battle_trainer: buildTrack({
      stepDur: 0.095, steps: 16,
      bass: ['A2', 'A2', 'A2', 'A2', 'F2', 'F2', 'F2', 'F2', 'G2', 'G2', 'G2', 'G2', 'E2', 'E2', 'E2', 'E2'],
      lead: ['A4', 'C5', 'A4', 'E5', null, 'C5', 'A4', 'G4', 'F4', 'A4', 'F4', 'C5', null, 'A4', 'G4', 'E4'],
      drum: [null, null, null, null, 'x', null, null, null, null, null, null, null, 'x', null, null, null],
      leadType: 'sawtooth', bassType: 'triangle', leadGain: 0.095, bassGain: 0.085, drumGain: 0.09,
    }),
    gym: buildTrack({
      stepDur: 0.085, steps: 16,
      bass: ['D2', 'D2', 'A2', 'A2', 'D2', 'D2', 'F2', 'F2', 'D2', 'D2', 'A2', 'A2', 'C2', 'C2', 'A#1', 'A#1'],
      lead: ['D5', 'F5', 'A5', 'F5', 'D5', 'A4', 'D5', 'F5', 'C5', 'E5', 'G5', 'E5', 'C5', 'A4', 'A#4', 'C5'],
      drum: ['x', null, null, 'x', 'x', null, null, 'x', 'x', null, null, 'x', 'x', null, 'x', 'x'],
      leadType: 'sawtooth', bassType: 'triangle', leadGain: 0.10, bassGain: 0.09, drumGain: 0.10,
    }),
  };

  function fadeGainNode(node, target, dur) {
    if (!ctx || !node) return;
    const now = ctx.currentTime;
    node.gain.cancelScheduledValues(now);
    node.gain.setValueAtTime(node.gain.value, now);
    node.gain.linearRampToValueAtTime(target, now + dur);
  }

  function scheduleEvent(when, ev, destNode) {
    if (ev.kind === 'drum') playNoiseBurst(when, ev.dur, { gain: ev.gain, destination: destNode });
    else playTone(when, ev.freq, ev.dur, { type: ev.type, gain: ev.gain, destination: destNode });
  }

  function stopMusic(fadeDur = 0.4) {
    trackGen++;
    if (activeGainNode) fadeGainNode(activeGainNode, 0, fadeDur);
    currentTrackName = null;
    activePlayer = null;
  }

  function playTrack(name, { fade = 0.6 } = {}) {
    ensureCtx();
    if (!ctx) return;
    if (name === currentTrackName) return;
    const def = TRACKS[name];
    if (!def) { stopMusic(); return; }
    trackGen++;
    const myGen = trackGen;
    currentTrackName = name;
    const newNode = activeGainNode === musicGainA ? musicGainB : musicGainA;
    const oldNode = activeGainNode;
    if (oldNode && oldNode !== newNode) fadeGainNode(oldNode, 0, fade);
    newNode.gain.cancelScheduledValues(ctx.currentTime);
    newNode.gain.setValueAtTime(0, ctx.currentTime);
    newNode.gain.linearRampToValueAtTime(1, ctx.currentTime + fade);
    activeGainNode = newNode;

    let idx = 0;
    let cycleStart = ctx.currentTime + 0.05;
    activePlayer = {
      tick() {
        if (myGen !== trackGen) return;
        const lookahead = ctx.currentTime + 0.25;
        let guard = 0;
        while (cycleStart + def.notes[idx].t < lookahead && guard < 64) {
          scheduleEvent(cycleStart + def.notes[idx].t, def.notes[idx], newNode);
          idx++;
          if (idx >= def.notes.length) { idx = 0; cycleStart += def.loopDur; }
          guard++;
        }
      },
    };
  }

  function playVictory() {
    ensureCtx();
    if (!ctx) return;
    stopMusic(0.15);
    const dest = activeGainNode;
    if (dest) { dest.gain.cancelScheduledValues(ctx.currentTime); dest.gain.setValueAtTime(1, ctx.currentTime); }
    const t = ctx.currentTime;
    const seq = [
      { f: 'C5', d: 0.18 }, { f: 'E5', d: 0.18 }, { f: 'G5', d: 0.18 }, { f: 'C6', d: 0.5 },
      { f: 'G5', d: 0.18 }, { f: 'C6', d: 0.9 },
    ];
    let when = t;
    seq.forEach(n => { playTone(when, noteFreq(n.f), n.d, { type: 'square', gain: 0.16, destination: dest }); when += n.d; });
    playTone(t, noteFreq('C3'), 1.8, { type: 'triangle', gain: 0.10, destination: dest });
  }

  function update() { if (activePlayer) activePlayer.tick(); }

  return {
    unlock, toggleMute, isMuted, update,
    playTrack, stopMusic, playVictory,
    sfxCursor, sfxConfirm, sfxCancel, sfxText, sfxFaint, sfxCatch, sfxLevelUp, sfxGlitch,
  };
})();

// ============================================================
// INPUT SYSTEM
// ============================================================
const KEYS = {};
const JUST = {};  // keys pressed this frame

document.addEventListener('keydown', e => {
  Sound.unlock(); // first user gesture unlocks the AudioContext
  if (!KEYS[e.code]) JUST[e.code] = true;
  KEYS[e.code] = true;
  // Prevent browser scrolling on arrow keys / space
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
    e.preventDefault();
  }
  if (e.code === 'KeyM') Sound.toggleMute();
});
document.addEventListener('keyup', e => { KEYS[e.code] = false; });

// Returns true once per press (consumed)
function pressed(code) {
  if (JUST[code]) { delete JUST[code]; return true; }
  return false;
}
function held(code) { return !!KEYS[code]; }

// Semantic helpers
// Controls: WASD or Arrows = move, Enter = confirm/talk/interact, E = open/close menu
function confirmPressed() { const p = pressed('Enter');  if (p) Sound.sfxConfirm(); return p; }
function cancelPressed()  { const p = pressed('KeyE') || pressed('Escape'); if (p) Sound.sfxCancel();  return p; }
function inputMenu()    { return pressed('KeyM')  || pressed('KeyI'); }
function inputDex()     { return pressed('KeyD'); }

// Dialogue text-advance uses a soft tick instead of the menu confirm blip
function dialogueAdvance() { const p = pressed('Enter'); if (p) Sound.sfxText(); return p; }

// Menu-navigation cursor moves, wrapped with a cursor-move blip
function navUp()    { const p = pressed('ArrowUp')    || pressed('KeyW'); if (p) Sound.sfxCursor(); return p; }
function navDown()  { const p = pressed('ArrowDown')  || pressed('KeyS'); if (p) Sound.sfxCursor(); return p; }
function navLeft()  { const p = pressed('ArrowLeft')  || pressed('KeyA'); if (p) Sound.sfxCursor(); return p; }
function navRight() { const p = pressed('ArrowRight') || pressed('KeyD'); if (p) Sound.sfxCursor(); return p; }

// Directional input (held — for smooth movement)
function inputDir() {
  if (held('ArrowUp')    || held('KeyW')) return 0;
  if (held('ArrowRight') || held('KeyD')) return 1;
  if (held('ArrowDown')  || held('KeyS')) return 2;
  if (held('ArrowLeft')  || held('KeyA')) return 3;
  return -1;
}

// Any key just pressed this frame
function anyKey() {
  const k = Object.keys(JUST);
  if (k.length) { k.forEach(c => delete JUST[c]); return true; }
  return false;
}

// Flush all pending inputs
function flushInput() {
  Object.keys(JUST).forEach(k => delete JUST[k]);
}

// ============================================================
// DRAW UTILITIES
// ============================================================

// Solid rectangle
function fr(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
}

// Outlined rectangle (1-px inset so it aligns on pixels)
function sr(x, y, w, h, col, lw = 1) {
  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
}

// Draw a UI panel: filled bg with double border
function drawPanel(x, y, w, h, {
  bg     = PAL.PANEL,
  outer  = PAL.BORDER2,
  inner  = PAL.BORDER,
} = {}) {
  fr(x, y, w, h, bg);
  // outer edge (dark)
  fr(x,         y,         w, 1, outer);
  fr(x,         y + h - 1, w, 1, outer);
  fr(x,         y,         1, h, outer);
  fr(x + w - 1, y,         1, h, outer);
  // inner highlight
  fr(x + 1,     y + 1,     w - 2, 1, inner);
  fr(x + 1,     y + h - 2, w - 2, 1, inner);
  fr(x + 1,     y + 1,     1, h - 2, inner);
  fr(x + w - 2, y + 1,     1, h - 2, inner);
}

// Draw pixel-style text using Courier New (monospace = consistent widths)
function drawText(str, x, y, {
  color  = PAL.TEXT,
  size   = 8,
  align  = 'left',
  shadow = true,
  alpha  = 1,
} = {}) {
  ctx.globalAlpha = alpha;
  ctx.font        = `${size}px 'Courier New', monospace`;
  ctx.textAlign   = align;
  ctx.textBaseline = 'top';
  if (shadow) {
    ctx.fillStyle = '#000000dd';
    ctx.fillText(str, x + 1, y + 1);
  }
  ctx.fillStyle = color;
  ctx.fillText(str, x, y);
  ctx.globalAlpha = 1;
}

function drawTextC(str, y, opts = {}) {
  drawText(str, W / 2, y, { align: 'center', ...opts });
}

// Word-wrap a string to fit within maxWidth, breaking at spaces
function wrapText(str, maxWidth, size = 8) {
  const prevFont = ctx.font;
  ctx.font = `${size}px 'Courier New', monospace`;
  const words = String(str).split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(test).width > maxWidth) {
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur || !lines.length) lines.push(cur);
  ctx.font = prevFont;
  return lines;
}

// Draw word-wrapped text; returns the number of lines drawn
function drawTextWrapped(str, x, y, maxWidth, opts = {}) {
  const { size = 8, lineHeight = size + 4 } = opts;
  const lines = wrapText(str, maxWidth, size);
  lines.forEach((line, i) => drawText(line, x, y + i * lineHeight, opts));
  return lines.length;
}

// HP/EXP bar
function drawBar(x, y, w, h, ratio, hiCol, bg = '#111122') {
  fr(x, y, w, h, bg);
  fr(x + 1, y + 1, Math.max(0, Math.floor((w - 2) * Math.min(1, ratio))), h - 2, hiCol);
  sr(x, y, w, h, PAL.BORDER2);
}

function drawHPBar(x, y, w, h, cur, max) {
  const r = Math.max(0, cur / max);
  const col = r > 0.5 ? PAL.HP_HI : r > 0.25 ? PAL.HP_MED : PAL.HP_LOW;
  drawBar(x, y, w, h, r, col);
}

// Small type badge  (e.g. [SEARCH])
function drawTypeBadge(type, x, y) {
  const col = TYPE_COL[type] ?? PAL.TEXT_DIM;
  const w = 36, h = 10;
  fr(x, y, w, h, col + '33');
  sr(x, y, w, h, col);
  drawText(type.toUpperCase().slice(0, 6), x + w / 2, y + 1, {
    color: col, size: 6, align: 'center',
  });
}

// ============================================================
// BLINK / TIMING HELPERS
// ============================================================
let G_TICK = 0;   // global frame counter, incremented each loop

function blink(period = 30) {
  return Math.floor(G_TICK / period) % 2 === 0;
}

// ============================================================
// STATE MACHINE
// ============================================================
let currentState = null;

const STATES = {};  // populated below

const OVERWORLD_TRACKS = {
  cache_town: 'over_cache', lab_interior: 'over_cache',
  route1: 'over_route1',
  crawler_woods: 'over_crawler',
  searchburg: 'over_searchburg', center_interior: 'over_searchburg',
  mart_interior: 'over_searchburg', gym1_interior: 'over_searchburg',
};

function applyStateMusic(name, arg) {
  if (name === 'title') { Sound.playTrack('title'); return; }
  if (name === 'battle') {
    const trainerId = arg && arg.trainerId;
    if (trainerId === 'scout_searcher') Sound.playTrack('gym');
    else if (arg && arg.isTrainer) Sound.playTrack('battle_trainer');
    else Sound.playTrack('battle_wild');
    return;
  }
  if (name === 'overworld') {
    const mapId = (typeof arg === 'string' ? arg : PLAYER.mapId) || PLAYER.mapId;
    const track = OVERWORLD_TRACKS[mapId];
    if (track) Sound.playTrack(track);
    return;
  }
  if (name === 'prof_intro') { Sound.playTrack('over_cache'); return; }
  // Other states (menu/bag/party/dex/mart/controls/badge_case) keep whatever music is already playing.
}

function setState(name, enterArg) {
  if (currentState && STATES[currentState]?.exit) {
    STATES[currentState].exit();
  }
  currentState = name;
  flushInput();
  applyStateMusic(name, enterArg);
  if (STATES[name]?.enter) STATES[name].enter(enterArg);
}

// ============================================================
// STATE: TITLE SCREEN
// ============================================================
const TYPE_NAMES = Object.keys(TYPE_COL);
const TYPE_COLS  = Object.values(TYPE_COL);

const titleState = (() => {
  let tick = 0;
  let logoY = -80;
  let titlePhase = 'main'; // 'main' | 'name_entry'
  let menuCursor = 0;      // 0=CONTINUE or START, 1=NEW GAME (when save exists)
  const LOGO_REST = 38;
  const LOGO_LETTERS = 'GOOGLIMON';

  // Floating data-stream particles
  const PARTICLES = [];
  function spawnParticle() {
    return {
      x:     Math.random() * W,
      y:     Math.random() * H,
      size:  1 + (Math.random() < 0.3 ? 1 : 0),
      speed: 0.15 + Math.random() * 0.4,
      col:   TYPE_COLS[Math.floor(Math.random() * TYPE_COLS.length)],
      phase: Math.random() * Math.PI * 2,
      alpha: 0.08 + Math.random() * 0.25,
    };
  }

  // Hex grid backdrop cells
  const CELLS = [];
  function buildCells() {
    CELLS.length = 0;
    for (let cy = 0; cy < H; cy += 20) {
      for (let cx = 0; cx < W; cx += 20) {
        if (Math.random() < 0.18) {
          CELLS.push({ x: cx, y: cy, col: TYPE_COLS[Math.floor(Math.random() * TYPE_COLS.length)], life: Math.random() * 200 });
        }
      }
    }
  }

  function enter() {
    tick = 0;
    logoY = -80;
    titlePhase = 'main';
    menuCursor = 0;
    loadGame();
    PARTICLES.length = 0;
    for (let i = 0; i < 50; i++) PARTICLES.push(spawnParticle());
    buildCells();
    NAME_INPUT.style.display = 'none';
  }

  function startNew() {
    // Reset save to fresh state
    SAVE.playerName = '';
    SAVE.starterChosen = false;
    SAVE.dex = {};
    SAVE.credits = 500;
    SAVE.badges = [];
    SAVE.items = {};
    SAVE.trainerDefeated = [];
    PLAYER.party = [];
    PLAYER.mapId = 'cache_town';
    PLAYER.x = 10; PLAYER.y = 7; PLAYER.dir = 2;
    localStorage.removeItem('googlimon_v1');
    // Show name input
    titlePhase = 'name_entry';
    NAME_INPUT.value = '';
    NAME_INPUT.style.display = 'block';
    NAME_INPUT.focus();
  }

  function confirmName() {
    const raw = NAME_INPUT.value.trim().toUpperCase() || 'PLAYER';
    SAVE.playerName = raw.slice(0, 10);
    NAME_INPUT.style.display = 'none';
    titlePhase = 'main';
    setState('overworld', 'cache_town');
  }

  function update() {
    tick++;

    // Logo drop-in
    if (logoY < LOGO_REST) {
      logoY += (LOGO_REST - logoY) * 0.14 + 1;
      if (logoY >= LOGO_REST) logoY = LOGO_REST;
    }

    // Particles
    for (const p of PARTICLES) {
      p.y -= p.speed;
      p.alpha = (0.08 + Math.abs(Math.sin(tick * 0.018 + p.phase)) * 0.22);
      if (p.y < -4) { Object.assign(p, spawnParticle()); p.y = H + 4; }
    }

    // Cells
    for (const c of CELLS) {
      c.life--;
      if (c.life <= 0) {
        c.x = Math.random() * W; c.y = Math.random() * H;
        c.col = TYPE_COLS[Math.floor(Math.random() * TYPE_COLS.length)];
        c.life = 80 + Math.random() * 200;
      }
    }

    if (titlePhase === 'name_entry') {
      // Enter key confirms the name
      if (pressed('Enter')) { confirmName(); return; }
      return; // hand control to the HTML input
    }

    if (tick <= 60) return;

    const hasSave = SAVE.starterChosen;
    const opts = hasSave ? 2 : 1; // CONTINUE + NEW GAME, or just START
    if (navUp())   menuCursor = (menuCursor + opts - 1) % opts;
    if (navDown()) menuCursor = (menuCursor + 1) % opts;

    if (pressed('Backquote')) { setState('sprite_debug'); return; }

    if (confirmPressed()) {
      if (!hasSave || menuCursor === 0) {
        // CONTINUE (save exists) or START (no save)
        if (hasSave) {
          setState('overworld', PLAYER.mapId);
        } else {
          startNew();
        }
      } else {
        // NEW GAME
        startNew();
      }
    }
  }

  function render() {
    // ── Background ─────────────────────────────────────────
    fr(0, 0, W, H, PAL.BG);

    // Faint grid squares
    for (const c of CELLS) {
      const a = Math.min(0.12, (200 - c.life) / 200 * 0.12) + Math.sin(tick * 0.03 + c.x) * 0.03;
      ctx.globalAlpha = Math.max(0, a);
      fr(c.x, c.y, 18, 18, c.col);
      ctx.globalAlpha = 1;
    }

    // Particles
    for (const p of PARTICLES) {
      ctx.globalAlpha = p.alpha;
      fr(p.x | 0, p.y | 0, p.size, p.size, p.col);
    }
    ctx.globalAlpha = 1;

    // Scan-line overlay
    ctx.fillStyle = '#00000018';
    for (let sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);

    // Top + bottom rainbow bar
    for (let i = 0; i < TYPE_NAMES.length; i++) {
      const bw = W / TYPE_NAMES.length;
      ctx.globalAlpha = 0.55;
      fr(i * bw, 0,     bw, 3, TYPE_COL[TYPE_NAMES[i]]);
      fr(i * bw, H - 3, bw, 3, TYPE_COL[TYPE_NAMES[i]]);
    }
    ctx.globalAlpha = 1;

    // ── "THE INDEX CRISIS" above logo ───────────────────────
    if (logoY > 0) {
      const subAlpha = Math.min(1, (logoY - 0) / LOGO_REST);
      drawTextC('THE  INDEX  CRISIS', logoY - 14, {
        color: PAL.ACCENT, size: 7, shadow: true, alpha: subAlpha * 0.9,
      });
    }

    // ── GOOGLIMON logo ──────────────────────────────────────
    {
      const lw = 26;
      const startX = W / 2 - (LOGO_LETTERS.length * lw) / 2 + lw / 2;
      ctx.font = "bold 22px 'Courier New', monospace";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      for (let i = 0; i < LOGO_LETTERS.length; i++) {
        const lx = startX + i * lw;
        const ly = logoY + Math.sin(tick * 0.045 + i * 0.55) * 2.5;
        const col = TYPE_COLS[i % TYPE_COLS.length];

        // Drop shadow
        ctx.fillStyle = '#000000bb';
        ctx.fillText(LOGO_LETTERS[i], lx + 2, ly + 2);

        // Glow halo
        ctx.shadowColor  = col;
        ctx.shadowBlur   = 12;
        ctx.fillStyle    = col;
        ctx.fillText(LOGO_LETTERS[i], lx, ly);
        ctx.shadowBlur   = 0;
      }
    }

    // ── Tagline ─────────────────────────────────────────────
    if (tick > 35) {
      const ta = Math.min(1, (tick - 35) / 30);
      const ty = LOGO_REST + 44;
      fr(W / 2 - 90, ty - 5, 180, 1, PAL.BORDER + '66');
      drawTextC('A  Monster-Collecting  RPG', ty, {
        color: PAL.TEXT_DIM, size: 7, alpha: ta,
      });
      fr(W / 2 - 90, ty + 13, 180, 1, PAL.BORDER + '66');
    }

    // ── Menu options / Name Entry ─────────────────────────
    if (titlePhase === 'name_entry') {
      fr(W/2-130, H-80, 260, 44, '#050d1a');
      sr(W/2-130, H-80, 260, 44, PAL.GOLD, 2);

const loadingState = (() => {
  let tick = 0;
  const MAX_WAIT = 480; // ~8s @60fps safety cap in case some image never settles

  function enter() {
    tick = 0;
    spritesTotal = 0;
    spritesDone  = 0;
    preloadAllSprites();
    // Nothing to preload (e.g. DEX_LIST empty) — skip straight to title.
    if (spritesTotal === 0) { setState('title'); }
  }

  function update() {
    tick++;
    if (spritesTotal > 0 && spritesDone >= spritesTotal) { setState('title'); return; }
    if (tick >= MAX_WAIT) { setState('title'); return; }
  }

  function render() {
    fr(0, 0, W, H, PAL.BG);
    drawTextC('GOOGLIMON', H/2 - 40, { color: PAL.GOLD, size: 22, align: 'center' });
    drawTextC('LOADING GOOGLIMON DATA...', H/2 - 4, { color: PAL.TEXT, size: 9, align: 'center' });

    const barW = 240, barH = 14, barX = W/2 - barW/2, barY = H/2 + 14;
    const pct = spritesTotal > 0 ? Math.min(1, spritesDone / spritesTotal) : 1;
    drawPanel(barX, barY, barW, barH);
    fr(barX + 2, barY + 2, Math.max(0, (barW - 4) * pct), barH - 4, PAL.ACCENT);
    drawTextC(`${spritesDone} / ${spritesTotal}`, barY + barH + 6, { color: PAL.TEXT_DIM, size: 7, align: 'center' });
  }

  return { enter, update, render };
})();

const spriteDebugState = (() => {
  const ROW_H    = 11;    // pixels per list row
  const LIST_TOP = 32;    // y below header
  const LIST_BOT = H - 16;
  const ROWS_VIS = Math.floor((LIST_BOT - LIST_TOP) / ROW_H);

  let results    = [];    // {label, url, status: 'pending'|'ok'|'fail'}
  let doneCount  = 0;
  let totalCount = 0;
  let scrollOff  = 0;
  let loggedDone = false;

  function enter() {
    flushInput();
    results   = [];
    doneCount = 0;
    totalCount = 0;
    scrollOff  = 0;
    loggedDone = false;

    DEX_LIST.forEach(name => {
      if (!name) return;
      const filename = getSpriteFilename(name);
      if (!filename) return;
      ['f', 'b'].forEach(side => {
        const url   = SPRITE_BASE + filename;
        const label = filename.replace(/\.png$/i, '') + ' (' + side + ')';
        const entry = { label, url, status: 'pending' };
        results.push(entry);
        totalCount++;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => { entry.status = 'ok';   doneCount++; };
        img.onerror = () => { entry.status = 'fail'; doneCount++; };
        img.src = url;
      });
    });

    console.log('[Googlimon Sprite Debug] Probing ' + totalCount + ' image slots (' + DEX_LIST.length + ' species \xd7 2 sides)');
    console.log('[Googlimon Sprite Debug] SPRITE_BASE = ' + SPRITE_BASE);
  }

  function update() {
    if (!loggedDone && doneCount >= totalCount && totalCount > 0) {
      loggedDone = true;
      const ok     = results.filter(r => r.status === 'ok').length;
      const failed = results.filter(r => r.status === 'fail');
      console.log('[Googlimon Sprite Debug] DONE: ' + ok + ' of ' + totalCount + ' loaded, ' + failed.length + ' failed');
      const failUrls = [...new Set(failed.map(r => r.url))];
      if (failUrls.length) {
        console.log('[Googlimon Sprite Debug] Unique failed URLs (' + failUrls.length + '):');
        failUrls.forEach(u => console.log('  FAIL: ' + u));
      } else {
        console.log('[Googlimon Sprite Debug] All URLs responded with success!');
      }
    }

    if (navUp())   scrollOff = Math.max(0, scrollOff - 1);
    if (navDown()) scrollOff = Math.min(Math.max(0, results.length - ROWS_VIS), scrollOff + 1);

    if (cancelPressed() || pressed('Backquote')) setState('title');
  }

  function render() {
    fr(0, 0, W, H, '#020810');

    // ── Header ────────────────────────────────────────────────
    drawPanel(0, 0, W, LIST_TOP);
    drawTextC('SPRITE DIAGNOSTIC', 4, { color: PAL.GOLD, size: 9 });
    const ok = results.filter(r => r.status === 'ok').length;
    const statusStr = doneCount < totalCount
      ? 'Probing... ' + doneCount + ' / ' + totalCount
      : ok + ' of ' + totalCount + ' sprites loaded';
    const statusCol = doneCount < totalCount ? PAL.TEXT_DIM
      : ok === totalCount ? PAL.HP_HI : PAL.TEXT_RED;
    drawTextC(statusStr, 17, { color: statusCol, size: 7 });

    // ── List ──────────────────────────────────────────────────
    const visible = results.slice(scrollOff, scrollOff + ROWS_VIS);
    visible.forEach((entry, i) => {
      const ry = LIST_TOP + i * ROW_H;
      if (entry.status === 'ok') {
        drawText('✓', 4, ry, { color: PAL.HP_HI, size: 8, shadow: false });
        drawText(entry.label, 14, ry, { color: '#3a6a3a', size: 7, shadow: false });
      } else if (entry.status === 'fail') {
        drawText('✗', 4, ry, { color: PAL.TEXT_RED, size: 8, shadow: false });
        drawText(entry.label, 14, ry, { color: PAL.TEXT_RED, size: 7, shadow: false });
        const shortUrl = entry.url.replace(SPRITE_BASE, '…/');
        drawText(shortUrl, 22, ry + 6, { color: '#664444', size: 6, shadow: false });
      } else {
        drawText('?', 4, ry, { color: PAL.TEXT_DIM, size: 8, shadow: false });
        drawText(entry.label, 14, ry, { color: PAL.TEXT_DIM, size: 7, shadow: false });
      }
    });

    // ── Scroll indicator ──────────────────────────────────────
    if (results.length > ROWS_VIS) {
      const trackH  = LIST_BOT - LIST_TOP;
      const thumbH  = Math.max(12, Math.round(trackH * ROWS_VIS / results.length));
      const thumbY  = LIST_TOP + Math.round((trackH - thumbH) * scrollOff / Math.max(1, results.length - ROWS_VIS));
      fr(W - 4, LIST_TOP, 3, trackH, '#0a1828');
      fr(W - 4, thumbY,   3, thumbH, PAL.ACCENT2);
    }

    // ── Footer ────────────────────────────────────────────────
    fr(0, LIST_BOT, W, H - LIST_BOT, '#030c18');
    drawTextC('↑↓ scroll  \xb7  E or \x60 to close  \xb7  failed URLs in console (F12)', LIST_BOT + 3, { color: PAL.TEXT_DIM, size: 6 });
  }

  return { enter, update, render };
})();

// Helper to build a flat row string into tile arrays
function mkRow(str) {
  return str.split('').map(c => {
    switch(c) {
      case '.': return T.PATH;
      case 'g': return T.GRASS;
      case 'G': return T.TALL;
      case 'W': return T.WALL;
      case 'B': return T.WALL;   // building facade (solid)
      case 'D': return T.DOOR;
      case 'F': return T.FLOOR;
      case 'C': return T.COUNTER;
      case 'T': return T.TREE;
      case '~': return T.WATER;
      case 'f': return T.FLOWER;
      default:  return T.PATH;
    }
  });
}

const STEP_FRAMES = 10;  // frames per tile step

// ── Camera ───────────────────────────────────────────────────
function getCam(map) {
  const cx = PLAYER.x * TS - (VW * TS) / 2 + TS / 2;
  const cy = PLAYER.y * TS - (VH * TS) / 2 + TS / 2;
  const maxX = map.w * TS - VW * TS;
  const maxY = map.h * TS - VH * TS;
  return {
    x: Math.max(0, Math.min(cx, maxX)),
    y: Math.max(0, Math.min(cy, maxY))
  };
}

// ── NPC State ────────────────────────────────────────────────
let npcDialogue = null;  // { lines:[], idx:0 } when active

// ── Sprite Drawers ───────────────────────────────────────────
function drawPlayer(px, py, dir, frame) {
  const x = Math.floor(px);
  const y = Math.floor(py);
  const bob = (frame % 2 === 0) ? 0 : 1;

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 15 + bob, 5, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Legs (bob)
  ctx.fillStyle = '#226699';
  if (dir === 0) {
    fr(x+5, y+10+bob, 3, 5, '#226699');
    fr(x+9, y+10+bob, 3, 5, '#226699');
  } else if (dir === 2) {
    fr(x+5, y+10+bob, 3, 5, '#226699');
    fr(x+9, y+10+bob, 3, 5, '#226699');
  } else if (dir === 1) {
    fr(x+6, y+10, 3, 5, '#226699');
    fr(x+9, y+10+bob, 3, 5, '#226699');
  } else {
    fr(x+5, y+10+bob, 3, 5, '#226699');
    fr(x+8, y+10, 3, 5, '#226699');
  }

  // Body
  fr(x+4, y+5, 9, 7, PAL.ACCENT);   // teal shirt

  // Head
  fr(x+4, y+0, 9, 6, '#ffcc99');    // skin

  // Eyes
  if (dir === 2) {
    fr(x+6, y+2, 2, 2, '#222');
    fr(x+10, y+2, 2, 2, '#222');
  } else if (dir === 0) {
    // back of head — just hair
  } else if (dir === 1) {
    fr(x+11, y+2, 2, 2, '#222');
  } else {
    fr(x+4, y+2, 2, 2, '#222');
  }

  // Hair
  fr(x+4, y+0, 9, 2, '#554433');
}

function drawNPC(px, py, dir, color) {
  const x = Math.floor(px);
  const y = Math.floor(py);

  // Shadow
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x+8, y+15, 4, 2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Legs
  fr(x+5, y+10, 3, 5, '#555566');
  fr(x+9, y+10, 3, 5, '#555566');
  // Body
  fr(x+4, y+5, 9, 7, color);
  // Head
  fr(x+4, y+0, 9, 6, '#ffcc99');
  // Eyes
  if (dir === 2) {
    fr(x+6, y+2, 2, 2, '#222');
    fr(x+10, y+2, 2, 2, '#222');
  } else if (dir === 1) {
    fr(x+11, y+2, 2, 2, '#222');
  } else if (dir === 3) {
    fr(x+4, y+2, 2, 2, '#222');
  }
  // Hair
  fr(x+4, y+0, 9, 2, '#443322');
}

// Draw a starter pedestal
function drawPedestal(px, py, label) {
  // Pillar base
  fr(px+2, py+10, 12, 4, '#446677');
  fr(px+4, py+6,  8,  5, '#557788');
  // Poke-ball style orb on top
  ctx.fillStyle = '#aa3333';
  ctx.beginPath(); ctx.arc(px+8, py+4, 4, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#eeeeee';
  ctx.beginPath(); ctx.arc(px+8, py+4, 4, 0, Math.PI); ctx.fill();
  sr(px+4, py+0, 8, 8, '#fff', 1);
  // Line across middle
  fr(px+4, py+3, 8, 2, '#222');
  // Label
  drawText(label, px+8, py+16, { color: PAL.TEXT, size: 5, align:'center' });
}

// ── Overworld State ──────────────────────────────────────────
const overworldState = (function() {
  let map = null;

  function enter(mapId) {
    const mid = mapId || PLAYER.mapId;
    map = MAPS[mid];
    PLAYER.mapId = mid;
    // Player position is set by PLAYER initializer (first boot)
    // or by checkExit() before setState — do not override here.
    PLAYER.stepTimer = 0;
    npcDialogue = null;
  }

  function tileAt(tx, ty) {
    if (!map) return T.WALL;
    if (tx < 0 || ty < 0 || tx >= map.w || ty >= map.h) return T.WALL;
    return map.tiles[ty][tx];
  }

  function getNPCAt(tx, ty) {
    if (!map || !map.npcs) return null;
    return map.npcs.find(n => n.x === tx && n.y === ty && !n.defeated && !n.hidden) || null;
  }

  function startTrainerBattle(npc) {
    const team = npc.team.map(t => Object.assign({}, t, { hp: t.maxHp, revealedStats: new Set() }));
    const first = team.shift();
    dexSee(first.name);
    setState('battle', {
      wild: first, fighter: PLAYER.party[0],
      isTrainer: true, trainerTeam: team,
      trainerId: npc.id, trainerName: npc.trainerName || 'Trainer',
      trainerReward: npc.reward || 100,
    });
  }

  function triggerRivalEncounter() {
    PLAYER.y += 1; // step back from the blocked exit (north exit — push south, into town)
    const starterName = PLAYER.party[0] && PLAYER.party[0].name;
    const teamFn = AVERY_TEAMS[starterName] || AVERY_TEAMS.Querycub;
    const averyMon = teamFn();
    npcDialogue = {
      lines: [
        'Hey! Wait up!',
        "I'm Avery — I'm starting my journey today too.",
        'Professor Search gave me a partner of my own.',
        "Let's see whose Googlimon is stronger. Don't hold back!",
      ],
      lineIdx: 0, revealed: 0, timer: 0,
      onEnd: () => {
        dexSee(averyMon.name);
        setState('battle', {
          wild: averyMon, fighter: PLAYER.party[0],
          isTrainer: true, trainerTeam: [],
          trainerId: 'avery', trainerName: 'Avery',
          trainerReward: 150,
        });
      }
    };
  }

  function update() {
    // ── Dialogue mode ────────────────────────────────────────
    if (npcDialogue) {
      const line = npcDialogue.lines[npcDialogue.lineIdx] || '';
      if (npcDialogue.revealed < line.length) {
        npcDialogue.timer++;
        if (npcDialogue.timer >= 2) { npcDialogue.timer = 0; npcDialogue.revealed++; }
      }
      if (dialogueAdvance()) {
        if (npcDialogue.revealed < line.length) {
          npcDialogue.revealed = line.length;
        } else {
          npcDialogue.lineIdx++;
          if (npcDialogue.lineIdx >= npcDialogue.lines.length) {
            const onEnd = npcDialogue.onEnd;
            npcDialogue = null;
            if (onEnd) onEnd();
          } else {
            npcDialogue.revealed = 0;
            npcDialogue.timer = 0;
          }
        }
      }
      return;
    }

    // ── Menu / Badge case shortcuts ──────────────────────────
    if (!npcDialogue && pressed('KeyE')) { Sound.sfxConfirm(); setState('menu'); return; }
    if (pressed('KeyB')) { setState('badge_case'); return; }

    // ── Movement ─────────────────────────────────────────────
    if (PLAYER.stepTimer > 0) {
      PLAYER.stepTimer--;
      if (PLAYER.stepTimer === 0) {
        PLAYER.animFrame = (PLAYER.animFrame + 1) % 4;
        if (!checkExit()) checkWildEncounter();
      }
      return;
    }

    const dir = inputDir();
    if (dir !== -1) {
      PLAYER.dir = dir;
      let nx = PLAYER.x, ny = PLAYER.y;
      if (dir === 0) ny--;
      if (dir === 1) nx++;
      if (dir === 2) ny++;
      if (dir === 3) nx--;

      const tile = tileAt(nx, ny);
      const npcBlock = getNPCAt(nx, ny);

      if (WALKABLE.has(tile) && !npcBlock) {
        PLAYER.x = nx;
        PLAYER.y = ny;
        PLAYER.stepTimer = STEP_FRAMES;
      }
    }

    // ── Interaction (Enter) ───────────────────────────────────
    if (confirmPressed()) {
      let fx = PLAYER.x, fy = PLAYER.y;
      if (PLAYER.dir === 0) fy--;
      if (PLAYER.dir === 1) fx++;
      if (PLAYER.dir === 2) fy++;
      if (PLAYER.dir === 3) fx--;
      const npc = (map && map.npcs && map.npcs.find(n => n.x === fx && n.y === fy && !n.hidden)) || null;
      if (npc) {
        if (npc.id === 'prof_search') {
          if (!SAVE.starterChosen) {
            setState('prof_intro');
          } else {
            const starterName = PLAYER.party[0] ? PLAYER.party[0].name : 'your Googlimon';
            let lines;
            if (SAVE.flags.gym1_beaten) {
              lines = [
                `How is ${starterName} doing?`,
                "You've already conquered the Searchburg Gym — remarkable!",
                'The Index instability is getting worse. Stay alert out there.',
              ];
            } else if (SAVE.flags.malware_first_encounter) {
              lines = [
                `${starterName} looks strong, ${SAVE.playerName}.`,
                'I heard Team Malware confronted you in Crawler Woods...',
                "Be careful. Whatever they want with the Index, it can't be good.",
                "Scout Searcher's Gym in Searchburg awaits when you're ready.",
              ];
            } else {
              lines = [
                `Ah, ${SAVE.playerName} and ${starterName}!`,
                "Searchburg's Gym Leader, Scout Searcher, uses Search-type Googlimon.",
                'Tip: Look for moves that are super effective against Search types.',
                'Good luck out there!',
              ];
            }
            npcDialogue = { lines, lineIdx: 0, revealed: 0, timer: 0 };
          }
        } else if (npc.id === 'nurse') {
          PLAYER.party.forEach(p => { p.hp = p.maxHp; p.moves && p.moves.forEach(m => { if (m.ppLeft !== undefined) m.ppLeft = m.pp; }); });
          npcDialogue = { lines: ['Welcome to the Googlimon Center!', 'Your Googlimon have been fully healed!', 'We hope to see you again!'], lineIdx: 0, revealed: 0, timer: 0 };
        } else if (npc.id === 'mart_clerk') {
          setState('mart');
        } else if (npc.isTrainer && !npc.defeated) {
          if (!PLAYER.party.length) {
            npcDialogue = { lines: ["..."], lineIdx: 0, revealed: 0, timer: 0 };
          } else if (npc.preBattleLines && !npc._preBattleShown) {
            npc._preBattleShown = true;
            npcDialogue = { lines: npc.preBattleLines, lineIdx: 0, revealed: 0, timer: 0, onEnd: () => startTrainerBattle(npc) };
          } else {
            startTrainerBattle(npc);
          }
        } else if (npc.defeated && npc.defeatScript) {
          npcDialogue = { lines: npc.defeatScript, lineIdx: 0, revealed: 0, timer: 0 };
        } else if (npc.script) {
          const lines = typeof npc.script === 'function' ? npc.script() : npc.script;
          npcDialogue = { lines, lineIdx: 0, revealed: 0, timer: 0, onEnd: npc.onTalkEnd ? () => npc.onTalkEnd(npc) : null };
        }
      }
    }
  }

  function checkExit() {
    if (!map.exits) return false;
    const ex = map.exits.find(e => e.x === PLAYER.x && e.y === PLAYER.y);
    if (ex) {
      if (PLAYER.mapId === 'cache_town' && ex.toMap === 'route1' &&
          SAVE.starterChosen && !SAVE.flags.rival_battle_1) {
        triggerRivalEncounter();
        return true;
      }
      PLAYER.mapId = ex.toMap;
      PLAYER.x = ex.toX;
      PLAYER.y = ex.toY;
      setState('overworld', ex.toMap);
      if (SAVE.starterChosen) { saveGame(); showNotif('GAME SAVED'); }
      return true;
    }
    return false;
  }

  function render() {
    // Clear
    fr(0, 0, W, H, PAL.BG);

    if (!map) return;

    const cam = getCam(map);

    // ── Tiles ────────────────────────────────────────────────
    const startTX = Math.floor(cam.x / TS);
    const startTY = Math.floor(cam.y / TS);
    const endTX = Math.min(startTX + VW + 1, map.w);
    const endTY = Math.min(startTY + VH + 1, map.h);

    for (let ty = startTY; ty < endTY; ty++) {
      for (let tx = startTX; tx < endTX; tx++) {
        const px = tx * TS - cam.x;
        const py = ty * TS - cam.y;
        drawTile(tileAt(tx, ty), px, py, G_TICK);
      }
    }

    // ── Pedestals (lab only) ─────────────────────────────────
    if (map.pedestals) {
      map.pedestals.forEach(p => {
        const px = p.x * TS - cam.x;
        const py = p.y * TS - cam.y;
        drawPedestal(px, py, p.label);
      });
    }

    // ── NPCs ─────────────────────────────────────────────────
    if (map.npcs) {
      map.npcs.forEach(npc => {
        const px = npc.x * TS - cam.x;
        const py = npc.y * TS - cam.y;
        drawNPC(px, py, npc.dir, npc.color);
      });
    }

    // ── Player ───────────────────────────────────────────────
    const ppx = PLAYER.x * TS - cam.x;
    const ppy = PLAYER.y * TS - cam.y;
    drawPlayer(ppx, ppy, PLAYER.dir, PLAYER.animFrame);

    // ── UI Panel ─────────────────────────────────────────────
    fr(0, UI_Y, W, H - UI_Y, PAL.PANEL);
    sr(0, UI_Y, W, H - UI_Y, PAL.BORDER, 1);
    drawText(map.name, 8, UI_Y + 6, { color: PAL.GOLD, size: 10, shadow: true });
    drawText('Move:WASD/Arrows  Talk:Enter  Menu:E  Help:F1', 8, UI_Y + 22, { color: PAL.TEXT_DIM, size: 6 });
    if (SAVE.playerName && SAVE.starterChosen) {
      drawText(SAVE.playerName, W - 8, UI_Y + 6, { color: PAL.ACCENT, size: 9, align: 'right', shadow: true });
    }

    // ── Dialogue overlay ─────────────────────────────────────
    if (npcDialogue) {
      drawDialogueBox(npcDialogue);
    }
  }

  return { enter, update, render };
})();

// ── Upgrade drawDialogueBox to typewriter ─────────────────────
// npcDialogue shape: { lines:[], lineIdx:0, revealed:0, timer:0 }
function drawDialogueBox(dlg) {
  const bx = 4, by = UI_Y - 68, bw = W - 8, bh = 64;
  // Dark semi-transparent backdrop for readability
  ctx.fillStyle = 'rgba(2,8,20,0.88)';
  ctx.fillRect(bx, by, bw, bh);
  drawPanel(bx, by, bw, bh, { bg: 'rgba(5,12,26,0.92)', outer: PAL.ACCENT, inner: PAL.BORDER });

  const line = dlg.lines[dlg.lineIdx] || '';
  const text = line.slice(0, dlg.revealed);
  drawTextWrapped(text, bx + 12, by + 14, bw - 24, { color: '#c8e8ff', size: 12, shadow: true, lineHeight: 15 });

  const fullyRevealed = dlg.revealed >= line.length;
  if (fullyRevealed) {
    const bl = (G_TICK % 30) < 20;
    if (bl) {
      if (dlg.lineIdx < dlg.lines.length - 1) {
        drawText('▼', bx + bw - 16, by + 44, { color: PAL.ACCENT, size: 10 });
      } else {
        drawText('[ Enter ]', bx + 12, by + 46, { color: PAL.GOLD, size: 9 });
      }
    }
  }
  drawText(`${dlg.lineIdx + 1}/${dlg.lines.length}`, bx + bw - 12, by + 48,
    { color: PAL.TEXT_DIM, size: 7, align: 'right' });
}

// ── Professor Intro State ─────────────────────────────────────
const profIntroState = (function() {
  let phase = 0;   // 0=intro dlg, 1=name prompt, 2=post-name dlg, 3=starter pick, 4=confirm choice, 5=outro dlg
  let lineIdx = 0;

  const INTRO_LINES = [
    'Oh! You actually came!',
    'Welcome to my laboratory.',
    'I am Professor Search,',
    'researcher of the Googlimon of Googlia.',
    'Strange glitches have appeared across the',
    'region. Ancient search algorithms corrupt',
    'data on every route. Wild Googlimon are',
    'acting erratically because of it.',
    'A brave trainer could help me investigate.',
    'But first — tell me about yourself.',
  ];

  let postNameLines = [];
  const mkPostName = name => [
    `${name}! What a great name.`,
    'These three Googlimon need a trainer.',
    'They have been waiting for someone like you.',
    'Please — choose your first partner!',
  ];

  let outroLines = [];
  const mkOutro = (name, starter) => [
    `Excellent choice! ${starter} is delighted!`,
    `Take good care of your ${starter}, ${name}.`,
    'I will send your Googlidex data right away.',
    `The fate of Googlia rests with you, ${name}.`,
    'Now go — your adventure begins!',
  ];

  // Per-line typewriter
  let twText = '', twRevealed = 0, twTimer = 0;
  const TW_RATE = 2;
  function twSet(t) { twText = t; twRevealed = 0; twTimer = 0; }
  function twTick() {
    if (twRevealed < twText.length) {
      twTimer++;
      if (twTimer >= TW_RATE) { twTimer = 0; twRevealed++; }
    }
  }
  function twDone()  { return twRevealed >= twText.length; }
  function twSkip()  { twRevealed = twText.length; }
  function twGet()   { return twText.slice(0, twRevealed); }

  // Starter cursor
  let starterCursor = 0;
  let confirmCursor = 0; // 0=YES, 1=NO
  let chosenName = '';

  function enter() {
    phase = 0;
    lineIdx = 0;
    starterCursor = 0;
    confirmCursor = 0;
    chosenName = '';
    SAVE.flags.met_professor = true;
    twSet(INTRO_LINES[0]);
    STARTERS.forEach(s => tryLoadBattleSprites(s.name));
  }

  function advanceLine(lines) {
    lineIdx++;
    if (lineIdx >= lines.length) return true; // done
    twSet(lines[lineIdx]);
    return false;
  }

  function update() {
    if (phase === 0) {
      twTick();
      if (confirmPressed()) {
        if (!twDone()) { twSkip(); return; }
        if (advanceLine(INTRO_LINES)) {
          phase = 1; // go to name prompt
        }
      }

    } else if (phase === 1) {
      // Name was already entered on title screen; skip prompt
      phase = 2;
      if (!SAVE.playerName) SAVE.playerName = 'PLAYER';
      postNameLines = mkPostName(SAVE.playerName);
      lineIdx = 0;
      twSet(postNameLines[0]);

    } else if (phase === 2) {
      twTick();
      if (confirmPressed()) {
        if (!twDone()) { twSkip(); return; }
        if (advanceLine(postNameLines)) {
          phase = 3;
          starterCursor = 0;
        }
      }

    } else if (phase === 3) {
      if (navLeft())  starterCursor = (starterCursor + 2) % 3;
      if (navRight()) starterCursor = (starterCursor + 1) % 3;
      if (confirmPressed()) {
        confirmCursor = 0;
        phase = 4; // confirm choice
      }
      if (cancelPressed()) {
        phase = 2; // go back to post-name lines
        lineIdx = postNameLines.length - 1;
        twSet(postNameLines[lineIdx]);
      }

    } else if (phase === 4) {
      if (navLeft())  confirmCursor = 0;
      if (navRight()) confirmCursor = 1;
      if (confirmPressed()) {
        if (confirmCursor === 0) {
          // YES — commit the choice
          chosenName = STARTERS[starterCursor].name;
          PLAYER.party.push(Object.assign({}, STARTERS[starterCursor]));
          SAVE.starterChosen = true;
          SAVE.flags.starter_chosen = true;
          outroLines = mkOutro(SAVE.playerName, chosenName);
          lineIdx = 0;
          twSet(outroLines[0]);
          phase = 5;
        } else {
          // NO — go back to picking
          phase = 3;
        }
      }
      if (cancelPressed()) { phase = 3; }

    } else if (phase === 5) {
      twTick();
      if (confirmPressed()) {
        if (!twDone()) { twSkip(); return; }
        if (advanceLine(outroLines)) {
          setState('overworld', 'lab_interior');
        }
      }
    }
  }

  // ── Full-screen dialogue box for intro ──────────────────────
  function renderIntroBox(speakerLabel) {
    // Dark scene backdrop
    fr(0, 0, W, H, '#08101a');

    // Professor sprite (large, left side)
    drawNPC(60, H/2 - 40, 1, '#ffffaa');
    drawText('Prof. Search', 76, H/2 + 10, { color: PAL.GOLD, size: 7, align:'center', shadow: true });

    // Teal-bordered dialogue panel
    const bx = 4, by = H - 84, bw = W - 8, bh = 80;
    // BG
    fr(bx, by, bw, bh, '#0d1f2d');
    // Teal double border
    sr(bx, by, bw, bh, PAL.ACCENT, 2);
    sr(bx+3, by+3, bw-6, bh-6, PAL.BORDER, 1);

    // Speaker name tab
    fr(bx+8, by-10, 80, 12, '#0d1f2d');
    sr(bx+8, by-10, 80, 12, PAL.ACCENT, 1);
    drawText(speakerLabel, bx+14, by-9, { color: PAL.ACCENT2, size: 7 });

    // Typewriter text
    drawTextWrapped(twGet(), bx+12, by+14, bw-24, { color: '#c8e8ff', size: 11, shadow: true, lineHeight: 14 });

    // Advance caret
    if (twDone()) {
      const blink = (G_TICK % 30) < 20;
      if (blink) drawText('▼', bx + bw - 16, by + bh - 16, { color: PAL.ACCENT2, size: 8 });
    }
  }

  // ── Starter Selection Render ──────────────────────────────
  function renderStarterSelect() {
    fr(0, 0, W, H, '#08101a');

    drawTextC('Choose your starter!', 12, { color: PAL.GOLD, size: 10, shadow: true });

    // 3 cards — centered in 480px: each 130px, 10px gap, 30px outer margin
    const cardW = 128, cardH = 180, topY = 36;
    const positions = [
      W/2 - cardW - 14,
      W/2 - cardW/2,
      W/2 + 14,
    ];

    STARTERS.forEach((s, i) => {
      const sx = positions[i];
      const sel = i === starterCursor;

      // Card background
      fr(sx, topY, cardW, cardH, sel ? '#112233' : '#0a1520');
      // Teal border for selected, dim border for others
      sr(sx, topY, cardW, cardH, sel ? PAL.ACCENT : PAL.BORDER, sel ? 2 : 1);
      if (sel) sr(sx+3, topY+3, cardW-6, cardH-6, PAL.BORDER, 1);

      // Sprite (centered in card, top portion) — PNG if loaded, else canvas fallback
      const spriteCX = sx + cardW/2;
      const spriteCY = topY + 68;
      const img = getSprite(`${s.name}_front`);
      if (img) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, spriteCX - 32, spriteCY - 32, 64, 64);
      } else {
        drawStarterSprite(i, spriteCX, spriteCY);
      }

      // Name
      drawText(s.name, sx + cardW/2, topY + 124, { color: sel ? PAL.TEXT : PAL.TEXT_DIM, size: 8, align:'center', shadow: sel });

      // Type badge (centered under name)
      const typeCol = TYPE_COL[s.type] ?? PAL.TEXT_DIM;
      const bw2 = 44, bh2 = 11;
      const bx2 = sx + cardW/2 - bw2/2;
      fr(bx2, topY+138, bw2, bh2, typeCol + '33');
      sr(bx2, topY+138, bw2, bh2, typeCol, 1);
      drawText(s.type.toUpperCase(), sx + cardW/2, topY+139, { color: typeCol, size: 6, align:'center' });

      // One-line description (wrapped to card width)
      drawTextWrapped(s.desc || '', sx + 6, topY+152, cardW - 12, { color: PAL.TEXT_DIM, size: 6, lineHeight: 8 });
    });

    // Arrow selection hint
    drawTextC('←→ / AD  Select      Enter  Confirm      E  Back', H - 14,
      { color: PAL.TEXT_DIM, size: 6 });
    // Selected name highlight
    drawTextC(`▶  ${STARTERS[starterCursor].name}  ◀`, H - 26, { color: PAL.GOLD, size: 8 });
  }

  // ── Confirmation prompt: "You chose X! Is that correct?" ────
  function renderConfirmPrompt() {
    const name = STARTERS[starterCursor].name;
    const bw3 = 240, bh3 = 64, bx3 = W/2 - bw3/2, by3 = H/2 - bh3/2;
    ctx.fillStyle = 'rgba(2,8,20,0.75)';
    ctx.fillRect(0, 0, W, H);
    fr(bx3, by3, bw3, bh3, '#08101a');
    sr(bx3, by3, bw3, bh3, PAL.GOLD, 2);
    sr(bx3+3, by3+3, bw3-6, bh3-6, PAL.BORDER, 1);

    drawTextC(`You chose ${name}!`, by3 + 12, { color: PAL.TEXT, size: 9, shadow: true });
    drawTextC('Is that correct?', by3 + 26, { color: PAL.TEXT_DIM, size: 8 });

    const opts = ['YES', 'NO'];
    opts.forEach((o, i) => {
      const sel = confirmCursor === i;
      drawText(o, bx3 + bw3/2 + (i === 0 ? -50 : 50), by3 + 44,
        { color: sel ? PAL.GOLD : PAL.TEXT_DIM, size: 10, align: 'center', shadow: sel });
    });
  }

  function render() {
    if (phase === 3) {
      renderStarterSelect();
    } else if (phase === 4) {
      renderStarterSelect();
      renderConfirmPrompt();
    } else {
      renderIntroBox('Prof. Search');
    }
  }

  return { enter, update, render };
})();

  se('Quantum','Security'); se('Quantum','AI'); se('Quantum','Browser'); se('Quantum','Electric');

function getEffectiveness(atkType, defType1, defType2) {
  const e1 = (TYPE_CHART[atkType] && TYPE_CHART[atkType][defType1]) ?? 1;
  const e2 = (defType2 && TYPE_CHART[atkType] && TYPE_CHART[atkType][defType2]) ?? 1;
  return e1 * e2;
}
