// ── Googlidex helpers ─────────────────────────────────────────
function dexSee(name) {
  if (!SAVE.dex[name]) SAVE.dex[name] = { seen: false, caught: false };
  SAVE.dex[name].seen = true;
}
function dexCatch(name) {
  if (!SAVE.dex[name]) SAVE.dex[name] = { seen: false, caught: false };
  SAVE.dex[name].seen = true;
  SAVE.dex[name].caught = true;
}

// ── Wild Googlimon generator ──────────────────────────────────
function xpToLevel(lv) { return Math.floor(lv * lv * 5); }

function generateWild(name, level) {
  const sp = SPECIES[name];
  if (!sp) return null;
  const sc = 1 + (level - 1) * 0.12;
  const maxHp = Math.max(10, Math.floor(sp.baseHp * sc));
  const moves = sp.learnset
    .filter(e => e.lv <= level)
    .map(e => Object.assign({}, e.move, { ppLeft: e.move.pp }))
    .slice(-4);
  return {
    name, level,
    type1: sp.type1, type2: sp.type2 || null,
    maxHp, hp: maxHp,
    atk: Math.max(5, Math.floor(sp.baseAtk * sc)),
    def: Math.max(5, Math.floor(sp.baseDef * sc)),
    spd: Math.max(5, Math.floor(sp.baseSpd * sc)),
    moves, catchRate: sp.catchRate, xpYield: sp.xpYield,
    status: null, revealedStats: new Set(),
  };
}

function checkWildEncounter() {
  if (!SAVE.starterChosen) return;
  if (!PLAYER.party.length) return;
  const map = MAPS[PLAYER.mapId];
  if (!map || !map.encounterPool) return;
  const tile = map.tiles[PLAYER.y] && map.tiles[PLAYER.y][PLAYER.x];
  if (!ENCOUNTER_TILES.has(tile)) return;
  if (Math.random() >= 1/6) return;

  const pool = map.encounterPool;
  const total = pool.reduce((s, e) => s + e.weight, 0);
  let r = Math.floor(Math.random() * total);
  const pick = pool.find(e => { r -= e.weight; return r < 0; }) || pool[0];
  const level = pick.minLv + Math.floor(Math.random() * (pick.maxLv - pick.minLv + 1));
  const wild = generateWild(pick.name, level);
  if (!wild) return;
  setState('battle', { wild, fighter: PLAYER.party[0] });
}

// ── Battle State ──────────────────────────────────────────────
const battleState = (function() {
  let wild = null, fighter = null;
  let phase = 'msg'; // 'msg'|'choose'|'move_menu'|'catch'|'level_up'|'done'
  let cursor = 0, moveCursor = 0;
  let msgs = [], msgText = '', msgRevealed = 0, msgTimer = 0;
  const MSG_RATE = 2;
  let afterMsg = null;
  let shakesNeeded = 0, shakes = 0, shakeTimer = 0, caughtSuccess = false;
  let levelUpMsg = '';
  let result = '';
  let isTrainer = false, trainerTeam = [], trainerId = null;
  let trainerName = '', trainerReward = 0;
  let afterLvUp = null;

  function enter(args) {
    wild = args.wild; const f = args.fighter;
    fighter = f;
    isTrainer = !!(args.isTrainer);
    trainerTeam = args.trainerTeam ? args.trainerTeam.slice() : [];
    trainerId   = args.trainerId  || null;
    trainerName = args.trainerName || 'Trainer';
    trainerReward = args.trainerReward || 0;
    afterLvUp = null;
    if (fighter.xp === undefined) { fighter.xp = 0; fighter.xpToNext = xpToLevel(fighter.level + 1); }
    // Normalize starter string-moves to objects
    if (fighter.moves && fighter.moves.length && typeof fighter.moves[0] === 'string') {
      fighter.moves = fighter.moves.map(name => ({
        name, type: fighter.type || fighter.type1 || 'Search', power: 40, pp: 30, ppLeft: 30
      }));
    }
    // Pre-load sprites for this battle
    tryLoadBattleSprites(wild.name);
    trainerTeam.forEach(m => tryLoadBattleSprites(m.name));
    phase = 'msg'; msgs = []; result = '';
    dexSee(wild.name);
    const intro = isTrainer
      ? `${trainerName} sent out ${wild.name}!`
      : `A wild ${wild.name} appeared!`;
    queueMsgs([intro], () => { phase = 'choose'; cursor = 0; });
  }

  function trainerEndSetup() {
    SAVE.credits += trainerReward;
    if (trainerId) {
      const m = MAPS[PLAYER.mapId];
      const npc = m && m.npcs && m.npcs.find(n => n.id === trainerId);
      if (npc) npc.defeated = true;
      if (!SAVE.trainerDefeated.includes(trainerId)) SAVE.trainerDefeated.push(trainerId);
      if (trainerId === 'scout_searcher') {
        if (!SAVE.badges.includes('Index Badge')) SAVE.badges.push('Index Badge');
        if (!SAVE.items['TM: Search Pulse']) SAVE.items['TM: Search Pulse'] = 0;
        SAVE.items['TM: Search Pulse']++;
        SAVE.flags.gym1_beaten = true;
      }
      if (trainerId === 'avery') {
        SAVE.flags.rival_battle_1 = true;
      }
    }
    const endMsgs = trainerId === 'scout_searcher'
      ? [`You defeated Scout Searcher!`, `The Index Badge is yours!`, `Take TM: Search Pulse!`]
      : trainerId === 'avery'
      ? [`You defeated Avery!`, `"I will not lose again."`, `Got ${trainerReward} credits!`]
      : [`You defeated ${trainerName}!`, `Got ${trainerReward} credits!`];
    queueMsgs(endMsgs, () => { phase = 'done'; });
  }

  function loadMsg() {
    if (msgs.length === 0) {
      if (afterMsg) { const cb = afterMsg; afterMsg = null; cb(); }
      return;
    }
    msgText = msgs.shift();
    msgRevealed = 0; msgTimer = 0;
    phase = 'msg';
  }

  function queueMsgs(arr, cb) {
    msgs.push(...arr);
    afterMsg = cb || null;
    loadMsg();
  }

  function calcDmg(lvl, power, atk, def, eff) {
    if (!power) return 0;
    const base = Math.floor((2*lvl/5+2) * power * atk / def / 50) + 2;
    return Math.max(1, Math.floor(base * eff * (0.85 + Math.random()*0.15)));
  }

  function revealStat() {
    const hidden = ['atk','def','spd'].filter(s => !wild.revealedStats.has(s));
    if (!hidden.length) return;
    const s = hidden[Math.floor(Math.random() * hidden.length)];
    wild.revealedStats.add(s);
    msgs.push(`Index! ${wild.name}'s ${s.toUpperCase()}: ${wild[s]}`);
  }

  function doEnemyTurn() {
    if (wild.hp <= 0) { phase = 'choose'; return; }
    const valid = wild.moves.filter(m => (m.ppLeft||m.pp) > 0);
    const move = valid.length ? valid[Math.floor(Math.random()*valid.length)] : wild.moves[0];
    if (move.ppLeft !== undefined) move.ppLeft = Math.max(0, move.ppLeft-1);
    const newMsgs = [`${wild.name} used ${move.name}!`];
    if (move.power > 0) {
      const pType = fighter.type || fighter.type1 || 'Search';
      const eff = getEffectiveness(move.type, pType, null);
      const dmg = calcDmg(wild.level, move.power, wild.atk, fighter.def, eff);
      fighter.hp = Math.max(0, fighter.hp - dmg);
      newMsgs.push(`${fighter.name} took ${dmg} dmg!`);
      if (eff >= 2) newMsgs.push("Super effective!");
      if (eff <= 0.5) newMsgs.push("Not very effective...");
    }
    if (fighter.hp <= 0) {
      fighter.hp = 0;
      newMsgs.push(`${fighter.name} fainted!`);
      Sound.sfxFaint();
      queueMsgs(newMsgs, () => { result = 'lose'; phase = 'done'; });
    } else {
      queueMsgs(newMsgs, () => { phase = 'choose'; });
    }
  }

  function doPlayerAttack(move) {
    if (move.ppLeft !== undefined) move.ppLeft = Math.max(0, move.ppLeft-1);
    const newMsgs = [`${fighter.name} used ${move.name}!`];
    if (move.power > 0) {
      const eff = getEffectiveness(move.type, wild.type1, wild.type2);
      const dmg = calcDmg(fighter.level, move.power, fighter.atk, wild.def, eff);
      wild.hp = Math.max(0, wild.hp - dmg);
      newMsgs.push(`Dealt ${dmg} damage!`);
      if (eff >= 2) { newMsgs.push("Super effective!"); revealStat(); }
      if (eff <= 0.5) newMsgs.push("Not very effective...");
    }
    if (wild.hp <= 0) {
      wild.hp = 0;
      newMsgs.push(`${isTrainer ? '' : 'Wild '}${wild.name} fainted!`);
      Sound.sfxFaint();
      queueMsgs(newMsgs, handleFaint);
    } else {
      queueMsgs(newMsgs, doEnemyTurn);
    }
  }

  function handleFaint() {
    const xp = Math.max(1, Math.floor(wild.xpYield * wild.level / 7));
    fighter.xp += xp;
    const newMsgs = [`${fighter.name} got ${xp} XP!`];
    const didLv = fighter.xp >= fighter.xpToNext;
    if (didLv) {
      fighter.xp -= fighter.xpToNext;
      fighter.level++;
      fighter.xpToNext = xpToLevel(fighter.level + 1);
      fighter.maxHp += 4; fighter.hp = Math.min(fighter.hp+4, fighter.maxHp);
      fighter.atk++;  fighter.def++;  fighter.spd++;
      levelUpMsg = `${fighter.name} → Lv.${fighter.level}!`;
      newMsgs.push(levelUpMsg);
      Sound.sfxLevelUp();
    }
    if (isTrainer && trainerTeam.length > 0) {
      const next = trainerTeam.shift();
      dexSee(next.name);
      const swapMsg = `${trainerName} sent out ${next.name}!`;
      if (didLv) {
        afterLvUp = () => { wild = next; queueMsgs([swapMsg], () => { phase = 'choose'; }); };
        queueMsgs(newMsgs, () => { phase = 'level_up'; });
      } else {
        wild = next;
        queueMsgs(newMsgs.concat([swapMsg]), () => { phase = 'choose'; });
      }
    } else {
      result = isTrainer ? 'trainer_win' : 'win';
      Sound.playVictory();
      if (didLv) {
        afterLvUp = isTrainer ? trainerEndSetup : () => { phase = 'done'; };
        queueMsgs(newMsgs, () => { phase = 'level_up'; });
      } else {
        if (isTrainer) queueMsgs(newMsgs, trainerEndSetup);
        else           queueMsgs(newMsgs, () => { phase = 'done'; });
      }
    }
  }

  function tryCatch() {
    const rate = Math.floor((3*wild.maxHp - 2*wild.hp) / (3*wild.maxHp) * wild.catchRate);
    const t = Math.max(1, Math.min(255, rate));
    shakesNeeded = 0;
    for (let i = 0; i < 4; i++) {
      if (Math.floor(Math.random()*256) < t) shakesNeeded++; else break;
    }
    caughtSuccess = (shakesNeeded === 4);
    shakes = 0; shakeTimer = 0; phase = 'catch';
  }

  function update() {
    if (phase === 'msg') {
      if (msgRevealed < msgText.length) {
        msgTimer++;
        if (msgTimer >= MSG_RATE) { msgTimer = 0; msgRevealed++; }
      }
      if (confirmPressed()) {
        if (msgRevealed < msgText.length) { msgRevealed = msgText.length; return; }
        loadMsg();
      }
      return;
    }

    if (phase === 'choose') {
      if (navUp())   cursor = (cursor+2)%3;
      if (navDown()) cursor = (cursor+1)%3;
      if (confirmPressed()) {
        if (cursor === 0) { phase = 'move_menu'; moveCursor = 0; }
        else if (cursor === 1) {
          if (isTrainer) { /* can't catch trainer Googlimon */ }
          else queueMsgs([`You threw a Cache Ball!`], () => { tryCatch(); });
        } else {
          if (Math.random() < 0.8) {
            result = 'flee';
            queueMsgs([`Got away safely!`], () => { phase = 'done'; });
          } else {
            queueMsgs([`Couldn't escape!`], doEnemyTurn);
          }
        }
      }
      return;
    }

    if (phase === 'move_menu') {
      const n = fighter.moves.length;
      if (navUp())   moveCursor = (moveCursor+n-1)%n;
      if (navDown()) moveCursor = (moveCursor+1)%n;
      if (confirmPressed()) { doPlayerAttack(fighter.moves[moveCursor]); }
      if (cancelPressed())  { phase = 'choose'; }
      return;
    }

    if (phase === 'catch') {
      shakeTimer++;
      if (shakeTimer > 45) {
        shakeTimer = 0;
        if (shakes < shakesNeeded) {
          shakes++;
        } else {
          if (caughtSuccess) {
            Sound.sfxCatch();
            dexCatch(wild.name);
            const c = Object.assign({}, wild, {
              hp: wild.maxHp, xp: 0, xpToNext: xpToLevel(wild.level+1),
              revealedStats: new Set(),
            });
            if (PLAYER.party.length < 6) PLAYER.party.push(c);
            result = 'catch';
            queueMsgs([`${wild.name} was caught!`, `Added to your team!`], () => { phase='done'; });
          } else {
            queueMsgs([`${wild.name} broke free!`], doEnemyTurn);
          }
        }
      }
      return;
    }

    if (phase === 'level_up') {
      if (confirmPressed()) {
        if (afterLvUp) { const cb = afterLvUp; afterLvUp = null; cb(); }
        else phase = 'done';
      }
      return;
    }

    if (phase === 'done') {
      if (result === 'lose') {
        setState('blackout');
        return;
      }
      if (SAVE.starterChosen) { saveGame(); showNotif('GAME SAVED'); }
      setState('overworld', PLAYER.mapId);
    }
  }

  // ── Render helpers ──────────────────────────────────────────
  function renderWildSprite(cx, cy) {
    // Try PNG sprite first (front view for enemy)
    const sprImg = getSprite(`${wild.name}_front`);
    if (sprImg) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sprImg, cx - 40, cy - 44, 80, 80);
      return;
    }
    const col = {
      Pixmouse:'#9966bb', Chirper:'#00bbcc', Bugbyte:'#44aa22',
      Mousenet:'#4488ee', Scoutgle:'#ddaa22', Lockup:'#22bb66',
      Seekrow:'#445599', Findrake:'#cc8822', Nullhound:'#76bc3a',
      Thinklet:'#8855cc', Puffbit:'#7aafc8',
    }[wild.name] || '#aaaaaa';
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI*2); ctx.fill();
    // Inner sheen
    ctx.fillStyle = col+'88';
    ctx.beginPath(); ctx.arc(cx-6, cy-8, 10, 0, Math.PI*2); ctx.fill();
    // Eyes
    fr(cx-8, cy-8, 5, 5, '#fff'); fr(cx+3, cy-8, 5, 5, '#fff');
    fr(cx-6, cy-6, 3, 3, '#222'); fr(cx+5, cy-6, 3, 3, '#222');
    // Species detail
    if (wild.name === 'Pixmouse') {
      fr(cx-8,cy-28,5,8,col); fr(cx+3,cy-28,5,8,col);  // ears
      fr(cx+20,cy-2,14,3,col);                           // tail
    } else if (wild.name === 'Chirper') {
      fr(cx+19,cy-6,10,6,'#ffaa00');                    // beak
      fr(cx-28,cy-4,10,14,col); fr(cx+18,cy-4,10,14,col); // wings
    } else if (wild.name === 'Bugbyte') {
      fr(cx-5,cy-34,4,12,col); fr(cx+1,cy-34,4,12,col); // antennae
      fr(cx-6,cy-36,6,5,'#ffdd00'); fr(cx,cy-36,6,5,'#ffdd00'); // tips
    } else if (wild.name === 'Mousenet') {
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx+2,cy+4,9,0,Math.PI*2); ctx.stroke();
      ctx.lineWidth=1; fr(cx+18,cy+8,14,3,col);
    } else if (wild.name === 'Scoutgle') {
      fr(cx-9,cy-28,6,8,col); fr(cx+3,cy-28,6,8,col);  // ears
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx+10,cy+8,9,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+17,cy+15); ctx.lineTo(cx+22,cy+21); ctx.stroke();
      ctx.lineWidth=1;
    } else if (wild.name === 'Lockup') {
      ctx.strokeStyle=col; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(cx,cy-30,12,Math.PI,0); ctx.stroke();
      ctx.lineWidth=1;
      fr(cx-6,cy-6,12,14,col);
      fr(cx-2,cy-2,4,8,'#fff');
      ctx.fillStyle='#ffee44';
      ctx.beginPath(); ctx.moveTo(cx-22,cy-2); ctx.lineTo(cx-14,cy+1); ctx.lineTo(cx-18,cy+6); ctx.lineTo(cx-12,cy+8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+22,cy-2); ctx.lineTo(cx+14,cy+1); ctx.lineTo(cx+18,cy+6); ctx.lineTo(cx+12,cy+8); ctx.fill();
    } else if (wild.name === 'Seekrow') {
      // Crow-like bird: sharp beak, tail feathers, wings
      fr(cx+18,cy-6,14,7,'#ffcc55');                           // beak
      fr(cx-26,cy-6,10,16,col); fr(cx+16,cy-6,10,16,col);    // wings
      fr(cx-4,cy+18,4,14,col); fr(cx,cy+18,4,14,col);         // tail
    } else if (wild.name === 'Findrake') {
      // Drake: ridged head crest, claws, search-lens eye
      fr(cx-10,cy-38,6,14,col); fr(cx+4,cy-38,6,14,col);      // head crest
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx-4,cy-8,9,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+5,cy-2); ctx.lineTo(cx+18,cy+8); ctx.stroke();
      ctx.lineWidth=1;
      fr(cx-20,cy+8,6,10,col); fr(cx+14,cy+8,6,10,col);       // front claws
    } else if (wild.name === 'Nullhound') {
      // Glitch-hound: jagged ears, corrupted fang grin
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.moveTo(cx-14,cy-22); ctx.lineTo(cx-6,cy-30); ctx.lineTo(cx-4,cy-18); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+14,cy-22); ctx.lineTo(cx+6,cy-30); ctx.lineTo(cx+4,cy-18); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx-6,cy+2); ctx.lineTo(cx-2,cy+2); ctx.lineTo(cx-4,cy+8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+2,cy+2); ctx.lineTo(cx+6,cy+2); ctx.lineTo(cx+4,cy+8); ctx.fill();
      ctx.strokeStyle = '#0f1a0a'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx-20,cy-4); ctx.lineTo(cx-12,cy-1); ctx.lineTo(cx-18,cy+3); ctx.stroke();
    }
  }

  function render() {
    fr(0, 0, W, H, '#060c16');

    // ── Enemy panel (top-right) ───────────────────────────────
    const ep = { x: W*0.52, y: 8, w: W*0.46, h: 94 };
    fr(ep.x, ep.y, ep.w, ep.h, PAL.PANEL);
    sr(ep.x, ep.y, ep.w, ep.h, PAL.BORDER, 1);
    drawText(wild.name, ep.x+6, ep.y+5, { color: '#c8e8ff', size: 11, shadow: true });
    drawText(`Lv.${wild.level}`, ep.x+ep.w-6, ep.y+5, { color:PAL.TEXT_DIM, size:9, align:'right' });
    drawTypeBadge(wild.type1, ep.x+6, ep.y+19);
    if (wild.type2) drawTypeBadge(wild.type2, ep.x+50, ep.y+19);
    const ehpRat = wild.hp / wild.maxHp;
    const ehpCol = ehpRat > 0.5 ? PAL.HP_HI : ehpRat > 0.25 ? PAL.HP_MED : PAL.HP_LOW;
    drawBar(ep.x+6, ep.y+34, ep.w-12, 7, ehpRat, ehpCol);
    drawText('HP', ep.x+6, ep.y+44, { color:PAL.TEXT_DIM, size:6 });
    // Revealed stats (Indexed Advantage)
    let rx = ep.x+6, ry = ep.y+56;
    wild.revealedStats.forEach(s => {
      const lbl = {atk:'ATK',def:'DEF',spd:'SPD'}[s];
      drawText(`${lbl}:${wild[s]}`, rx, ry, { color:PAL.GOLD, size:6 });
      rx += 60;
    });
    // Status
    if (wild.status) drawText(wild.status, ep.x+6, ep.y+70, { color:PAL.CORRUPTED, size:6 });

    // ── Wild sprite (top-left) ────────────────────────────────
    renderWildSprite(W*0.22, 72);

    // ── Player panel (mid-left) ───────────────────────────────
    const pp = { x: 8, y: 112, w: W*0.46, h: 56 };
    fr(pp.x, pp.y, pp.w, pp.h, PAL.PANEL2);
    sr(pp.x, pp.y, pp.w, pp.h, PAL.BORDER, 1);
    drawText(fighter.name, pp.x+6, pp.y+4, { color:'#c8e8ff', size:11, shadow:true });
    drawText(`Lv.${fighter.level}`, pp.x+pp.w-6, pp.y+4, { color:PAL.TEXT_DIM, size:9, align:'right' });
    drawHPBar(pp.x+6, pp.y+18, pp.w-12, 7, fighter.hp, fighter.maxHp);
    drawText(`${fighter.hp}/${fighter.maxHp}`, pp.x+6, pp.y+28, { color:PAL.TEXT_DIM, size:6 });
    const xpRat = fighter.xpToNext > 0 ? fighter.xp/fighter.xpToNext : 0;
    drawBar(pp.x+6, pp.y+42, pp.w-12, 4, xpRat, PAL.EXP);

    // ── Player battle sprite (mid-right) ─────────────────────
    const bc = W*0.72, by2 = 130;
    fr(bc-8, by2-24, 16, 20, PAL.ACCENT);
    fr(bc-6, by2-38, 12, 14, '#ffcc99');
    fr(bc-6, by2-40, 12, 4,  '#554433');
    fr(bc-6, by2-10, 5, 8,   '#226699');
    fr(bc+1, by2-10, 5, 8,   '#226699');

    // ── Message log ───────────────────────────────────────────
    const lp = { x:4, y:174, w:W-8, h:58 };
    fr(lp.x, lp.y, lp.w, lp.h, PAL.PANEL);
    sr(lp.x, lp.y, lp.w, lp.h, PAL.ACCENT, 1);
    if (phase === 'msg' && msgText) {
      drawTextWrapped(msgText.slice(0, msgRevealed), lp.x+10, lp.y+10, lp.w-20, { color:'#c8e8ff', size:11, shadow:true, lineHeight:14 });
      if (msgRevealed >= msgText.length) {
        if ((G_TICK%28)<18) drawText('▼', lp.x+lp.w-14, lp.y+lp.h-14, { color:PAL.ACCENT2, size:8 });
      }
    }

    // ── Action menu ───────────────────────────────────────────
    const mp = { x:4, y:238, w:W-8, h:78 };
    fr(mp.x, mp.y, mp.w, mp.h, PAL.PANEL2);
    sr(mp.x, mp.y, mp.w, mp.h, PAL.BORDER_HI, 1);

    if (phase === 'choose') {
      const menuLabels = isTrainer ? ['FIGHT','----','RUN'] : ['FIGHT','BALL','RUN'];
      menuLabels.forEach((lbl, i) => {
        const ix = mp.x + 12 + i*150, iy = mp.y+18;
        const sel = i===cursor;
        const disabled = isTrainer && i === 1;
        fr(ix-4, iy-4, 140, 48, sel ? '#0d2233' : '#080e18');
        sr(ix-4, iy-4, 140, 48, sel ? PAL.ACCENT : PAL.BORDER, 1);
        drawText(lbl, ix+66, iy+14, { color: disabled ? PAL.TEXT_DIM : sel ? PAL.GOLD : PAL.TEXT, size:10, align:'center', shadow:sel&&!disabled });
      });
      drawText('↑↓ Select   Enter Confirm', mp.x+8, mp.y+6, { color:PAL.TEXT_DIM, size:6 });
    }

    if (phase === 'move_menu') {
      drawText('Choose a move:  E Back', mp.x+8, mp.y+6, { color:PAL.TEXT_DIM, size:6 });
      fighter.moves.forEach((mv, i) => {
        const col2 = i%2, row2 = Math.floor(i/2);
        const ix = mp.x+8+col2*232, iy = mp.y+18+row2*28;
        const sel = i===moveCursor;
        fr(ix-2, iy-2, 224, 24, sel?'#0d2233':'#080e18');
        sr(ix-2, iy-2, 224, 24, sel?PAL.ACCENT:PAL.BORDER, 1);
        drawText(mv.name, ix+4, iy+2, { color:sel?'#c8e8ff':PAL.TEXT_DIM, size:9 });
        drawTypeBadge(mv.type, ix+4, iy+12);
        const pp2 = mv.ppLeft !== undefined ? mv.ppLeft : mv.pp;
        drawText(`PP:${pp2}`, ix+218, iy+6, { color:PAL.TEXT_DIM, size:6, align:'right' });
      });
    }

    if (phase === 'catch') {
      const wx2 = W/2-16, wy = 238;
      const bob = (G_TICK%8<4 && shakes < shakesNeeded) ? Math.sin(G_TICK*0.4)*4 : 0;
      ctx.fillStyle = '#cc3333';
      ctx.beginPath(); ctx.arc(wx2+16, wy+16+bob, 14, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#eeeeee';
      ctx.beginPath(); ctx.arc(wx2+16, wy+16+bob, 14, 0, Math.PI); ctx.fill();
      fr(wx2+2, wy+14+Math.round(bob), 28, 4, '#222');
      sr(wx2+2, wy+2+Math.round(bob), 28, 28, '#999', 1);
      for (let i=0; i<4; i++) {
        const dx=W/2-24+i*16, dy=wy+46;
        fr(dx, dy, 10, 10, i<shakes?PAL.GOLD:PAL.PANEL); sr(dx,dy,10,10,PAL.BORDER,1);
      }
      if (shakes >= shakesNeeded)
        drawText(caughtSuccess?'Caught!':'Broke free!', W/2, wy+62,
          { color:caughtSuccess?PAL.GOLD:PAL.TEXT_RED, size:8, align:'center', shadow:true });
    }

    if (phase === 'level_up') {
      const bx2=60, by3=90, bw2=360, bh2=130;
      fr(bx2,by3,bw2,bh2,PAL.PANEL);
      sr(bx2,by3,bw2,bh2,PAL.GOLD,2);
      drawText('LEVEL UP!', bx2+bw2/2, by3+14, { color:PAL.GOLD, size:12, align:'center', shadow:true });
      drawText(levelUpMsg, bx2+bw2/2, by3+42, { color:PAL.TEXT, size:9, align:'center' });
      drawText(`HP:${fighter.maxHp}  ATK:${fighter.atk}  DEF:${fighter.def}  SPD:${fighter.spd}`,
        bx2+bw2/2, by3+66, { color:PAL.TEXT_DIM, size:7, align:'center' });
      drawText('[ Enter ] Continue', bx2+bw2/2, by3+98, { color:PAL.ACCENT2, size:7, align:'center' });
    }
  }

  return { enter, update, render };
})();

STATES.battle = battleState;

// ============================================================
// BLACKOUT SEQUENCE (triggered when the player loses a battle)
// ============================================================
const blackoutState = (function() {
  const FADE_FRAMES = 60;  // 1 second @ 60fps
  const DOTS_FRAMES  = 50;
  const MSG_FRAMES   = 55;
  let tick = 0, fadeAlpha = 0, step = 0; // 0=fading 1="......" 2="You blacked out!" 3=warping
  let resolved = false;

  function enter() {
    tick = 0; fadeAlpha = 0; step = 0; resolved = false;
  }

  function doWarpAndHeal() {
    SAVE.credits = Math.floor(SAVE.credits / 2);
    PLAYER.party.forEach(p => {
      p.hp = p.maxHp;
      (p.moves || []).forEach(m => { if (m && typeof m === 'object' && m.ppLeft !== undefined) m.ppLeft = m.pp; });
    });

    let mapId, x, y, dir, lines;
    if (!SAVE.flags.met_professor) {
      mapId = 'cache_town'; x = 7; y = 7; dir = 3;
      lines = ['Oh sweetie, are you okay?', 'Let me heal your Googlimon.'];
    } else {
      mapId = 'center_interior'; x = 5; y = 5; dir = 0;
      lines = ['Oh my, you blacked out!', 'Let me heal your Googlimon right away.', 'There you go — good as new!'];
    }
    PLAYER.mapId = mapId; PLAYER.x = x; PLAYER.y = y; PLAYER.dir = dir;
    setState('overworld', mapId);
    npcDialogue = { lines, lineIdx: 0, revealed: 0, timer: 0 };
    if (SAVE.starterChosen) { saveGame(); showNotif('GAME SAVED'); }
  }

  function update() {
    tick++;
    if (step === 0) {
      fadeAlpha = Math.min(1, tick / FADE_FRAMES);
      if (tick >= FADE_FRAMES) { step = 1; tick = 0; }
      return;
    }
    if (step === 1) {
      if (tick >= DOTS_FRAMES) { step = 2; tick = 0; }
      return;
    }
    if (step === 2) {
      if (tick >= MSG_FRAMES && !resolved) {
        resolved = true;
        doWarpAndHeal();
      }
      return;
    }
  }

  function render() {
    // Frozen battle scene fading to black underneath the message
    if (STATES.battle && STATES.battle.render) STATES.battle.render();
    ctx.globalAlpha = step === 0 ? fadeAlpha : 1;
    fr(0, 0, W, H, '#000000');
    ctx.globalAlpha = 1;
    if (step >= 1) {
      const msg = step === 1 ? '......' : 'You blacked out!';
      drawTextC(msg, H / 2 - 6, { color: '#ffffff', size: 14, shadow: false });
    }
  }

  return { enter, update, render };
})();

const martState = (function() {
  let cursor = 0;

  function enter() { cursor = 0; }

  function update() {
    if (cancelPressed()) { setState('overworld', PLAYER.mapId); return; }
    const n = MART_ITEMS.length + 1; // +1 for Cancel
    if (navUp())   cursor = (cursor+n-1)%n;
    if (navDown()) cursor = (cursor+1)%n;
    if (confirmPressed()) {
      if (cursor === MART_ITEMS.length) { setState('overworld', PLAYER.mapId); return; }
      const item = MART_ITEMS[cursor];
      if (SAVE.credits >= item.price) {
        SAVE.credits -= item.price;
        if (!SAVE.items[item.key]) SAVE.items[item.key] = 0;
        SAVE.items[item.key]++;
      }
    }
  }

  function render() {
    fr(0, 0, W, H, PAL.BG);
    drawPanel(4, 4, W-8, H-8, { bg:PAL.PANEL, outer:PAL.ACCENT, inner:PAL.BORDER });
    drawText('MART', W/2, 16, { color:PAL.GOLD, size:11, align:'center', shadow:true });
    drawText(`Credits: ${SAVE.credits}`, W-16, 16, { color:PAL.ACCENT, size:7, align:'right' });

    MART_ITEMS.forEach((item, i) => {
      const iy = 44 + i*30;
      const sel = i === cursor;
      fr(20, iy-2, W-40, 24, sel ? '#0d2233' : '#080e18');
      sr(20, iy-2, W-40, 24, sel ? PAL.ACCENT : PAL.BORDER, 1);
      drawText(item.name, 32, iy+4, { color: sel ? PAL.TEXT : PAL.TEXT_DIM, size:8 });
      drawText(`${item.price} cr`, W-32, iy+4, { color: SAVE.credits >= item.price ? PAL.GOLD : PAL.TEXT_RED, size:7, align:'right' });
      const owned = SAVE.items[item.key] || 0;
      drawText(`x${owned}`, W-80, iy+4, { color:PAL.TEXT_DIM, size:6, align:'right' });
    });

    const cy = 44 + MART_ITEMS.length*30;
    const selC = cursor === MART_ITEMS.length;
    fr(20, cy-2, W-40, 24, selC ? '#0d2233' : '#080e18');
    sr(20, cy-2, W-40, 24, selC ? PAL.ACCENT : PAL.BORDER, 1);
    drawText('Cancel', 32, cy+4, { color: selC ? PAL.TEXT : PAL.TEXT_DIM, size:8 });

    drawText('↑↓ Navigate   Enter Buy / Confirm   E Cancel', W/2, H-12, { color:PAL.TEXT_DIM, size:6, align:'center' });
  }

  return { enter, update, render };
})();

// ── Sprite filename builder: ###_Name.png ─────────────────────
// DEX_LIST index + 1 = dex number = file prefix. Names in DEX_LIST
// are already in the exact format used in the filename.
function getSpriteFilename(name) {
  const idx = DEX_LIST.indexOf(name);
  if (idx < 0) return null;
  return String(idx + 1).padStart(3, '0') + '_' + name + '.png';
}

// One file per species; cache it under both front and back keys
// so drawBattleSprite can flip for the player's back-view.
function tryLoadBattleSprites(name) {
  const file = getSpriteFilename(name);
  if (!file) return;
  loadSprite(`${name}_front`, file);
  loadSprite(`${name}_back`,  file);
}

// ── Preload every known species' sprites at boot, tracked for
//    the loading-screen progress bar ───────────────────────────
function preloadAllSprites() {
  DEX_LIST.forEach(name => { if (name) tryLoadBattleSprites(name); });
}

// ── Draw sprite or fall back to canvas primitive ──────────────
function drawBattleSprite(name, cx, cy, side, size) {
  const key = `${name}_${side}`;
  const img = getSprite(key);
  if (img) {
    ctx.imageSmoothingEnabled = false;
    if (side === 'back') {
      // Flip horizontally so the player's mon faces away from the camera
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(-1, 1);
      ctx.drawImage(img, -size/2, -size/2, size, size);
      ctx.restore();
    } else {
      ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
    }
    return;
  }
  // Fallback: generic silhouette
  ctx.fillStyle = TYPE_COL[(SPECIES[name] && SPECIES[name].type1) || 'Search'] + 'aa';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath();
  ctx.arc(cx - size*0.08, cy - size*0.1, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  drawText(name.slice(0, 8), cx, cy + size*0.35, { color: PAL.TEXT, size: 7, align: 'center', shadow: true });
}

// ── Save / Load ───────────────────────────────────────────────
const SAVE_KEY = 'googlimon_v1';

function syncTrainerState() {
  Object.values(MAPS).forEach(m => {
    if (!m.npcs) return;
    m.npcs.forEach(n => {
      if (n.isTrainer && SAVE.trainerDefeated.includes(n.id)) n.defeated = true;
    });
  });
}

function saveGame() {
  if (!SAVE.starterChosen) return false;
  try {
    const data = {
      playerName: SAVE.playerName,
      starterChosen: SAVE.starterChosen,
      dex: SAVE.dex,
      credits: SAVE.credits,
      badges: SAVE.badges,
      items: SAVE.items,
      trainerDefeated: SAVE.trainerDefeated,
      flags: SAVE.flags,
      party: PLAYER.party.map(p => {
        const o = Object.assign({}, p);
        o.revealedStats = [];
        return o;
      }),
      mapId: PLAYER.mapId,
      px: PLAYER.x, py: PLAYER.y, pd: PLAYER.dir,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    return true;
  } catch(e) { return false; }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    SAVE.playerName      = d.playerName  || 'Player';
    SAVE.starterChosen   = d.starterChosen || false;
    SAVE.dex             = d.dex  || {};
    SAVE.credits         = d.credits != null ? d.credits : 500;
    SAVE.badges          = d.badges  || [];
    SAVE.items           = d.items   || {};
    SAVE.trainerDefeated = d.trainerDefeated || [];
    SAVE.flags = Object.assign({
      met_professor: false,
      starter_chosen: false,
      gym1_beaten: false,
      malware_first_encounter: false,
      rival_battle_1: false,
    }, d.flags || {});
    PLAYER.party = (d.party || []).map(p =>
      Object.assign({}, p, { revealedStats: new Set() })
    );
    PLAYER.mapId = d.mapId || 'cache_town';
    PLAYER.x = d.px != null ? d.px : 10;
    PLAYER.y = d.py != null ? d.py : 7;
    PLAYER.dir = d.pd != null ? d.pd : 2;
    syncTrainerState();
    return true;
  } catch(e) { return false; }
}

// ── Menu State ────────────────────────────────────────────────
const menuState = (function() {
  let screen = 'main';
  let cursor = 0;
  let dexOffset = 0;
  let partyCursor = 0;
  let partyDetailIdx = 0;
  let bagCat = 0;
  let bagCursor = 0;
  let bagUseCursor = 0;
  let bagUseItem = null;
  let confirmCursor = 0;

  const MAIN_OPTS = ['PARTY','GOOGLIDEX','BAG','BADGES','SAVE','QUIT'];
  const BAG_CATS  = ['Balls','Medicine','Key Items'];
  const BAG_KEYS  = [
    ['Cache Ball','Browser Ball'],
    ['Byte Potion','Data Shard'],
    ['TM: Search Pulse'],
  ];

  function enter() { screen = 'main'; cursor = 0; flushInput(); }

  function getCatItems() {
    return BAG_KEYS[bagCat].filter(k => (SAVE.items[k]||0) > 0)
      .map(k => ({ key: k, qty: SAVE.items[k] }));
  }

  function tryUseItem(item, monIdx) {
    const mon = PLAYER.party[monIdx];
    if (!mon) return false;
    if (item.key === 'Byte Potion') {
      if (mon.hp >= mon.maxHp) return false;
      mon.hp = Math.min(mon.maxHp, mon.hp + 30);
    } else if (item.key === 'Data Shard') {
      (mon.moves||[]).forEach(m => { if (m && typeof m === 'object' && m.ppLeft !== undefined) m.ppLeft = m.pp; });
    } else {
      return false;
    }
    SAVE.items[item.key]--;
    if (!SAVE.items[item.key]) delete SAVE.items[item.key];
    return true;
  }

  function update() {
    if (cancelPressed()) {
      if (screen === 'main') { setState('overworld', PLAYER.mapId); return; }
      if (screen === 'party_detail') { screen = 'party'; return; }
      if (screen === 'bag_use') { screen = 'bag'; bagCursor = 0; return; }
      screen = 'main'; cursor = 0; return;
    }

    if (screen === 'main') {
      const n = MAIN_OPTS.length;
      if (navUp())   cursor = (cursor+n-1)%n;
      if (navDown()) cursor = (cursor+1)%n;
      if (confirmPressed()) {
        const opt = MAIN_OPTS[cursor];
        if (opt === 'PARTY')    { screen='party';   partyCursor=0; }
        if (opt === 'GOOGLIDEX'){ screen='dex';     dexOffset=0; }
        if (opt === 'BAG')      { screen='bag';     bagCat=0; bagCursor=0; }
        if (opt === 'BADGES')   { screen='badges'; }
        if (opt === 'SAVE')     { screen='save_confirm'; confirmCursor=1; }
        if (opt === 'QUIT')     { screen='quit_confirm'; confirmCursor=1; }
      }
    }

    else if (screen === 'party') {
      const n = PLAYER.party.length || 1;
      if (navUp())   partyCursor = (partyCursor+n-1)%n;
      if (navDown()) partyCursor = (partyCursor+1)%n;
      if (confirmPressed() && PLAYER.party.length) { partyDetailIdx = partyCursor; screen = 'party_detail'; }
    }

    else if (screen === 'dex') {
      const cols = 3;
      if (navUp())   dexOffset = Math.max(0, dexOffset - cols);
      if (navDown()) dexOffset = Math.min(DEX_LIST.length - cols, dexOffset + cols);
    }

    else if (screen === 'bag') {
      if (navLeft())  { bagCat = (bagCat+2)%3; bagCursor=0; }
      if (navRight()) { bagCat = (bagCat+1)%3; bagCursor=0; }
      const items = getCatItems();
      if (items.length) {
        if (navUp())   bagCursor = (bagCursor+items.length-1)%items.length;
        if (navDown()) bagCursor = (bagCursor+1)%items.length;
      }
      if (confirmPressed() && items.length) {
        bagUseItem = items[bagCursor];
        bagUseCursor = 0;
        screen = 'bag_use';
      }
    }

    else if (screen === 'bag_use') {
      const n = PLAYER.party.length || 1;
      if (navUp())   bagUseCursor = (bagUseCursor+n-1)%n;
      if (navDown()) bagUseCursor = (bagUseCursor+1)%n;
      if (confirmPressed() && bagUseItem) {
        if (tryUseItem(bagUseItem, bagUseCursor)) { screen = 'bag'; bagCursor = 0; }
      }
    }

    else if (screen === 'save_confirm' || screen === 'quit_confirm') {
      if (navLeft())  confirmCursor = 0;
      if (navRight()) confirmCursor = 1;
      if (confirmPressed()) {
        if (confirmCursor === 0) {
          if (screen === 'save_confirm') { saveGame(); showNotif('GAME SAVED'); screen = 'main'; }
          else { setState('title'); return; }
        } else {
          screen = 'main';
        }
      }
    }
  }

  // ── Sub-screen renderers ──────────────────────────────────────

  function dim() { ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H); }

  function renderMain() {

    drawText('MENU', px+pw/2, py+10, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    MAIN_OPTS.forEach((opt,i) => {
      const sel = i===cursor;
      const oy = py+32+i*28;
      if (sel) fr(px+10,oy-3,pw-20,22,'#0d2233');
      drawText((sel?'► ':' ')+opt, px+18, oy+2, {color:sel?PAL.GOLD:PAL.TEXT,size:8});
    });
    drawText('Enter Confirm   E Close', px+pw/2, py+ph-10, {color:PAL.TEXT_DIM,size:6,align:'center'});

  function renderDex() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    const seen   = Object.values(SAVE.dex).filter(e=>e.seen).length;

    drawText(`Seen: ${seen}  Caught: ${caught}/150`, W/2, 26, {color:PAL.TEXT_DIM,size:6,align:'center'});

    const cols=3, cellW=Math.floor((W-16)/cols), cellH=28;

    for (let row=0; row<rowsVis; row++) {

  function render() {
    if (screen==='main')         renderMain();
    else if (screen==='party')        renderParty();
    else if (screen==='party_detail') renderPartyDetail();
    else if (screen==='dex')          renderDex();
    else if (screen==='bag')          renderBag();
    else if (screen==='bag_use')      renderBagUse();
    else if (screen==='badges')       renderBadges();
    else if (screen==='save_confirm') renderConfirm('Save your game?');
    else if (screen==='quit_confirm') renderConfirm('Return to title screen?','Unsaved progress will be lost.');
  }

  return { enter, update, render };
})();
STATES.menu = menuState;

// ── Index-instability glitch overlay ──────────────────────────
let glitchTimer = 0;
let glitchBars = [];
function maybeTriggerGlitch() {
  if (Math.random() < 0.0008) {
    glitchTimer = 3;
    Sound.sfxGlitch();
    const n = 2 + Math.floor(Math.random() * 2); // 2-3 bars
    glitchBars = [];
    for (let i = 0; i < n; i++) {
      glitchBars.push({
        y: Math.floor(Math.random() * H),
        h: 2 + Math.floor(Math.random() * 5),
        color: Math.random() < 0.5 ? PAL.ACCENT : PAL.T_VIRUS,
      });
    }
  }
}
function renderGlitch() {
  glitchBars.forEach(b => {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = b.color;
    ctx.fillRect(0, b.y, W, b.h);
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, b.y, W, 1);
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// GAME LOOP
// ============================================================
function drawSpeakerIcon() {
  const x = W - 16, y = 5, muted = Sound.isMuted();
  ctx.globalAlpha = 0.85;
  fr(x - 2, y - 2, 16, 12, '#05080f');
  ctx.fillStyle = muted ? PAL.TEXT_DIM : PAL.ACCENT;
  // speaker body
  ctx.fillRect(x, y + 2, 3, 4);
  ctx.beginPath();
  ctx.moveTo(x + 3, y + 2); ctx.lineTo(x + 7, y - 1); ctx.lineTo(x + 7, y + 9); ctx.lineTo(x + 3, y + 6);
  ctx.closePath(); ctx.fill();
  if (muted) {
    // diagonal mute slash
    ctx.strokeStyle = PAL.TEXT_RED; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x + 9, y - 1); ctx.lineTo(x + 13, y + 9); ctx.stroke();
  } else {
    // sound waves
    ctx.strokeStyle = PAL.ACCENT; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x + 6, y + 4, 5, -0.5, 0.5); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function loop() {
  G_TICK++;
  Sound.update();
  const s = STATES[currentState];
  if (s) {
    s.update();
    s.render();
  } else {
    fr(0, 0, W, H, PAL.BG);
    drawTextC(`Unknown state: "${currentState}"`, H / 2, { color: PAL.TEXT_RED });
  }
  // Index-instability glitch overlay
  if (glitchTimer > 0) { renderGlitch(); glitchTimer--; }
  else { maybeTriggerGlitch(); }
  // Global notification banner
  if (NOTIF.timer > 0) {
    NOTIF.timer--;
    const nAlpha = Math.min(1, NOTIF.timer / 20);
    ctx.globalAlpha = nAlpha;
    const nw = 192, nh = 24;
    fr(W/2-nw/2, 4, nw, nh, '#05080f');
    sr(W/2-nw/2, 4, nw, nh, PAL.GOLD, 2);
    drawText(NOTIF.text, W/2, 10, { color: PAL.GOLD, size: 10, align: 'center', shadow: true });
    ctx.globalAlpha = 1;
  }
  drawSpeakerIcon();
  requestAnimationFrame(loop);
}

// ── Boot ────────────────────────────────────────────────────
// F1 / ? opens controls overlay from any state
document.addEventListener('keydown', e => {
  if (e.code === 'F1' || e.code === 'Slash') {
    e.preventDefault();
    if (currentState !== 'controls') {
      controlsPrevState = currentState;
      setState('controls');
    }
  }
});

setState('loading');
requestAnimationFrame(loop);

</script>
