// ── Googlidex helpers ─────────────────────────────────────────
function dexSee(name) {
  if (!SAVE.dex[name]) SAVE.dex[name] = { seen: false, caught: false };
  SAVE.dex[name].seen = true;
}
function dexCatch(name) {
  if (!SAVE.dex[name]) SAVE.dex[name] = { seen: false, caught: false };
  SAVE.dex[name].seen = true;
  SAVE.dex[name].caught = true;
}

// ── Wild Googlimon generator ──────────────────────────────────
function xpToLevel(lv) { return Math.floor(lv * lv * 5); }

function levelUpMon(mon) {
  mon.level++;
  mon.xp = 0;
  mon.xpToNext = xpToLevel(mon.level + 1);
  mon.maxHp += 4; mon.hp = Math.min(mon.hp + 4, mon.maxHp);
  mon.atk = (mon.atk || 5) + 1;
  mon.def = (mon.def || 5) + 1;
  mon.spd = (mon.spd || 5) + 1;
  const sp = SPECIES[mon.name];
  if (sp) {
    sp.learnset.filter(e => e.lv === mon.level).forEach(entry => {
      const mv = Object.assign({}, entry.move, { ppLeft: entry.move.pp });
      if (!mon.moves) mon.moves = [];
      if (mon.moves.length < 4) mon.moves.push(mv);
      else mon.moves[mon.moves.length - 1] = mv;
    });
  }
  // Check evolution
  const evo = EVOLUTIONS[mon.name];
  if (evo && mon.level >= evo.at) {
    const newSp = SPECIES[evo.into];
    if (newSp) {
      const sc = 1 + (mon.level - 1) * 0.12;
      const newMaxHp = Math.max(10, Math.floor(newSp.baseHp * sc));
      mon.hp = Math.min(mon.hp + (newMaxHp - mon.maxHp), newMaxHp);
      mon.maxHp = newMaxHp;
      mon.atk = Math.max(1, Math.floor(newSp.baseAtk * sc));
      mon.def = Math.max(1, Math.floor(newSp.baseDef * sc));
      mon.spd = Math.max(1, Math.floor(newSp.baseSpd * sc));
      mon.type1 = newSp.type1;
      if (newSp.type2) mon.type2 = newSp.type2; else delete mon.type2;
      mon.name = evo.into;
      return evo.into;
    }
  }
  return null;
}

function generateWild(name, level) {
  const sp = SPECIES[name];
  if (!sp) return null;
  const sc = 1 + (level - 1) * 0.12;
  const maxHp = Math.max(10, Math.floor(sp.baseHp * sc));
  const moves = sp.learnset
    .filter(e => e.lv <= level)
    .map(e => Object.assign({}, e.move, { ppLeft: e.move.pp }))
    .slice(-4);
  return {
    name, level,
    type1: sp.type1, type2: sp.type2 || null,
    maxHp, hp: maxHp,
    atk: Math.max(5, Math.floor(sp.baseAtk * sc)),
    def: Math.max(5, Math.floor(sp.baseDef * sc)),
    spd: Math.max(5, Math.floor(sp.baseSpd * sc)),
    moves, catchRate: sp.catchRate, xpYield: sp.xpYield,
    status: null, revealedStats: new Set(),
  };
}

function checkWildEncounter() {
  if (!SAVE.starterChosen) return;
  if (!PLAYER.party.length) return;
  const map = MAPS[PLAYER.mapId];
  if (!map || !map.encounterPool) return;
  const tile = map.tiles[PLAYER.y] && map.tiles[PLAYER.y][PLAYER.x];
  if (!ENCOUNTER_TILES.has(tile)) return;
  if (Math.random() >= 1/6) return;

  const pool = map.encounterPool;
  const total = pool.reduce((s, e) => s + e.weight, 0);
  let r = Math.floor(Math.random() * total);
  const pick = pool.find(e => { r -= e.weight; return r < 0; }) || pool[0];
  const level = pick.minLv + Math.floor(Math.random() * (pick.maxLv - pick.minLv + 1));
  const wild = generateWild(pick.name, level);
  if (!wild) return;
  setState('battle', { wild, fighter: PLAYER.party[0] });
}

const battleState = (function() {
  let wild = null, fighter = null;
  let phase = 'msg'; // 'msg'|'choose'|'move_menu'|'switch_party'|'catch'|'level_up'|'done'
  let cursor = 0, moveCursor = 0, switchCursor = 0;
  let forcedSwitch = false;
  let msgs = [], msgText = '', msgRevealed = 0, msgTimer = 0;
  const MSG_RATE = 2;
  let afterMsg = null;
  let shakesNeeded = 0, shakes = 0, shakeTimer = 0, caughtSuccess = false;
  let levelUpMsg = '';
  let result = '';
  let isTrainer = false, trainerTeam = [], trainerId = null;
  let trainerName = '', trainerReward = 0;
  let afterLvUp = null;

  function enter(args) {
    wild = args.wild; const f = args.fighter;
    fighter = f;
    isTrainer = !!(args.isTrainer);
    trainerTeam = args.trainerTeam ? args.trainerTeam.slice() : [];
    trainerId   = args.trainerId  || null;
    trainerName = args.trainerName || 'Trainer';
    trainerReward = args.trainerReward || 0;
    afterLvUp = null;
    if (fighter.xp === undefined) { fighter.xp = 0; fighter.xpToNext = xpToLevel(fighter.level + 1); }
    // Normalize starter string-moves to objects
    if (fighter.moves && fighter.moves.length && typeof fighter.moves[0] === 'string') {
      fighter.moves = fighter.moves.map(name => ({
        name, type: fighter.type || fighter.type1 || 'Search', power: 40, pp: 30, ppLeft: 30
      }));
    }
    // Pre-load sprites for this battle
    tryLoadBattleSprites(wild.name);
    trainerTeam.forEach(m => tryLoadBattleSprites(m.name));
    phase = 'msg'; msgs = []; result = '';
    dexSee(wild.name);
    const intro = isTrainer
      ? `${trainerName} sent out ${wild.name}!`
      : `A wild ${wild.name} appeared!`;
    queueMsgs([intro], () => { phase = 'choose'; cursor = 0; });
  }

      : trainerId === 'nimbus'
      ? [`You defeated Nimbus!`, `The Query Badge is yours!`, `Take TM: Cloud Burst!`]
      : trainerId === 'avery'
      ? [`You defeated Avery!`, `"I will not lose again."`, `Got ${trainerReward} credits!`]
      : trainerId === 'cipher_ff'
      ? [`You defeated Cipher!`, `The Firewall Badge is yours!`, `Take TM: Null Route!`]
      : trainerId === 'player_one'
      ? [`You defeated Player One!`, `The Pixel Badge is yours!`, `Take TM: Pixel Crash!`]
      : trainerId === 'dr_prompt'
      ? [`You defeated Dr. Prompt!`, `The Logic Badge is yours!`, `Take TM: Neural Override!`]
      : trainerId === 'nexus'
      ? [`You defeated Nexus!`, `The Nexus Badge is yours!`, `Take TM: Full Mesh!`, `The full circuit is complete!`]
      : trainerId === 'cache_e4'
      ? [`You defeated Cache — the Archivist!`, `The Archive Gate opens.`, `Got ${trainerReward} credits!`]
      : trainerId === 'firewall_e4'
      ? [`You defeated Firewall — the Guardian!`, `The Defense Grid is yours.`, `Got ${trainerReward} credits!`]
      : trainerId === 'vector_e4'
      ? [`You defeated Vector — the Engineer!`, `The Assembly Line falls silent.`, `Got ${trainerReward} credits!`]
      : trainerId === 'oracle_e4'
      ? [`You defeated Oracle — the Forecaster!`, `"...I did not predict this."`, `The Prediction Chamber opens.`, `The Champion awaits.`, `Got ${trainerReward} credits!`]
      : trainerId === 'prof_search_champion'
      ? [`You defeated Champion Professor Search!`, `"Good. The future belongs to people now."`, `Champion Rank awarded!`, `Master Index Pass granted!`, `Got ${trainerReward} credits!`]
      : trainerId === 'exec_trojan'
      ? [`You defeated Executive Trojan!`, `The quarantine seal is broken!`, `Team Malware is exposed!`]
      : trainerId === 'riley_ff'
      ? [`You defeated Riley!`, `"...You really are something else."`, `Got ${trainerReward} credits!`]
      : [`You defeated ${trainerName}!`, `Got ${trainerReward} credits!`];
    queueMsgs(endMsgs, () => { phase = 'done'; });
  }

  function loadMsg() {
    if (msgs.length === 0) {
      if (afterMsg) { const cb = afterMsg; afterMsg = null; cb(); }
      return;
    }
    msgText = msgs.shift();
    msgRevealed = 0; msgTimer = 0;
    phase = 'msg';
  }

  function queueMsgs(arr, cb) {
    msgs.push(...arr);
    afterMsg = cb || null;
    loadMsg();
  }

  function calcDmg(lvl, power, atk, def, eff) {
    if (!power) return 0;
    const scaledEff = eff > 1 ? 1 + (eff-1)*0.5 : eff < 1 ? 1 - (1-eff)*0.5 : 1;
    const base = Math.floor((2*lvl/5+2) * power * atk / def / 50) + 2;
    return Math.max(1, Math.floor(base * scaledEff * (0.85 + Math.random()*0.15)));
  }

  function revealStat() {
    const hidden = ['atk','def','spd'].filter(s => !wild.revealedStats.has(s));
    if (!hidden.length) return;
    const s = hidden[Math.floor(Math.random() * hidden.length)];
    wild.revealedStats.add(s);
    msgs.push(`Index! ${wild.name}'s ${s.toUpperCase()}: ${wild[s]}`);
  }

  function doEnemyTurn() {
    if (wild.hp <= 0) { phase = 'choose'; return; }
    const valid = wild.moves.filter(m => (m.ppLeft||m.pp) > 0);
    const move = valid.length ? valid[Math.floor(Math.random()*valid.length)] : wild.moves[0];
    if (move.ppLeft !== undefined) move.ppLeft = Math.max(0, move.ppLeft-1);
    const newMsgs = [`${wild.name} used ${move.name}!`];
    if (move.power > 0) {
      const pType = fighter.type || fighter.type1 || 'Search';
      const eff = getEffectiveness(move.type, pType, null);
      const dmg = calcDmg(wild.level, move.power, wild.atk, fighter.def, eff);
      fighter.hp = Math.max(0, fighter.hp - dmg);
      newMsgs.push(`${fighter.name} took ${dmg} dmg!`);
      if (eff >= 2) newMsgs.push("Super effective!");
      if (eff <= 0.5) newMsgs.push("Not very effective...");
    }
    if (fighter.hp <= 0) {
      fighter.hp = 0;
      newMsgs.push(`${fighter.name} fainted!`);
      Sound.sfxFaint();
      queueMsgs(newMsgs, () => {
        const hasBackup = PLAYER.party.some(p => p !== fighter && p.hp > 0);
        if (hasBackup) { switchCursor = 0; forcedSwitch = true; phase = 'switch_party'; }
        else { result = 'lose'; phase = 'done'; }
      });
    } else {
      queueMsgs(newMsgs, () => { phase = 'choose'; });
    }
  }

  function doPlayerAttack(move) {
    if (move.ppLeft !== undefined) move.ppLeft = Math.max(0, move.ppLeft-1);
    const newMsgs = [`${fighter.name} used ${move.name}!`];
    if (move.power > 0) {
      const eff = getEffectiveness(move.type, wild.type1, wild.type2);
      const dmg = calcDmg(fighter.level, move.power, fighter.atk, wild.def, eff);
      wild.hp = Math.max(0, wild.hp - dmg);
      newMsgs.push(`Dealt ${dmg} damage!`);
      if (eff >= 2) { newMsgs.push("Super effective!"); revealStat(); }
      if (eff <= 0.5) newMsgs.push("Not very effective...");
    }
    if (wild.hp <= 0) {
      wild.hp = 0;
      newMsgs.push(`${isTrainer ? '' : 'Wild '}${wild.name} fainted!`);
      Sound.sfxFaint();
      queueMsgs(newMsgs, handleFaint);
    } else {
      queueMsgs(newMsgs, doEnemyTurn);
    }
  }

  function handleFaint() {
    const xp = Math.max(1, Math.floor(wild.xpYield * wild.level / 7));
    fighter.xp += xp;
    const newMsgs = [`${fighter.name} got ${xp} XP!`];
    const didLv = fighter.xp >= fighter.xpToNext;
    if (didLv) {
      fighter.xp -= fighter.xpToNext;
      fighter.level++;
      fighter.xpToNext = xpToLevel(fighter.level + 1);
      fighter.maxHp += 4; fighter.hp = Math.min(fighter.hp+4, fighter.maxHp);
      fighter.atk++;  fighter.def++;  fighter.spd++;
      levelUpMsg = `${fighter.name} → Lv.${fighter.level}!`;
      newMsgs.push(levelUpMsg);
      Sound.sfxLevelUp();
    }
    if (isTrainer && trainerTeam.length > 0) {
      const next = trainerTeam.shift();
      dexSee(next.name);
      const swapMsg = `${trainerName} sent out ${next.name}!`;
      if (didLv) {
        afterLvUp = () => { wild = next; queueMsgs([swapMsg], () => { phase = 'choose'; }); };
        queueMsgs(newMsgs, () => { phase = 'level_up'; });
      } else {
        wild = next;
        queueMsgs(newMsgs.concat([swapMsg]), () => { phase = 'choose'; });
      }
    } else {
      result = isTrainer ? 'trainer_win' : 'win';
      Sound.playVictory();
      if (didLv) {
        afterLvUp = isTrainer ? trainerEndSetup : () => { phase = 'done'; };
        queueMsgs(newMsgs, () => { phase = 'level_up'; });
      } else {
        if (isTrainer) queueMsgs(newMsgs, trainerEndSetup);
        else           queueMsgs(newMsgs, () => { phase = 'done'; });
      }
    }
  }

  function tryCatch() {
    const rate = Math.floor((3*wild.maxHp - 2*wild.hp) / (3*wild.maxHp) * wild.catchRate);
    const t = Math.max(1, Math.min(255, rate));
    shakesNeeded = 0;
    for (let i = 0; i < 4; i++) {
      if (Math.floor(Math.random()*256) < t) shakesNeeded++; else break;
    }
    caughtSuccess = (shakesNeeded === 4);
    shakes = 0; shakeTimer = 0; phase = 'catch';
  }

  function update() {
    if (phase === 'msg') {
      if (msgRevealed < msgText.length) {
        msgTimer++;
        if (msgTimer >= MSG_RATE) { msgTimer = 0; msgRevealed++;
          if (msgRevealed >= msgText.length) msgTimer = 0; }
      } else {
        if (msgTimer < 12) msgTimer++;
      }
      if (confirmPressed()) {
        if (msgRevealed < msgText.length) { msgRevealed = msgText.length; msgTimer = 0; return; }
        if (msgTimer < 12) return;
        loadMsg();
      }
      return;
    }

    if (phase === 'choose') {
      if (navUp()    || navDown())  cursor = cursor < 2 ? cursor+2 : cursor-2;
      if (navLeft()  || navRight()) cursor = cursor%2===0 ? cursor+1 : cursor-1;
      if (confirmPressed()) {
        if (cursor === 0) { phase = 'move_menu'; moveCursor = 0; }
        else if (cursor === 1) {
          if (isTrainer) { /* can't catch trainer Googlimon */ }
          else if ((SAVE.items['Cache Ball']||0) <= 0) {
            queueMsgs([`You have no Cache Balls!`], () => { phase = 'choose'; });
          } else {
            SAVE.items['Cache Ball']--;
            queueMsgs([`You threw a Cache Ball!`], () => { tryCatch(); });
          }
        } else if (cursor === 2) {
          const hasOther = PLAYER.party.some(p => p !== fighter && p.hp > 0);
          if (!hasOther) {
            queueMsgs([`No other Googlimon can fight!`], () => { phase = 'choose'; });
          } else {
            switchCursor = 0; forcedSwitch = false; phase = 'switch_party';
          }
        } else {
          if (isTrainer) {
            queueMsgs([`You can't run from a trainer battle!`], () => { phase = 'choose'; });
          } else if (Math.random() < 0.8) {
            result = 'flee';
            queueMsgs([`Got away safely!`], () => { phase = 'done'; });
          } else {
            queueMsgs([`Couldn't escape!`], doEnemyTurn);
          }
        }
      }
      return;
    }

    if (phase === 'move_menu') {
      const n = fighter.moves.length;
      if (navUp())   moveCursor = (moveCursor+n-1)%n;
      if (navDown()) moveCursor = (moveCursor+1)%n;
      if (confirmPressed()) { doPlayerAttack(fighter.moves[moveCursor]); }
      if (cancelPressed())  { phase = 'choose'; }
      return;
    }

    if (phase === 'switch_party') {
      const available = PLAYER.party.filter(p => p !== fighter && p.hp > 0);
      if (!available.length) { result = 'lose'; phase = 'done'; return; }
      if (navUp())   switchCursor = (switchCursor + available.length - 1) % available.length;
      if (navDown()) switchCursor = (switchCursor + 1) % available.length;
      if (cancelPressed() && !forcedSwitch) { phase = 'choose'; return; }
      if (confirmPressed()) {
        fighter = available[switchCursor];
        queueMsgs([`Go, ${fighter.name}!`], () => { phase = 'choose'; });
      }
      return;
    }

    if (phase === 'catch') {
      shakeTimer++;
      if (shakeTimer > 45) {
        shakeTimer = 0;
        if (shakes < shakesNeeded) {
          shakes++;
        } else {
          if (caughtSuccess) {
            Sound.sfxCatch();
            dexCatch(wild.name);
            const c = Object.assign({}, wild, {
              hp: wild.maxHp, xp: 0, xpToNext: xpToLevel(wild.level+1),
              revealedStats: new Set(),
            });
            if (PLAYER.party.length < 6) PLAYER.party.push(c);
            result = 'catch';
            queueMsgs([`${wild.name} was caught!`, `Added to your team!`], () => { phase='done'; });
          } else {
            queueMsgs([`${wild.name} broke free!`], doEnemyTurn);
          }
        }
      }
      return;
    }

    if (phase === 'level_up') {
      if (confirmPressed()) {
        if (afterLvUp) { const cb = afterLvUp; afterLvUp = null; cb(); }
        else phase = 'done';
      }
      return;
    }

    if (phase === 'done') {
      if (result === 'lose') {
        setState('blackout');
        return;
      }
      if (trainerId === 'prof_search_champion') {
        setState('champion_victory');
        return;
      }
      if (SAVE.starterChosen) { saveGame(); showNotif('GAME SAVED'); }
      setState('overworld', PLAYER.mapId);
    }
  }

  // ── Render helpers ──────────────────────────────────────────
  function renderWildSprite(cx, cy) {
    // Try PNG sprite first (front view for enemy)
    const sprImg = getSprite(`${wild.name}_front`);
    if (sprImg) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sprImg, cx - 40, cy - 44, 80, 80);
      return;
    }
    const col = {
      Pixmouse:'#9966bb', Chirper:'#00bbcc', Bugbyte:'#44aa22',
      Mousenet:'#4488ee', Scoutgle:'#ddaa22', Lockup:'#22bb66',
      Seekrow:'#445599', Findrake:'#cc8822', Nullhound:'#76bc3a',
      Thinklet:'#8855cc', Puffbit:'#7aafc8',
    }[wild.name] || '#aaaaaa';
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI*2); ctx.fill();
    // Inner sheen
    ctx.fillStyle = col+'88';
    ctx.beginPath(); ctx.arc(cx-6, cy-8, 10, 0, Math.PI*2); ctx.fill();
    // Eyes
    fr(cx-8, cy-8, 5, 5, '#fff'); fr(cx+3, cy-8, 5, 5, '#fff');
    fr(cx-6, cy-6, 3, 3, '#222'); fr(cx+5, cy-6, 3, 3, '#222');
    // Species detail
    if (wild.name === 'Pixmouse') {
      fr(cx-8,cy-28,5,8,col); fr(cx+3,cy-28,5,8,col);  // ears
      fr(cx+20,cy-2,14,3,col);                           // tail
    } else if (wild.name === 'Chirper') {
      fr(cx+19,cy-6,10,6,'#ffaa00');                    // beak
      fr(cx-28,cy-4,10,14,col); fr(cx+18,cy-4,10,14,col); // wings
    } else if (wild.name === 'Bugbyte') {
      fr(cx-5,cy-34,4,12,col); fr(cx+1,cy-34,4,12,col); // antennae
      fr(cx-6,cy-36,6,5,'#ffdd00'); fr(cx,cy-36,6,5,'#ffdd00'); // tips
    } else if (wild.name === 'Mousenet') {
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx+2,cy+4,9,0,Math.PI*2); ctx.stroke();
      ctx.lineWidth=1; fr(cx+18,cy+8,14,3,col);
    } else if (wild.name === 'Scoutgle') {
      fr(cx-9,cy-28,6,8,col); fr(cx+3,cy-28,6,8,col);  // ears
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx+10,cy+8,9,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+17,cy+15); ctx.lineTo(cx+22,cy+21); ctx.stroke();
      ctx.lineWidth=1;
    } else if (wild.name === 'Lockup') {
      ctx.strokeStyle=col; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(cx,cy-30,12,Math.PI,0); ctx.stroke();
      ctx.lineWidth=1;
      fr(cx-6,cy-6,12,14,col);
      fr(cx-2,cy-2,4,8,'#fff');
      ctx.fillStyle='#ffee44';
      ctx.beginPath(); ctx.moveTo(cx-22,cy-2); ctx.lineTo(cx-14,cy+1); ctx.lineTo(cx-18,cy+6); ctx.lineTo(cx-12,cy+8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+22,cy-2); ctx.lineTo(cx+14,cy+1); ctx.lineTo(cx+18,cy+6); ctx.lineTo(cx+12,cy+8); ctx.fill();
    } else if (wild.name === 'Seekrow') {
      // Crow-like bird: sharp beak, tail feathers, wings
      fr(cx+18,cy-6,14,7,'#ffcc55');                           // beak
      fr(cx-26,cy-6,10,16,col); fr(cx+16,cy-6,10,16,col);    // wings
      fr(cx-4,cy+18,4,14,col); fr(cx,cy+18,4,14,col);         // tail
    } else if (wild.name === 'Findrake') {
      // Drake: ridged head crest, claws, search-lens eye
      fr(cx-10,cy-38,6,14,col); fr(cx+4,cy-38,6,14,col);      // head crest
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx-4,cy-8,9,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+5,cy-2); ctx.lineTo(cx+18,cy+8); ctx.stroke();
      ctx.lineWidth=1;
      fr(cx-20,cy+8,6,10,col); fr(cx+14,cy+8,6,10,col);       // front claws
    } else if (wild.name === 'Nullhound') {
      // Glitch-hound: jagged ears, corrupted fang grin
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.moveTo(cx-14,cy-22); ctx.lineTo(cx-6,cy-30); ctx.lineTo(cx-4,cy-18); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+14,cy-22); ctx.lineTo(cx+6,cy-30); ctx.lineTo(cx+4,cy-18); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx-6,cy+2); ctx.lineTo(cx-2,cy+2); ctx.lineTo(cx-4,cy+8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+2,cy+2); ctx.lineTo(cx+6,cy+2); ctx.lineTo(cx+4,cy+8); ctx.fill();
      ctx.strokeStyle = '#0f1a0a'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx-20,cy-4); ctx.lineTo(cx-12,cy-1); ctx.lineTo(cx-18,cy+3); ctx.stroke();
    }
  }

      drawText('Choose a move:  E Back', mp.x+8, mp.y+6, { color:PAL.TEXT_DIM, size:8 });
      fighter.moves.forEach((mv, i) => {
        const col2 = i%2, row2 = Math.floor(i/2);
        const ix = mp.x+8+col2*232, iy = mp.y+18+row2*28;
        const sel = i===moveCursor;
        fr(ix-2, iy-2, 224, 24, sel?'#0d2233':'#080e18');
        sr(ix-2, iy-2, 224, 24, sel?PAL.ACCENT:PAL.BORDER, 1);
        drawText(mv.name, ix+4, iy+2, { color:sel?'#c8e8ff':PAL.TEXT_DIM, size:12 });
        drawTypeBadge(mv.type, ix+4, iy+14);
        const pp2 = mv.ppLeft !== undefined ? mv.ppLeft : mv.pp;
        drawText(`PP:${pp2}`, ix+218, iy+4, { color:PAL.TEXT_DIM, size:9, align:'right' });
      });
    }

    if (phase === 'catch') {
      const wx2 = W/2-16, wy = 238;
      const bob = (G_TICK%8<4 && shakes < shakesNeeded) ? Math.sin(G_TICK*0.4)*4 : 0;
      ctx.fillStyle = '#cc3333';
      ctx.beginPath(); ctx.arc(wx2+16, wy+16+bob, 14, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#eeeeee';
      ctx.beginPath(); ctx.arc(wx2+16, wy+16+bob, 14, 0, Math.PI); ctx.fill();
      fr(wx2+2, wy+14+Math.round(bob), 28, 4, '#222');
      sr(wx2+2, wy+2+Math.round(bob), 28, 28, '#999', 1);
      for (let i=0; i<4; i++) {
        const dx=W/2-24+i*16, dy=wy+46;
        fr(dx, dy, 10, 10, i<shakes?PAL.GOLD:PAL.PANEL); sr(dx,dy,10,10,PAL.BORDER,1);
      }
      if (shakes >= shakesNeeded)
        drawText(caughtSuccess?'Caught!':'Broke free!', W/2, wy+62,
          { color:caughtSuccess?PAL.GOLD:PAL.TEXT_RED, size:11, align:'center', shadow:true });
    }

    if (phase === 'level_up') {
      const bx2=60, by3=90, bw2=360, bh2=130;
      fr(bx2,by3,bw2,bh2,PAL.PANEL);
      sr(bx2,by3,bw2,bh2,PAL.GOLD,2);
      drawText('LEVEL UP!', bx2+bw2/2, by3+14, { color:PAL.GOLD, size:14, align:'center', shadow:true });
      drawText(levelUpMsg, bx2+bw2/2, by3+44, { color:PAL.TEXT, size:12, align:'center' });
      drawText(`HP:${fighter.maxHp}  ATK:${fighter.atk}  DEF:${fighter.def}  SPD:${fighter.spd}`,
        bx2+bw2/2, by3+68, { color:PAL.TEXT_DIM, size:9, align:'center' });
      drawText('[ Enter ] Continue', bx2+bw2/2, by3+98, { color:PAL.ACCENT2, size:9, align:'center' });
    }
  }

  return { enter, update, render };
})();

// ============================================================
// BLACKOUT SEQUENCE (triggered when the player loses a battle)
// ============================================================
const blackoutState = (function() {
  const FADE_FRAMES = 60;  // 1 second @ 60fps
  const DOTS_FRAMES  = 50;
  const MSG_FRAMES   = 55;
  let tick = 0, fadeAlpha = 0, step = 0; // 0=fading 1="......" 2="You blacked out!" 3=warping
  let resolved = false;

  function enter() {
    tick = 0; fadeAlpha = 0; step = 0; resolved = false;
  }

  function doWarpAndHeal() {
    SAVE.credits = Math.floor(SAVE.credits / 2);
    PLAYER.party.forEach(p => {
      p.hp = p.maxHp;
      (p.moves || []).forEach(m => { if (m && typeof m === 'object' && m.ppLeft !== undefined) m.ppLeft = m.pp; });
    });

    let mapId, x, y, dir, lines;
    if (SAVE.lastCenter) {
      mapId = SAVE.lastCenter; x = 5; y = 5; dir = 0;
      lines = ['Oh my, you blacked out!', 'Let me heal your Googlimon right away.', 'There you go — good as new!'];
    } else {
      mapId = 'cache_town'; x = 7; y = 7; dir = 3;
      lines = ['Oh sweetie, are you okay?', 'Let me heal your Googlimon.'];
    }
    PLAYER.mapId = mapId; PLAYER.x = x; PLAYER.y = y; PLAYER.dir = dir;
    setState('overworld', mapId);
    npcDialogue = { lines, lineIdx: 0, revealed: 0, timer: 0 };
    if (SAVE.starterChosen) { saveGame(); showNotif('GAME SAVED'); }
  }

  function update() {
    tick++;
    if (step === 0) {
      fadeAlpha = Math.min(1, tick / FADE_FRAMES);
      if (tick >= FADE_FRAMES) { step = 1; tick = 0; }
      return;
    }
    if (step === 1) {
      if (tick >= DOTS_FRAMES) { step = 2; tick = 0; }
      return;
    }
    if (step === 2) {
      if (tick >= MSG_FRAMES && !resolved) {
        resolved = true;
        doWarpAndHeal();
      }
      return;
    }
  }

  function render() {
    // Frozen battle scene fading to black underneath the message
    if (STATES.battle && STATES.battle.render) STATES.battle.render();
    ctx.globalAlpha = step === 0 ? fadeAlpha : 1;
    fr(0, 0, W, H, '#000000');
    ctx.globalAlpha = 1;
    if (step >= 1) {
      const msg = step === 1 ? '......' : 'You blacked out!';
      drawTextC(msg, H / 2 - 6, { color: '#ffffff', size: 14, shadow: false });
    }
  }

  return { enter, update, render };
})();
STATES.blackout = blackoutState;

const cloudCrisisState = (function() {
  let phase = 0;      // 0=glitch in, 1=dialogue, 2=fade out
  let tick = 0;
  let dlgIdx = 0;
  let dlgRevealed = 0;
  let dlgTimer = 0;

  const DIALOGUE = [
    { speaker:'— SYSTEM —',      text:'CLOUD CITY ARRAY CRITICAL FAILURE', color:'#ff4444' },
    { speaker:'— SYSTEM —',      text:'INDEX INSTABILITY DETECTED — CASCADE IN PROGRESS', color:'#ff4444' },
    { speaker:'Nimbus',           text:'This is Nimbus — the Cloud Array has been breached from below.', color:'#ccddff' },
    { speaker:'Nimbus',           text:'Team Malware has infiltrated the Index core beneath Firewall Falls.', color:'#ccddff' },
    { speaker:'Nimbus',           text:'You must go to Firewall Falls and stop the cascade before the whole region goes dark.', color:'#ccddff' },
    { speaker:'Nimbus',           text:'I cannot follow — I must hold what remains of the Cloud Array stable. This is on you.', color:'#ccddff' },
    { speaker:'Prof. Search',     text:'This is Professor Search — confirming Nimbus\'s warning. Emergency broadcast!', color:'#44ffaa' },
    { speaker:'Prof. Search',     text:'The Index is destabilizing. Data nodes going dark across the region.', color:'#44ffaa' },
    { speaker:'Prof. Search',     text:'Head to Firewall Falls. I will guide you from here. Be careful.', color:'#44ffaa' },
    { speaker:'— ???  —',         text:'Heh. Found it at last.', color:'#ff6622' },
    { speaker:'Executive Glitch', text:"The Index wasn't built. It was DISCOVERED.", color:'#ff6622' },
    { speaker:'Executive Glitch', text:'Team Malware will extract it before your \"professors\" even understand it.', color:'#ff6622' },
    { speaker:'Executive Glitch', text:'Enjoy watching your world glitch out. We\'re just getting started.', color:'#ff6622' },
    { speaker:'— SYSTEM —',       text:'Firewall Falls emergency access UNLOCKED', color:'#44aaff' },
    { speaker:'',                  text:'[ Press Enter to continue ]', color:'#888888' },
  ];

  function enter() {
    phase = 0; tick = 0; dlgIdx = 0; dlgRevealed = 0; dlgTimer = 0;
    SAVE.flags.cloud_crisis = true;
    Sound.playTrack('over_crisis');
  }

  function update() {
    tick++;
    if (phase === 0) {
      if (tick > 80) { phase = 1; tick = 0; }
      return;
    }
    if (phase === 1) {
      const line = DIALOGUE[dlgIdx];
      const fullLen = line.text.length;
      dlgTimer++;
      if (dlgTimer >= 2 && dlgRevealed < fullLen) {
        dlgRevealed++;
        dlgTimer = 0;
      }
      // Last line is just a prompt — advance on confirm
      if (dlgIdx === DIALOGUE.length - 1 && dlgRevealed >= fullLen) {
        if (confirmPressed()) {
          phase = 2; tick = 0;
        }
      } else if (dlgRevealed >= fullLen) {
        if (confirmPressed()) {
          dlgIdx++;
          dlgRevealed = 0;
          dlgTimer = 0;
        }
      }
      return;
    }
    if (phase === 2) {
      if (tick > 60) {
        setState('overworld', PLAYER.mapId);
      }
    }
  }

  function render() {
    fr(0, 0, W, H, '#000000');

    // Glitch noise overlay during phase 0
    if (phase === 0) {
      const glitchAmt = Math.max(0, 1 - tick / 80);
      for (let i = 0; i < 12; i++) {
        const gx = Math.floor((tick * 37 + i * 97) % W);
        const gy = Math.floor((tick * 13 + i * 53) % H);
        const gw = Math.floor(20 + (i * 23) % 60);
        ctx.fillStyle = `rgba(${(i*30)%256},${(i*70)%256},255,${glitchAmt * 0.4})`;
        ctx.fillRect(gx, gy, gw, 3);
      }
      ctx.fillStyle = `rgba(255,0,0,${glitchAmt * 0.15})`;
      ctx.fillRect(0, 0, W, H);
      drawTextC('SYSTEM FAILURE', H/2 - 8, { color: '#ff4444', size: 14, align:'center', shadow:true });
      return;
    }

    // Dialogue phase
    if (phase === 1) {
      // Animated scanlines
      for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, y, W, 2);
      }
      // Glitch flickers
      if (Math.floor(tick / 6) % 7 === 0) {
        ctx.fillStyle = 'rgba(255,0,80,0.08)';
        ctx.fillRect(0, 0, W, H);
      }

      // Speaker + dialogue box
      const line = DIALOGUE[dlgIdx];
      const boxY = H - 90;
      drawPanel(8, boxY, W - 16, 80, { bg:'rgba(0,4,12,0.95)', outer: line.color, inner:'#111' });

      if (line.speaker) {
        drawText(line.speaker, 20, boxY + 10, { color: line.color, size: 8, shadow: true });
      }
      const shown = line.text.slice(0, dlgRevealed);
      drawText(shown, 20, boxY + 28, { color: '#ddeeff', size: 8, shadow: false });

      // Progress indicator
      if (dlgRevealed >= line.text.length && dlgIdx < DIALOGUE.length - 1) {
        const blink = Math.floor(tick / 20) % 2 === 0;
        if (blink) drawText('▼', W - 24, boxY + 60, { color:'#888888', size:8 });
      }

      // Scene label (top left)
      drawText('MIDGAME CRISIS', 12, 10, { color:'#ff4444', size:7, shadow:true });
      const prog = `${dlgIdx + 1} / ${DIALOGUE.length}`;
      drawText(prog, W - 12, 10, { color:'#444444', size:6, align:'right' });
    }

    // Fade out
    if (phase === 2) {
      const alpha = Math.min(1, tick / 60);
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  return { enter, update, render };
})();

    {label:'CONTENT', opts:['Live Sports','Documentary','Game Show','News Special'],correct:1},

    {label:'HOST',    opts:['Channel R','Channel B','Channel G','Channel X'],correct:2},
  ];
  let sel=[0,0,0], row=0, phase='config', tick=0;
  function enter() { sel=[0,0,0]; row=0; phase='config'; tick=0; }
  function update() {
    tick++;
    if (phase==='ok') {
      if (tick>55) {
        const ns=MAPS.gym3_interior.npcs;
        const b=ns.find(n=>n.id==='gym3_booking'); if(b)b.solved=true;
        const g=ns.find(n=>n.id==='gym3_gate');    if(g)g.defeated=true;
        setState('overworld',PLAYER.mapId);
      }
      return;
    }
    if (phase==='fail') { if(cancelPressed()||tick>40){phase='config';tick=0;} return; }
    if (cancelPressed()) { setState('overworld',PLAYER.mapId); return; }
    if (navUp())    row=Math.max(0,row-1);
    if (navDown())  row=Math.min(2,row+1);
    if (navLeft())  sel[row]=(sel[row]+SLOTS[row].opts.length-1)%SLOTS[row].opts.length;
    if (navRight()) sel[row]=(sel[row]+1)%SLOTS[row].opts.length;

  }
  function render() {
    fr(0,0,W,H,'#0a0012');
    for(let y=0;y<H;y+=4){ctx.fillStyle='rgba(150,0,200,0.05)';ctx.fillRect(0,y,W,2);}

      drawTextC('Check the schedule board and try again.',H/2+8,{color:'#ff88cc',size:7,align:'center'}); return;
    }
    drawPanel(8,6,W-16,28,{bg:'#0a0018',outer:'#cc44ff',inner:'#220033'});
    drawText('BROADCAST BOOKING TERMINAL',W/2,17,{color:'#dd88ff',size:8,align:'center',shadow:true});
    drawText('Match the schedule board  ◄► change   Enter submit   E back',W/2,42,{color:'#aa77cc',size:7,align:'center'});

// ── Gym 4 — Data Routing ──────────────────────────────────────
const gym4PuzzleState = (function() {
  let nodeId='', cursor=0, phase='choose', tick=0;
  const NODES = {
    gym4_router_a:{label:'NODE A — LOWER JUNCTION',hint:'Route to: CLOUD ARRAY UPLINK',
      opts:['ROUTE LEFT → DEAD LOOP','ROUTE RIGHT → UPLINK ACTIVE'],correct:1},
    gym4_router_b:{label:'NODE B — UPPER JUNCTION',hint:'Route to: CLOUD ARRAY FEED',
      opts:['ROUTE LEFT → FEEDBACK LOOP','ROUTE RIGHT → ARRAY ONLINE'],correct:1},
  };
  function solveNode() {
    const ns=MAPS.gym4_interior.npcs;
    const npc=ns.find(n=>n.id===nodeId); if(npc)npc.solved=true;
    const rA=ns.find(n=>n.id==='gym4_router_a'), rB=ns.find(n=>n.id==='gym4_router_b');
    const g1=ns.find(n=>n.id==='gym4_gate_1'),   g2=ns.find(n=>n.id==='gym4_gate_2');
    if(rA&&rA.solved&&g1)g1.defeated=true;
    if(rB&&rB.solved&&g2)g2.defeated=true;
  }
  function enter(id) { nodeId=id; cursor=0; phase='choose'; tick=0; }
  function update() {
    tick++;
    if (phase==='ok')   { if(tick>50){solveNode();setState('overworld',PLAYER.mapId);} return; }
    if (phase==='fail') {
      if(tick>40) {
        const gId=nodeId==='gym4_router_a'?'gym4_guard_a':'gym4_guard_b';
        const g=MAPS.gym4_interior.npcs.find(n=>n.id===gId);
        if(g&&!g.defeated)startPuzzleBattle(g); else setState('overworld',PLAYER.mapId);
      }
      return;
    }
    if (cancelPressed()) { setState('overworld',PLAYER.mapId); return; }
    if (navLeft()||navUp())    cursor=0;
    if (navRight()||navDown()) cursor=1;
    if (confirmPressed()) { const n=NODES[nodeId]; phase=(n&&cursor===n.correct)?'ok':'fail'; tick=0; }
  }
  function render() {
    const n=NODES[nodeId]||{label:'NODE?',hint:'',opts:['LEFT','RIGHT'],correct:1};
    fr(0,0,W,H,'#000816');
    ctx.strokeStyle='rgba(0,150,255,0.06)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    if (phase==='ok') {
      if(tick%10<5)fr(0,0,W,H,'#001a30');
      drawTextC('PATH ROUTED!',H/2-16,{color:'#44aaff',size:14,align:'center',shadow:true});
      drawTextC('DATA STREAM ACTIVE',H/2+4,{color:'#88ccff',size:10,align:'center'});
      drawTextC('Barrier lowered.',H/2+18,{color:'#4488aa',size:8,align:'center'}); return;
    }
    if (phase==='fail') {
      if(tick%8<4)fr(0,0,W,H,'#1a0010');
      drawTextC('ROUTING ERROR!',H/2-16,{color:'#ff4488',size:14,align:'center',shadow:true});
      drawTextC('DEFENSE PROTOCOL TRIGGERED',H/2+4,{color:'#ff88aa',size:9,align:'center'});
      drawTextC('Prepare to battle.',H/2+18,{color:'#ff6699',size:8,align:'center'}); return;
    }
    // Header
    drawPanel(8,4,W-16,28,{bg:'#000c20',outer:'#2266cc',inner:'#001133'});
    drawText(n.label,W/2,12,{color:'#66aaff',size:8,align:'center',shadow:true});
    drawText('GOAL: '+n.hint,W/2,23,{color:'#4488cc',size:7,align:'center'});
    // Source node (left side) → center junction → destination (right)
    const sy=62, cx=W/2;
    // Source label
    fr(6,sy,50,22,cursor===0?'#061830':'#030c18'); sr(6,sy,50,22,'#224466',1);
    drawText('SOURCE',30,sy+7,{color:'#446688',size:6,align:'center'});
    // Source node circle
    ctx.fillStyle='#1a3a6a'; ctx.beginPath(); ctx.arc(30,sy+14,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(30,sy+14,5,0,Math.PI*2); ctx.stroke();
    // Animated data stream from source to center
    const streamOff=(tick*2)%20;
    for(let i=0;i<4;i++){const sx=50+((i*12+streamOff)%50);if(sx<cx-14)fr(sx,sy+13,4,2,'rgba(68,136,255,0.6)');}
    // Center junction node
    ctx.fillStyle='#1a3a6a'; ctx.beginPath(); ctx.arc(cx,sy+13,10,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#88ccff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,sy+13,10,0,Math.PI*2); ctx.stroke(); ctx.lineWidth=1;
    drawText('NODE',cx,sy+10,{color:'#88ccff',size:5,align:'center'});
    // Two path options below the center node
    const pY=sy+30;
    const lSel=cursor===0, rSel=cursor===1;
    // Left path (dead end / wrong)
    fr(16,pY,W/2-22,38,lSel?'#0a1428':'#050c14'); sr(16,pY,W/2-22,38,lSel?'#4488ff':'#224466',lSel?2:1);
    drawText('◄ LEFT',cx/2,pY+8,{color:lSel?'#88ccff':'#446688',size:7,align:'center'});
    drawText(n.opts[0],cx/2,pY+20,{color:lSel?'#ff6688':'#553355',size:6,align:'center'});
    drawText(lSel?'▲ SELECT':'',cx/2,pY+30,{color:'#4488ff',size:5,align:'center'});
    // Right path (uplink / correct)
    fr(W/2+6,pY,W/2-22,38,rSel?'#0a1428':'#050c14'); sr(W/2+6,pY,W/2-22,38,rSel?'#4488ff':'#224466',rSel?2:1);
    drawText('RIGHT ►',3*cx/2,pY+8,{color:rSel?'#88ccff':'#446688',size:7,align:'center'});
    drawText(n.opts[1],3*cx/2,pY+20,{color:rSel?'#00ff88':'#335533',size:6,align:'center'});
    drawText(rSel?'▲ SELECT':'',3*cx/2,pY+30,{color:'#4488ff',size:5,align:'center'});
    // Instruction bar
    drawText('◄► Select path   Enter Route it   E Back',W/2,H-10,{color:'#4477aa',size:7,align:'center'});
  }
  return { enter, update, render };
})();

  }

// ── Sprite filename builder: ###_Name.png ─────────────────────
// DEX_LIST index + 1 = dex number = file prefix. Names in DEX_LIST
// are already in the exact format used in the filename.
function getSpriteFilename(name) {
  const idx = DEX_LIST.indexOf(name);
  if (idx < 0) return null;
  return String(idx + 1).padStart(3, '0') + '_' + name + '.png';
}

// One file per species; cache it under both front and back keys
// so drawBattleSprite can flip for the player's back-view.
function tryLoadBattleSprites(name) {
  const file = getSpriteFilename(name);
  if (!file) return;
  loadSprite(`${name}_front`, file);
  loadSprite(`${name}_back`,  file);
}

// ── Preload every known species' sprites at boot, tracked for
//    the loading-screen progress bar ───────────────────────────
function preloadAllSprites() {
  DEX_LIST.forEach(name => { if (name) tryLoadBattleSprites(name); });
}

// ── Draw sprite or fall back to canvas primitive ──────────────
function drawBattleSprite(name, cx, cy, side, size) {
  const key = `${name}_${side}`;
  const img = getSprite(key);
  if (img) {
    ctx.imageSmoothingEnabled = false;
    if (side === 'back') {
      // Flip horizontally so the player's mon faces away from the camera
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(-1, 1);
      ctx.drawImage(img, -size/2, -size/2, size, size);
      ctx.restore();
    } else {
      ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
    }
    return;
  }
  // Fallback: generic silhouette
  ctx.fillStyle = TYPE_COL[(SPECIES[name] && SPECIES[name].type1) || 'Search'] + 'aa';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath();
  ctx.arc(cx - size*0.08, cy - size*0.1, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  drawText(name.slice(0, 8), cx, cy + size*0.35, { color: PAL.TEXT, size: 7, align: 'center', shadow: true });
}

const SAVE_KEY = 'googlimon_v1';

function syncTrainerState() {
  Object.values(MAPS).forEach(m => {
    if (!m.npcs) return;
    m.npcs.forEach(n => {
      if (n.isTrainer && SAVE.trainerDefeated.includes(n.id)) n.defeated = true;
    });
  });
}

function syncGateState() {
  const gateFlags = [
    ['elite1_gate', 'cache_beaten'],
    ['elite2_gate', 'firewall_e4_beaten'],
    ['elite3_gate', 'vector_e4_beaten'],
    ['elite4_gate', 'oracle_e4_beaten'],
    ['league_gate', 'nullbyte_defeated'],
  ];
  gateFlags.forEach(([gateId, flag]) => {
    if (!SAVE.flags[flag]) return;
    Object.values(MAPS).forEach(m => {
      if (!m.npcs) return;
      const g = m.npcs.find(n => n.id === gateId);
      if (g) g.defeated = true;
    });
  });
}

function saveGame() {
  if (!SAVE.starterChosen) return false;
  try {
    const data = {
      playerName: SAVE.playerName,
      playerGender: SAVE.playerGender,
      starterChosen: SAVE.starterChosen,
      dex: SAVE.dex,
      credits: SAVE.credits,
      badges: SAVE.badges,
      items: SAVE.items,
      trainerDefeated: SAVE.trainerDefeated,
      lastCenter: SAVE.lastCenter,
      flags: SAVE.flags,
      party: PLAYER.party.map(p => {
        const o = Object.assign({}, p);
        o.revealedStats = [];
        return o;
      }),
      mapId: PLAYER.mapId,
      px: PLAYER.x, py: PLAYER.y, pd: PLAYER.dir,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    return true;
  } catch(e) { return false; }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    SAVE.playerName      = d.playerName  || 'Player';
    SAVE.playerGender    = d.playerGender || 'boy';
    SAVE.starterChosen   = d.starterChosen || false;
    SAVE.dex             = d.dex  || {};
    SAVE.credits         = d.credits != null ? d.credits : 500;
    SAVE.badges          = d.badges  || [];
    SAVE.items           = d.items   || {};
    SAVE.trainerDefeated = d.trainerDefeated || [];
    SAVE.lastCenter      = d.lastCenter || null;
    SAVE.flags = Object.assign({
      met_professor: false,
      starter_chosen: false,
      gym1_beaten: false,
      gym2_beaten: false,
      gym3_beaten: false,
      gym4_beaten: false,
      cloud_crisis: false,
      gym5_beaten: false,
      gym6_beaten: false,
      gym7_beaten: false,
      quarantine_cleared: false,
      malware_escalation: false,
      riley_met: false,
      rival_livia_1: false,
      malware_first_encounter: false,
      rival_battle_1: false,
      r1_item_ball_taken: false,
      nullbyte_defeated: false,
      cache_beaten: false,
      firewall_e4_beaten: false,
      vector_e4_beaten: false,
      oracle_e4_beaten: false,
      elite_four_beaten: false,
      champion_beaten: false,
      deep_web_unlocked: false,
      dark_web_unlocked: false,
      legacy_servers_unlocked: false,
      bookmarkle_found: false,
      lost_browser_complete: false,
    }, d.flags || {});
    PLAYER.party = (d.party || []).map(p =>
      Object.assign({}, p, { revealedStats: new Set() })
    );
    PLAYER.mapId = d.mapId || 'cache_town';
    PLAYER.x = d.px != null ? d.px : 10;
    PLAYER.y = d.py != null ? d.py : 7;
    PLAYER.dir = d.pd != null ? d.pd : 2;
    syncTrainerState();
    syncGateState();
    return true;
  } catch(e) { return false; }
}

// ── Menu State ────────────────────────────────────────────────
const menuState = (function() {
  let screen = 'main';
  let cursor = 0;
  let dexOffset = 0;
  let partyCursor = 0;
  let partyDetailIdx = 0;
  let bagCat = 0;
  let bagCursor = 0;
  let bagUseCursor = 0;
  let bagUseItem = null;
  let confirmCursor = 0;
  let evolveFrom = '';
  let evolveTo = '';
  let evolveTick = 0;

  const MAIN_OPTS = ['PARTY','GOOGLIDEX','BAG','BADGES','SAVE','QUIT'];
  const BAG_CATS  = ['Balls','Medicine','Key Items'];
  const BAG_KEYS  = [
    ['Cache Ball','Browser Ball'],
    ['Byte Potion','Data Shard','Juicy Fruit'],
    ['TM: Search Pulse'],
  ];

  function enter() { screen = 'main'; cursor = 0; flushInput(); }

  function getCatItems() {
    return BAG_KEYS[bagCat].filter(k => (SAVE.items[k]||0) > 0)
      .map(k => ({ key: k, qty: SAVE.items[k] }));
  }

  function tryUseItem(item, monIdx) {
    const mon = PLAYER.party[monIdx];
    if (!mon) return false;
    if (item.key === 'Byte Potion') {
      if (mon.hp >= mon.maxHp) return false;
      mon.hp = Math.min(mon.maxHp, mon.hp + 30);
    } else if (item.key === 'Data Shard') {
      (mon.moves||[]).forEach(m => { if (m && typeof m === 'object' && m.ppLeft !== undefined) m.ppLeft = m.pp; });
    } else if (item.key === 'Juicy Fruit') {
      if (!mon.xpToNext) { mon.xp = 0; mon.xpToNext = xpToLevel(mon.level + 1); }
      const prevName = mon.name;
      const evolved = levelUpMon(mon);
      if (evolved) {
        evolveFrom = prevName;
        evolveTo = evolved;
        evolveTick = 0;
        screen = 'evolving';
      } else {
        showNotif(`${mon.name} grew to Lv.${mon.level}!`);
      }
    } else {
      return false;
    }
    SAVE.items[item.key]--;
    if (!SAVE.items[item.key]) delete SAVE.items[item.key];
    return true;
  }

  function update() {
    if (cancelPressed()) {
      if (screen === 'main') { setState('overworld', PLAYER.mapId); return; }
      if (screen === 'party_detail') { screen = 'party'; return; }
      if (screen === 'bag_use') { screen = 'bag'; bagCursor = 0; return; }
      screen = 'main'; cursor = 0; return;
    }

    if (screen === 'main') {
      const n = MAIN_OPTS.length;
      if (navUp())   cursor = (cursor+n-1)%n;
      if (navDown()) cursor = (cursor+1)%n;
      if (confirmPressed()) {
        const opt = MAIN_OPTS[cursor];
        if (opt === 'PARTY')    { screen='party';   partyCursor=0; }
        if (opt === 'GOOGLIDEX'){ screen='dex';     dexOffset=0; }
        if (opt === 'BAG')      { screen='bag';     bagCat=0; bagCursor=0; }
        if (opt === 'BADGES')   { screen='badges'; }
        if (opt === 'SAVE')     { screen='save_confirm'; confirmCursor=1; }
        if (opt === 'QUIT')     { screen='quit_confirm'; confirmCursor=1; }
      }
    }

    else if (screen === 'party') {
      const n = PLAYER.party.length || 1;
      if (navUp())   partyCursor = (partyCursor+n-1)%n;
      if (navDown()) partyCursor = (partyCursor+1)%n;
      if (confirmPressed() && PLAYER.party.length) { partyDetailIdx = partyCursor; screen = 'party_detail'; }
    }

    else if (screen === 'dex') {
      const cols = 3;
      if (navUp())   dexOffset = Math.max(0, dexOffset - cols);
      if (navDown()) dexOffset = Math.min(DEX_LIST.length - cols, dexOffset + cols);
    }

    else if (screen === 'bag') {
      if (navLeft())  { bagCat = (bagCat+2)%3; bagCursor=0; }
      if (navRight()) { bagCat = (bagCat+1)%3; bagCursor=0; }
      const items = getCatItems();
      if (items.length) {
        if (navUp())   bagCursor = (bagCursor+items.length-1)%items.length;
        if (navDown()) bagCursor = (bagCursor+1)%items.length;
      }
      if (confirmPressed() && items.length) {
        bagUseItem = items[bagCursor];
        bagUseCursor = 0;
        screen = 'bag_use';
      }
    }

    else if (screen === 'bag_use') {
      const n = PLAYER.party.length || 1;
      if (navUp())   bagUseCursor = (bagUseCursor+n-1)%n;
      if (navDown()) bagUseCursor = (bagUseCursor+1)%n;
      if (confirmPressed() && bagUseItem) {
        const used = tryUseItem(bagUseItem, bagUseCursor);
        if (used && screen !== 'evolving') { screen = 'bag'; bagCursor = 0; }
      }
    }

    else if (screen === 'evolving') {
      evolveTick++;
      if (evolveTick > 80 && confirmPressed()) {
        screen = 'bag';
        bagCursor = 0;
      }
    }

    else if (screen === 'save_confirm' || screen === 'quit_confirm') {
      if (navLeft())  confirmCursor = 0;
      if (navRight()) confirmCursor = 1;
      if (confirmPressed()) {
        if (confirmCursor === 0) {
          if (screen === 'save_confirm') { saveGame(); showNotif('GAME SAVED'); screen = 'main'; }
          else { setState('title'); return; }
        } else {
          screen = 'main';
        }
      }
    }
  }

  // ── Sub-screen renderers ──────────────────────────────────────

  function dim() { ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H); }

      drawText((sel?'► ':' ')+opt, px+18, oy+2, {color:sel?PAL.GOLD:PAL.TEXT,size:8});
    });
    drawText('Enter Confirm   E Close', px+pw/2, py+ph-10, {color:PAL.TEXT_DIM,size:7,align:'center'});

    if (!mon) { screen='party'; return; }
    dim();

  function renderBagUse() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});

    if (!usable) {
      drawText("Can't use this outside of battle.", W/2, H/2-8, {color:PAL.TEXT_RED,size:7,align:'center'});

    }
    drawText('Use on which Googlimon?', W/2, 28, {color:PAL.TEXT_DIM,size:6,align:'center'});

      const sel = i===bagUseCursor;

      fr(12,iy,W-24,32,sel?'#0d2233':'#080e18');
      sr(12,iy,W-24,32,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(mon.name, 20, iy+4, {color:sel?PAL.TEXT:PAL.TEXT_DIM,size:8});
      drawHPBar(130,iy+8,W-155,8,mon.hp,mon.maxHp);
      drawText(`${mon.hp}/${mon.maxHp}`,W-16,iy+8,{color:PAL.TEXT_DIM,size:6,align:'right'});
    });
    drawText('↑↓ Select   Enter Use   E Back', W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderEvolving() {
    dim();
    const flash = evolveTick < 80 && Math.floor(evolveTick / 4) % 2 === 0;
    if (flash) { ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(0, 0, W, H); }
    drawPanel(4,4,W-8,H-8, {bg: flash ? '#1a2c3e' : PAL.PANEL, outer: flash ? '#ffffff' : PAL.GOLD, inner: PAL.BORDER});
    if (evolveTick < 80) {
      drawText('!  EVOLVING  !', W/2, H/2-34, {color: flash ? '#ffffff' : PAL.GOLD, size:8, align:'center', shadow:true});
      drawText(evolveFrom, W/2, H/2-10, {color: flash ? '#ffffff' : PAL.TEXT, size:13, align:'center', shadow:true});
      drawText('is changing...', W/2, H/2+18, {color:PAL.TEXT_DIM, size:7, align:'center'});

      drawText(`${evolveFrom} evolved`, W/2, H/2-28, {color:PAL.TEXT_DIM, size:7, align:'center'});
      drawText(`into`, W/2, H/2-10, {color:PAL.TEXT, size:8, align:'center'});
      drawText(evolveTo + '!', W/2, H/2+12, {color:PAL.GOLD, size:13, align:'center', shadow:true});
      drawText('Press Enter', W/2, H-10, {color:PAL.TEXT_DIM, size:6, align:'center'});
    }
  }

  function renderBadges() {
    dim();
    drawPanel(4,4,W-8,H-8,{bg:PAL.PANEL,outer:PAL.GOLD,inner:PAL.BORDER});
    drawText('BADGES', W/2, 12, {color:PAL.GOLD,size:10,align:'center',shadow:true});
    // 4×2 grid of badges
    ALL_BADGES.forEach((bi,i) => {
      const col2=i%4, row2=Math.floor(i/4);
      const bx2=10+col2*116, by2=32+row2*116;
      const earned = SAVE.badges.includes(bi.name);
      fr(bx2,by2,110,108, earned?'#0a1a28':'#060c14');
      sr(bx2,by2,110,108, earned?bi.color:PAL.BORDER, earned?2:1);
      // Gem
      const gx=bx2+55, gy=by2+48;
      fr(gx-16,gy-16,32,32, earned?bi.color:PAL.TEXT_DIM);
      fr(gx-11,gy-11,22,22, earned?bi.color+'99':'#111');
      if (earned) {
        ctx.fillStyle='#ffffff55';
        ctx.beginPath(); ctx.arc(gx-5,gy-5,7,0,Math.PI*2); ctx.fill();
      }
      drawText(bi.name.replace(' Badge',''), bx2+55, by2+6, {color:earned?bi.color:PAL.TEXT_DIM,size:5,align:'center'});
      if (earned) drawText('✓', bx2+55, by2+92, {color:PAL.GOLD,size:7,align:'center'});
      else        drawText('—', bx2+55, by2+92, {color:PAL.TEXT_DIM,size:7,align:'center'});
    });
    drawText(`Badges: ${SAVE.badges.length}/8   E Back`, W/2, H-10, {color:PAL.TEXT_DIM,size:6,align:'center'});
  }

  function renderConfirm(title, sub) {
    dim();
    const pw=300, ph=104, px=W/2-pw/2, py=H/2-ph/2;
    drawPanel(px,py,pw,ph,{bg:PAL.PANEL,outer:PAL.ACCENT,inner:PAL.BORDER});
    drawText(title, px+pw/2, py+14, {color:PAL.TEXT,size:8,align:'center',shadow:true});
    if (sub) drawText(sub, px+pw/2, py+30, {color:PAL.TEXT_DIM,size:6,align:'center'});
    ['YES','NO'].forEach((opt,i) => {
      const sel=i===confirmCursor;
      const ox=px+60+i*130, oy=py+58;
      fr(ox-28,oy-6,80,26,sel?'#0d2233':'#080e18');
      sr(ox-28,oy-6,80,26,sel?PAL.ACCENT:PAL.BORDER,1);
      drawText(opt, ox+12, oy+2, {color:sel?PAL.GOLD:PAL.TEXT,size:9,align:'center'});
    });
  }

  function render() {
    if (screen==='main')         renderMain();
    else if (screen==='party')        renderParty();
    else if (screen==='party_detail') renderPartyDetail();
    else if (screen==='dex')          renderDex();
    else if (screen==='bag')          renderBag();
    else if (screen==='bag_use')      renderBagUse();
    else if (screen==='evolving')     renderEvolving();
    else if (screen==='badges')       renderBadges();
    else if (screen==='save_confirm') renderConfirm('Save your game?');
    else if (screen==='quit_confirm') renderConfirm('Return to title screen?','Unsaved progress will be lost.');
  }

  return { enter, update, render };
})();

// ── Index-instability glitch overlay ──────────────────────────
let glitchTimer = 0;
let glitchBars = [];
function maybeTriggerGlitch() {
  if (Math.random() < 0.0008) {
    glitchTimer = 3;
    Sound.sfxGlitch();
    const n = 2 + Math.floor(Math.random() * 2); // 2-3 bars
    glitchBars = [];
    for (let i = 0; i < n; i++) {
      glitchBars.push({
        y: Math.floor(Math.random() * H),
        h: 2 + Math.floor(Math.random() * 5),
        color: Math.random() < 0.5 ? PAL.ACCENT : PAL.T_VIRUS,
      });
    }
  }
}
function renderGlitch() {
  glitchBars.forEach(b => {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = b.color;
    ctx.fillRect(0, b.y, W, b.h);
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, b.y, W, 1);
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// GAME LOOP
// ============================================================
function drawSpeakerIcon() {
  const x = W - 16, y = 5, muted = Sound.isMuted();
  ctx.globalAlpha = 0.85;
  fr(x - 2, y - 2, 16, 12, '#05080f');
  ctx.fillStyle = muted ? PAL.TEXT_DIM : PAL.ACCENT;
  // speaker body
  ctx.fillRect(x, y + 2, 3, 4);
  ctx.beginPath();
  ctx.moveTo(x + 3, y + 2); ctx.lineTo(x + 7, y - 1); ctx.lineTo(x + 7, y + 9); ctx.lineTo(x + 3, y + 6);
  ctx.closePath(); ctx.fill();
  if (muted) {
    // diagonal mute slash
    ctx.strokeStyle = PAL.TEXT_RED; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x + 9, y - 1); ctx.lineTo(x + 13, y + 9); ctx.stroke();
  } else {
    // sound waves
    ctx.strokeStyle = PAL.ACCENT; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x + 6, y + 4, 5, -0.5, 0.5); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function loop() {
  G_TICK++;
  Sound.update();
  const s = STATES[currentState];
  if (s) {
    s.update();
    s.render();
  } else {
    fr(0, 0, W, H, PAL.BG);
    drawTextC(`Unknown state: "${currentState}"`, H / 2, { color: PAL.TEXT_RED });
  }
  // Index-instability glitch overlay
  if (glitchTimer > 0) { renderGlitch(); glitchTimer--; }
  else { maybeTriggerGlitch(); }
  // Global notification banner
  if (NOTIF.timer > 0) {
    NOTIF.timer--;
    const nAlpha = Math.min(1, NOTIF.timer / 20);
    ctx.globalAlpha = nAlpha;
    const nw = 192, nh = 24;
    fr(W/2-nw/2, 4, nw, nh, '#05080f');
    sr(W/2-nw/2, 4, nw, nh, PAL.GOLD, 2);
    drawText(NOTIF.text, W/2, 10, { color: PAL.GOLD, size: 10, align: 'center', shadow: true });
    ctx.globalAlpha = 1;
  }
  drawSpeakerIcon();
  requestAnimationFrame(loop);
}

});

// GYM 6 TRAINER GATE SYSTEM
// Gym 6 uses barrier gaps that should only open after the room
// trainer is defeated. We track this via trainerDefeated checks
// by overriding the gym6 tiles at enter-time in the overworld.
// ============================================================
// Re-open barriers when trainers are defeated (checked on enter)
const _origGym6Enter = overworldState.enter ? null : null;
(function patchGym6() {
  const baseEnter = overworldState.enter;
  // We cannot easily patch a closed IIFE — instead we handle gym6
  // barrier tiles via the WALKABLE check in tileAt being overridden
  // by NPC blocking. The trainers ARE the barriers (they stand in
  // the gap tiles of each barrier row, blocking passage). Once
  // defeated (getNPCAt returns null), the gaps become walkable.
  // Trainer positions placed at the barrier gap tiles:
  //   Platformer King Roq at (3,11) — gap col 3 row 11
  //   Racer Blitz         at (8,9)  — gap col 8 row 9 (not col 9 — adjust)
  //   Puzzle Master Enid  at (7,7)  — gap col 7 row 7
  //   Boss Rush Bane      at (5,5)  — gap col 5 row 5
  // Reposition them to sit AT their respective gap tiles.
  const g6 = MAPS.gym6_interior;
  if (!g6) return;
  const npcs = g6.npcs;
  const roq  = npcs.find(n => n.id === 'gym6_trainer_1');
  const blitz = npcs.find(n => n.id === 'gym6_trainer_2');
  const enid  = npcs.find(n => n.id === 'gym6_trainer_3');
  const bane  = npcs.find(n => n.id === 'gym6_trainer_4');
  if (roq)   { roq.x  = 3; roq.y  = 11; roq.dir  = 2; }
  if (blitz) { blitz.x = 9; blitz.y = 9;  blitz.dir = 2; }
  if (enid)  { enid.x  = 7; enid.y  = 7;  enid.dir  = 2; }
  if (bane)  { bane.x  = 5; bane.y  = 5;  bane.dir  = 2; }
})();

// Cipher — dark security uniform, visor, angular crop
function drawLeaderCipher(px, py, dir, frame) {
  const x = Math.floor(px), y = Math.floor(py);
  const bob = frame % 2 === 0 ? 0 : 1;
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x+8, y+15+bob, 5, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  fr(x+4, y+13+bob, 4, 2, '#220033');
  fr(x+9, y+13+bob, 4, 2, '#220033');
  if (dir===1) { fr(x+6, y+9, 3, 5, '#220033'); fr(x+9, y+9+bob, 3, 5, '#220033'); }
  else if (dir===3) { fr(x+5, y+9+bob, 3, 5, '#220033'); fr(x+8, y+9, 3, 5, '#220033'); }
  else { fr(x+5, y+9+bob, 3, 5, '#220033'); fr(x+9, y+9+bob, 3, 5, '#220033'); }
  // Dark security jacket + purple trim
  fr(x+3, y+4, 11, 7, '#1a0033');
  fr(x+3, y+4,  2, 7, '#550088');
  fr(x+12,y+4,  2, 7, '#550088');
  fr(x+6, y+4,  5, 2, '#330055');
  // Head
  fr(x+4, y+0, 9, 6, '#ccbbdd');
  fr(x+4, y+0, 9, 2, '#110022');  // dark hair
  // Visor / eyewear
  fr(x+3, y+2, 11, 3, '#330066');
  fr(x+3, y+2, 11, 1, '#9944ff');
  if (dir===2) { fr(x+4, y+2, 4, 2, '#cc44ff'); fr(x+8, y+2, 4, 2, '#cc44ff'); }
  else if (dir===1) fr(x+10, y+2, 3, 2, '#cc44ff');
  else if (dir===3) fr(x+4,  y+2, 3, 2, '#cc44ff');
}

// Player One — neon hoodie, stylized hair, gaming gloves
function drawLeaderPlayerOne(px, py, dir, frame) {
  const x = Math.floor(px), y = Math.floor(py);
  const bob = frame % 2 === 0 ? 0 : 1;
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x+8, y+15+bob, 5, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  fr(x+4, y+13+bob, 4, 2, '#ee6600');
  fr(x+9, y+13+bob, 4, 2, '#ee6600');
  if (dir===1) { fr(x+6, y+9, 3, 5, '#222222'); fr(x+9, y+9+bob, 3, 5, '#222222'); }
  else if (dir===3) { fr(x+5, y+9+bob, 3, 5, '#222222'); fr(x+8, y+9, 3, 5, '#222222'); }
  else { fr(x+5, y+9+bob, 3, 5, '#222222'); fr(x+9, y+9+bob, 3, 5, '#222222'); }
  // Neon orange hoodie
  fr(x+3, y+4, 11, 7, '#cc4400');
  fr(x+5, y+9, 7, 3, '#ff6622');  // hoodie pocket
  fr(x+6, y+4, 5, 2, '#ff8833');  // collar
  // Gaming gloves on side-facing
  if (dir===1) fr(x+13, y+6, 2, 4, '#ff6600');
  if (dir===3) fr(x+2,  y+6, 2, 4, '#ff6600');
  // Head
  fr(x+4, y+0, 9, 6, '#ffddaa');
  // Wild styled hair — dark with neon highlights
  fr(x+3, y+0, 11, 2, '#111111');
  fr(x+4, y-2, 3, 3, '#111111');  // spiky top
  fr(x+9, y-2, 2, 2, '#ff6600');  // neon spike tip
  fr(x+12,y+0,  2, 4, '#333333');
  // Eyes (gold, intense)
  if (dir===2) { fr(x+5, y+2, 3, 2, '#ffaa00'); fr(x+9, y+2, 3, 2, '#ffaa00'); }
  else if (dir===1) fr(x+11, y+2, 2, 2, '#ffaa00');
  else if (dir===3) fr(x+4,  y+2, 2, 2, '#ffaa00');
}

// Dr. Prompt — white lab coat, silver hair, tablet/hologram
function drawLeaderDrPrompt(px, py, dir, frame) {
  const x = Math.floor(px), y = Math.floor(py);
  const bob = frame % 2 === 0 ? 0 : 1;
  const pulse = Math.floor(frame / 3) % 2;
  ctx.globalAlpha = 0.2; ctx.fillStyle = '#88aaff';
  ctx.beginPath(); ctx.ellipse(x+8, y+15+bob, 6, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  fr(x+4, y+13+bob, 4, 2, '#aabbcc');
  fr(x+9, y+13+bob, 4, 2, '#aabbcc');
  if (dir===1) { fr(x+6, y+9, 3, 5, '#334455'); fr(x+9, y+9+bob, 3, 5, '#334455'); }
  else if (dir===3) { fr(x+5, y+9+bob, 3, 5, '#334455'); fr(x+8, y+9, 3, 5, '#334455'); }
  else { fr(x+5, y+9+bob, 3, 5, '#334455'); fr(x+9, y+9+bob, 3, 5, '#334455'); }
  // White lab coat
  fr(x+3, y+4, 11, 7, '#ddeeff');
  fr(x+5, y+4,  7, 2, '#aabbcc');  // coat lapels
  fr(x+3, y+4,  2, 7, '#c0d8ee');
  fr(x+12,y+4,  2, 7, '#c0d8ee');
  // Hologram tablet (side visible)
  if (dir===1) { ctx.globalAlpha=0.8; fr(x+13,y+5,3,5,pulse?'#4488ff':'#2255cc'); ctx.globalAlpha=1; }
  if (dir===3) { ctx.globalAlpha=0.8; fr(x+1, y+5,3,5,pulse?'#4488ff':'#2255cc'); ctx.globalAlpha=1; }
  // Head (fair skin, glasses)
  fr(x+4, y+0, 9, 6, '#ffeedd');
  fr(x+3, y+0, 11, 2, '#ccccdd');  // silver hair
  fr(x+3, y+1,  2, 4, '#bbbbcc');
  fr(x+12,y+1,  2, 5, '#bbbbcc');
  // Glasses
  if (dir===2) { sr(x+5, y+2, 4, 3, '#88aacc', 1); sr(x+9, y+2, 4, 3, '#88aacc', 1); fr(x+9,y+3,1,1,'#88aacc'); }
  else if (dir===1) { sr(x+10, y+2, 4, 3, '#88aacc', 1); }
  else if (dir===3) { sr(x+3,  y+2, 4, 3, '#88aacc', 1); }
  // Eyes (blue, sharp)
  if (dir===2) { fr(x+6, y+3, 2, 1, '#4488cc'); fr(x+10, y+3, 2, 1, '#4488cc'); }
  else if (dir===1) fr(x+12, y+3, 2, 1, '#4488cc');
  else if (dir===3) fr(x+4,  y+3, 2, 1, '#4488cc');
}

// GYM 8 PUZZLE STATE — Master Nexus Trial
// ============================================================
const gym8PuzzleState = (function() {
  const STAGES = [
    { gym:'GYM 1 — SEARCH',   color:'#00aa33',
      q:'What does a search INDEX primarily store?',
      opts:['Web content & page links','Server admin passwords','User GPS coordinates'], correct:0 },
    { gym:'GYM 2 — BROWSER',  color:'#00ccff',
      q:'The lighthouse is NORTH. Which portal leads toward it?',
      opts:['LEFT portal','RIGHT portal'], correct:1 },
    { gym:'GYM 3 — MEDIA',    color:'#cc44ff',
      q:'Broadcast match: Documentary + Educators + ?',
      opts:['Channel R','Channel G','Channel B'], correct:1 },
    { gym:'GYM 4 — CLOUD',    color:'#4488ff',
      q:'Node A routing: which path activates the uplink?',
      opts:['ROUTE LEFT — Dead Loop','ROUTE RIGHT — Uplink'], correct:1 },
    { gym:'GYM 5 — SECURITY', color:'#ff4466',
      q:'Classify: exploit_v3.exe — UNSIGNED, modifies registry & disables firewall',
      opts:['SAFE','MALICIOUS'], correct:1 },
    { gym:'GYM 6 — GAMING',   color:'#ff6622',
      q:'Frame-perfect platformer finish — which move wins?',
      opts:['Heavy Slam','Pixel Dash (Precision)','Quick Attack'], correct:1 },
    { gym:'GYM 7 — AI',       color:'#88aaff',
      q:'Sequence: 2,  4,  8,  16,  ?',
      opts:['24','32','28'], correct:1 },
  ];
  const HOPS = [
    { from:'Searchburg', to:'Streamport',
      q:'Which city connects Searchburg to Streamport?',
      opts:['Cloud City','Browser Bay','Pixel Peak'], correct:1 },
    { from:'Streamport', to:'Firewall Falls',
      q:'Which city connects Streamport to Firewall Falls?',
      opts:['Browser Bay','Pixel Peak','Cloud City'], correct:2 },
    { from:'Firewall Falls', to:'Nexus Central',
      q:'Which city connects Firewall Falls to Nexus Central?',
      opts:['Streamport','Quantum Heights','Pixel Peak'], correct:1 },
  ];
  let stage=0, cursor=0, hop=0, phase='stage', tick=0;
  function enter() { stage=0; cursor=0; hop=0; phase='stage'; tick=0; }
  function update() {
    tick++;
    if (phase==='fail_flash') { if(tick>35){stage=0;hop=0;cursor=0;phase='stage';tick=0;} return; }
    if (phase==='ok_flash') {
      if(tick>25){
        if(stage<6){stage++;cursor=0;phase='stage';tick=0;}
        else{phase='connect';hop=0;cursor=0;tick=0;}
      }
      return;
    }
    if (phase==='connect_ok') {
      if(tick>25){
        if(hop<HOPS.length-1){hop++;cursor=0;phase='connect';tick=0;}
        else{phase='victory';tick=0;}
      }
      return;
    }
    if (phase==='victory') {
      if(tick>65){
        const ns=MAPS.gym8_interior.npcs;
        const c=ns.find(n=>n.id==='gym8_console'); if(c)c.solved=true;
        const g=ns.find(n=>n.id==='gym8_gate');    if(g)g.defeated=true;
        setState('overworld',PLAYER.mapId);
      }
      return;
    }
    if (cancelPressed()) { setState('overworld',PLAYER.mapId); return; }
    if (phase==='stage') {
      const s=STAGES[stage];
      if (navLeft()||navUp())    cursor=Math.max(0,cursor-1);
      if (navRight()||navDown()) cursor=Math.min(s.opts.length-1,cursor+1);
      if (confirmPressed()) { phase=(cursor===s.correct)?'ok_flash':'fail_flash'; tick=0; }
    }
    if (phase==='connect') {
      if (navLeft()||navUp())    cursor=Math.max(0,cursor-1);
      if (navRight()||navDown()) cursor=Math.min(2,cursor+1);
      if (confirmPressed()) { phase=(cursor===HOPS[hop].correct)?'connect_ok':'fail_flash'; tick=0; }
    }
  }
  function render() {
    if (phase==='victory') {
      fr(0,0,W,H,'#000a18');
      for(let i=0;i<24;i++){const nx=((i*71+tick)%W),ny=((i*41+Math.floor(tick*0.5))%H);ctx.fillStyle='rgba(0,200,255,0.06)';ctx.beginPath();ctx.arc(nx,ny,3,0,Math.PI*2);ctx.fill();}
      if(tick%12<6)fr(0,0,W,H,'#001520');
      drawTextC('NEXUS TRIAL COMPLETE',H/2-16,{color:'#00ffcc',size:13,shadow:true});
      drawTextC('ALL EIGHT SYSTEMS LINKED',H/2+4,{color:'#88ffee',size:9});
      drawTextC('THE NETWORK IS YOURS',H/2+20,{color:'#44aacc',size:7}); return;
    }
    if (phase==='fail_flash') {
      if(tick%8<4)fr(0,0,W,H,'#1a0010');
      drawTextC('TRIAL RESET',H/2-10,{color:'#ff4466',size:12,shadow:true});
      drawTextC('RESTARTING FROM GYM 1...',H/2+8,{color:'#ff88aa',size:8}); return;
    }
    fr(0,0,W,H,'#000a18');
    for(let i=0;i<16;i++){const px=((i*61+tick)%W),py=((i*47+Math.floor(tick*0.4))%H);ctx.fillStyle='rgba(0,180,255,0.04)';ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();}
    if (phase==='ok_flash') {
      fr(0,0,W,H,'#001428');
      drawTextC(stage<6?'CORRECT — NEXT ECHO':'GYM RECALL COMPLETE',H/2-8,{color:'#00ff88',size:11,shadow:true}); return;
    }
    if (phase==='connect_ok') {
      fr(0,0,W,H,'#001428');
      drawTextC('HOP '+String(hop+1)+' LINKED',H/2-8,{color:'#00ffcc',size:11,shadow:true}); return;
    }
    if (phase==='stage') {
      const s=STAGES[stage];
      drawPanel(8,6,W-16,28,{bg:'#000c1c',outer:s.color,inner:'#001133'});
      drawText('NEXUS TRIAL  —  ECHO '+(stage+1)+'/7',W/2,11,{color:s.color,size:7,align:'center',shadow:true});
      drawText(s.gym,W/2,22,{color:'#aabbcc',size:7,align:'center'});
      for(let i=0;i<7;i++){const dx=W/2+(i-3)*16;fr(dx-4,38,8,6,i<stage?'#00ff88':i===stage?s.color:'#224455');}
      drawPanel(8,50,W-16,58,{bg:'#000c1c',outer:'#224466',inner:'#001122'});
      drawTextWrapped(s.q,18,60,W-36,{color:'#ddeeff',size:8,lineHeight:13});
      s.opts.forEach((opt,i)=>{
        const oy=118+i*28,sel=i===cursor;
        fr(18,oy,W-36,22,sel?'#0d1e30':'#050c14');sr(18,oy,W-36,22,sel?s.color:'#224466',sel?2:1);
        drawText((sel?'▶ ':' ')+opt,28,oy+6,{color:sel?'#ffffff':'#557799',size:8});
      });
      drawText('↑↓ Select   Enter Confirm   E Skip trial',W/2,H-10,{color:'#446677',size:7,align:'center'});
    }
    if (phase==='connect') {
      const h=HOPS[hop];
      drawPanel(8,6,W-16,28,{bg:'#000c1c',outer:'#00ffcc',inner:'#001133'});
      drawText('NEXUS TRIAL  —  CONNECTIVITY CHALLENGE',W/2,11,{color:'#00ffcc',size:7,align:'center',shadow:true});
      drawText('Hop '+(hop+1)+' of '+HOPS.length,W/2,22,{color:'#88ffcc',size:7,align:'center'});
      for(let i=0;i<HOPS.length;i++){const dx=W/2+(i-1)*24;fr(dx-6,38,12,8,i<hop?'#00ff88':i===hop?'#00ffcc':'#224455');}
      drawPanel(8,52,W-16,40,{bg:'#001122',outer:'#336655',inner:'#00111a'});
      drawText(h.from+' ──── ? ──── '+h.to,W/2,62,{color:'#88ffcc',size:8,align:'center',shadow:true});
      drawTextWrapped(h.q,18,80,W-36,{color:'#aaddcc',size:7,lineHeight:12});
      h.opts.forEach((opt,i)=>{
        const oy=104+i*28,sel=i===cursor;
        fr(18,oy,W-36,22,sel?'#0d2218':'#050c12');sr(18,oy,W-36,22,sel?'#00ffcc':'#224444',sel?2:1);
        drawText((sel?'▶ ':' ')+opt,28,oy+6,{color:sel?'#ffffff':'#446655',size:8});
      });
      drawText('↑↓ Select   Enter Confirm   E Back',W/2,H-10,{color:'#447766',size:7,align:'center'});
    }
  }
  return { enter, update, render };
})();

function drawLeaderNexus(px, py, dir, frame) {

  ctx.globalAlpha=1;

  if(dir===1){fr(x+6,y+9,3,5,'#001a22');fr(x+9,y+9+bob,3,5,'#001a22');}
  else if(dir===3){fr(x+5,y+9+bob,3,5,'#001a22');fr(x+8,y+9,3,5,'#001a22');}

  if(dir===3){ctx.globalAlpha=0.8;fr(x+2,y+5,2,5,pulse===1?'#00ffcc':'#003344');ctx.globalAlpha=1;}
  // Head
  fr(x+4,y+0,9,6,'#cceedd');
  fr(x+3,y+0,11,2,'#001a1a');
  fr(x+3,y+1,2,4,'#002233');

// CHAMPION VICTORY — Post-championship cutscene
// Triggered from battle 'done' when trainerId === 'prof_search_champion'
// ============================================================
const championVictoryState = (function() {
  let tick = 0, phase = 'award';   // 'award' | 'hof' | 'outro'
  let lineIdx = 0, lineRevealed = 0, lineTimer = 0;
  let awardLines = [], hofLines = [], outroLines = [];

  function enter() {
    tick = 0; phase = 'award';
    lineIdx = 0; lineRevealed = 0; lineTimer = 0;
    const hofTeam = PLAYER.party.map(function(p) { return { name: p.name, level: p.level }; });
    awardLines = [
      '[ CHAMPION ]',
      SAVE.playerName + '  —  GOOGLIA CHAMPION',
      'All eight badges. The Nullbyte crisis resolved.',
      'The Elite Four defeated. The Champion falls.',
      'Master Index Pass — GRANTED',
      'Datacenter Clearance — GRANTED',
      'Postgame areas unlocked.',
      '[ GAME SAVED ]',
    ];
    hofLines = ['[ HALL OF FAME ]', SAVE.playerName + "'s Champion Team:"]
      .concat(PLAYER.party.map(function(p) { return p.name + '  Lv. ' + p.level; }));
    outroLines = [
      'The region knows your name.',
      'The Index is stable. The future is open.',
      'Professor Search said it best —',
      '"The future belongs to people now."',
      'Returning to Googlia...',
    ];
  }

  function curLines() {
    return phase === 'award' ? awardLines : phase === 'hof' ? hofLines : outroLines;
  }

  function update() {
    tick++;
    const lines = curLines();
    lineTimer++;
    if (lineTimer >= 2 && lineRevealed < lines[lineIdx].length) { lineRevealed++; lineTimer = 0; }
    if (lineRevealed >= lines[lineIdx].length && confirmPressed()) {
      if (lineIdx < lines.length - 1) {
        lineIdx++; lineRevealed = 0; lineTimer = 0;
      } else if (phase === 'award') {
        phase = 'hof'; lineIdx = 0; lineRevealed = 0; lineTimer = 0;
      } else if (phase === 'hof') {
        phase = 'outro'; lineIdx = 0; lineRevealed = 0; lineTimer = 0;
      } else {
        PLAYER.mapId = 'cache_town';
        PLAYER.x = 7; PLAYER.y = 7; PLAYER.dir = 3;
        if (SAVE.starterChosen) saveGame();
        setState('overworld', 'cache_town');
        npcDialogue = {
          lines: [
            'Welcome home, Champion.',
            'I saw it on the broadcast — you really did it!',
            'You defeated the Elite Four... and Professor Search himself.',
            'I knew you were special from the very beginning.',
            'The region is safe because of you.',
            'Now go — the world is waiting for you!'
          ],
          lineIdx: 0, revealed: 0, timer: 0, doneWait: 0
        };
      }
    }
  }

  function render() {
    fr(0, 0, W, H, '#040210');
    // Gold shimmer background
    const pulse = Math.sin(tick * 0.04) * 0.5 + 0.5;
    ctx.globalAlpha = 0.06 + pulse * 0.08;
    ctx.fillStyle = '#ffdd44'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    // Particle field
    for (let i = 0; i < 20; i++) {
      const px = ((i * 61 + tick * 1.3) % W);
      const py = ((i * 47 + Math.floor(tick * 0.5)) % H);
      ctx.fillStyle = i % 3 === 0 ? '#ffdd4418' : i % 3 === 1 ? '#44aaff18' : '#cc44ff18';
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();
    }
    // Phase header
    if (phase === 'award') {
      drawTextC('C H A M P I O N', H / 2 - 80, { color:'#ffdd44', size:14, shadow:true });
      drawTextC(SAVE.playerName, H / 2 - 56, { color:'#ffffff', size:9, shadow:true });
      // Trophy shape
      const cx = W / 2, ty = H / 2 - 34;
      ctx.strokeStyle = '#ffdd44'; ctx.lineWidth = 2; ctx.globalAlpha = 0.3 + pulse * 0.25;
      ctx.beginPath(); ctx.arc(cx, ty, 18, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, ty, 10, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1; ctx.lineWidth = 1;
    } else if (phase === 'hof') {
      drawTextC('HALL OF FAME', H / 2 - 80, { color:'#aaddff', size:12, shadow:true });
    } else {
      drawTextC('GOOGLIA CHAMPION', H / 2 - 80, { color:'#ffaa44', size:10, shadow:true });
      drawTextC(SAVE.playerName, H / 2 - 64, { color:'#ffdd88', size:8, shadow:true });
    }
    // Dialogue panel
    const boxY = H - 90;
    drawPanel(8, boxY, W - 16, 82, { bg:'rgba(0,0,8,0.97)', outer:'#ffdd44', inner:'#332200' });
    const lines = curLines();
    drawText(lines[lineIdx].slice(0, lineRevealed), 20, boxY + 22, { color:'#ffffcc', size:13 });
    // Sub-line counter for hof phase
    if (phase === 'hof' && lineIdx > 1) {
      drawText((lineIdx - 1) + '/' + (lines.length - 2), W - 24, boxY + 22, { color:'#665544', size:6, align:'right' });
    }
    // Advance prompt
    if (lineRevealed >= lines[lineIdx].length) {
      const blink = Math.floor(tick / 20) % 2 === 0;
      if (blink) {
        const last = lineIdx >= lines.length - 1;
        const ph2 = phase === 'outro';
        drawText(last && ph2 ? '▶ Return to Googlia' : '▼', W - 20, boxY + 62, { color:'#998866', size:7, align:'right' });
      }
    }
  }

  return { enter: enter, update: update, render: render };
})();

      if (pressed('ArrowRight')) { catIdx=(catIdx+1)%CATS.length;             itemIdx=0; scrollOffset=0; }
      var L = getList();
      if (pressed('ArrowUp'))   { itemIdx=Math.max(0,itemIdx-1); if(itemIdx<scrollOffset) scrollOffset=itemIdx; }
      if (pressed('ArrowDown')) { itemIdx=Math.min(L.length-1,itemIdx+1); if(itemIdx>=scrollOffset+MAX_VIS) scrollOffset=itemIdx-MAX_VIS+1; }
      if (confirmPressed()) activate();
      if (cancelPressed())  setState('overworld', PLAYER.mapId);
    },
    render: function() {
      // DEBUG MENU — plain Canvas2D, no game font/effects, pure readability.
      ctx.save();

      // Full-screen solid background (no game-art bleed-through)
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, W, H);

      var px = 4, py = 4, pw = W - 8, ph = H - 8;

      // Panel body + red border
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(px, py, pw, ph);
      ctx.strokeStyle = '#cc2222';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

      ctx.textBaseline = 'middle';

      // ── Title bar ──────────────────────────────────────────────
      var titleH = 22;
      ctx.fillStyle = '#880000';
      ctx.fillRect(px, py, pw, titleH);
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(px, py + titleH - 1, pw, 1);
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('!! DEBUG MENU  —  REMOVE BEFORE PUBLIC RELEASE !!', px + pw / 2, py + titleH / 2);

      // ── Category tabs ──────────────────────────────────────────
      var tabY = py + titleH;
      var tabH = 18;
      var tabW = Math.floor(pw / CATS.length);
      ctx.font = 'bold 10px monospace';
      CATS.forEach(function(cat, i) {
        var tx = px + i * tabW;
        ctx.fillStyle = i === catIdx ? '#cc2222' : '#252525';
        ctx.fillRect(tx, tabY, tabW - 1, tabH);
        ctx.fillStyle = i === catIdx ? '#ffffff' : '#888888';
        ctx.textAlign = 'center';
        ctx.fillText(cat, tx + tabW / 2, tabY + tabH / 2);
      });
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(px, tabY + tabH, pw, 1);

      // ── List items ─────────────────────────────────────────────
      var ly = tabY + tabH + 3;
      var rowH = 16;
      ctx.textAlign = 'left';
      var L = getList();
      var vis = L.slice(scrollOffset, scrollOffset + MAX_VIS);

      // Scroll counter — top-right of list area
      if (L.length > MAX_VIS) {
        ctx.font = '9px monospace';
        ctx.fillStyle = '#666666';
        ctx.textAlign = 'right';
        ctx.fillText(
          (scrollOffset + 1) + '-' + Math.min(scrollOffset + MAX_VIS, L.length) + '/' + L.length,
          px + pw - 6, ly + 6
        );
        ctx.textAlign = 'left';
      }

      vis.forEach(function(it, vi) {
        var ri = scrollOffset + vi;
        var ry = ly + vi * rowH;
        var sel = ri === itemIdx;
        var label = '', textColor = '#e0e0e0';

        if (catIdx === 0) {
          label = it.label;
          textColor = '#88ccff';
        } else if (catIdx === 1) {
          var on = SAVE.flags[it];
          label = it + '   [' + (on ? 'ON ' : 'OFF') + ']';
          textColor = on ? '#44ff88' : '#ff6655';
        } else {
          label = it.label;
          textColor = '#ddeeff';
        }

        if (sel) {
          // Bright yellow selection bar, black bold text
          ctx.fillStyle = '#ffee00';
          ctx.fillRect(px + 2, ry, pw - 4, rowH - 1);
          ctx.fillStyle = '#000000';
          ctx.font = 'bold 10px monospace';
        } else {
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(px + 2, ry, pw - 4, rowH - 1);
          ctx.fillStyle = textColor;
          ctx.font = '10px monospace';
        }
        ctx.fillText((sel ? '> ' : '  ') + label, px + 8, ry + rowH / 2);
      });

      // ── Flash feedback ─────────────────────────────────────────
      var flashY = py + ph - 36;
      if (flashTimer > 0) {
        ctx.fillStyle = '#002200';
        ctx.fillRect(px + 2, flashY, pw - 4, 16);
        ctx.font = 'bold 10px monospace';
        ctx.fillStyle = '#44ff44';
        ctx.textAlign = 'center';
        ctx.fillText('✔  ' + flash, px + pw / 2, flashY + 8);
      }

      // ── Controls hint (footer) ─────────────────────────────────
      var hintY = py + ph - 14;
      ctx.fillStyle = '#202020';
      ctx.fillRect(px, hintY - 4, pw, 18);
      ctx.fillStyle = '#444444';
      ctx.fillRect(px, hintY - 5, pw, 1);
      ctx.font = '8px monospace';
      ctx.fillStyle = '#999999';
      ctx.textAlign = 'center';
      ctx.fillText(
        '←→ category   ↑↓ select   Enter activate   E / Esc close',
        px + pw / 2, hintY + 4
      );

      ctx.restore();
    },
  };

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.code === 'KeyD') {
      e.preventDefault();
      if (currentState === 'overworld') setState('debug_menu');
    }
  });
})();
